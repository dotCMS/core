# lefthook - Git hooks manager for dotCMS
# https://github.com/evilmartians/lefthook
#
# Installed via mise: mise install (adds lefthook binary)
# Hooks wired by: prepare.js → .git/hooks/ (smart dispatcher, branch-aware)
# Bypass (discouraged): LEFTHOOK=0 git commit / git push
# If you bypass, manually run the equivalent checks before pushing — see each hook below.
#
# ─── Which hook to use ────────────────────────────────────────────────
#
# pre-commit  Use for anything that can AUTO-FIX files.
#             Runs on staged files before the commit is created.
#             With `stage_fixed: true`, lefthook re-stages any files the
#             hook modified — the fix ships in the same commit. This is
#             the right place for formatters, linters with --fix, and
#             code generators (OpenAPI spec, lockfiles).
#
# post-merge  Use to catch drift from merges/cherry-picks that skip
#             pre-commit. Can fix files but cannot amend the merge commit
#             — tells the developer to review and commit the fixes.
#             Does NOT fire on rebase (git limitation).
#
# pre-push    Use ONLY for read-only checks that cannot auto-fix.
#             Runs after the commit is made — too late to modify it.
#             Any file a pre-push hook regenerates requires a separate
#             commit and a second push, which is fragile (nothing
#             guarantees the caller retries). Good for: compile
#             staleness warnings, build verification, SDK checks.
#             Bad for: formatters, spec generators, anything with
#             stage_fixed.
#
# Rule of thumb: if the hook changes files → pre-commit.
#                if it only reads/checks → pre-push.
#                if it catches merge gaps → post-merge.
#
# ─── Keep hooks fast and targeted ─────────────────────────────────────
#
# A slow pre-commit hook trains developers to skip it. Every hook
# should feel instant for the common case and tolerable for the worst.
#
# 1. Scope with `glob:` — lefthook skips the hook entirely if no
#    staged files match the pattern. A Java-only hook should never
#    run when editing TypeScript. Cost: 0ms when irrelevant.
#
# 2. Guard with early exits — check whether work is actually needed
#    before doing it. "No REST annotations changed → exit 0" costs
#    ~100ms vs ~37s for an unnecessary recompile.
#
# 3. Use the narrowest tool — `swagger-maven-plugin:resolve` (~6s)
#    instead of full `mvn compile` (~37s) when classes are current.
#    `nx format:write --files=` on changed files, not the whole tree.
#
# 4. Run in parallel — `parallel: true` on the hook group lets
#    independent commands overlap (lint + format + lockfile sync).
#
# 5. Target staged files, not the branch — pre-commit hooks get
#    `{staged_files}`. Use them. Checking all files on every commit
#    punishes small changes.
#
# Budget: pre-commit should complete in <3s for typical commits.
# The worst case (REST API change triggering swagger) is ~6-37s —
# acceptable because it only fires when the glob + guards both match.
# If a hook regularly exceeds 5s for common changes, it needs
# rethinking — either tighter guards or move to pre-push (read-only).
# ──────────────────────────────────────────────────────────────────────

min_version: 2.0.0

# --- Pre-commit: auto-fix and stage (formatters, generators, lockfiles) ---
pre-commit:
  parallel: true
  commands:
    frontend-lint:
      glob: "core-web/**/*.{ts,js,tsx,jsx}"
      stage_fixed: true
      run: |
        cd core-web
        # lefthook substitutes {staged_files} as space-separated paths before shell execution.
        # printf treats each as a separate argument, one per line — correct for paths without spaces.
        # Filenames with spaces would break, but this is not a realistic concern for TS/JS sources.
        files=$(printf '%s\n' {staged_files} | sed 's|^core-web/||' | paste -sd, -)
        # NX_DAEMON=false avoids daemon race condition when commands run in parallel
        [ -n "$files" ] && NX_DAEMON=false mise exec -- yarn nx affected -t lint --exclude='tag:skip:lint' --fix --files="$files"

    frontend-format:
      glob: "core-web/**/*.{ts,js,tsx,jsx,json,html,css,scss}"
      stage_fixed: true
      run: |
        cd core-web
        files=$(printf '%s\n' {staged_files} | sed 's|^core-web/||' | paste -sd, -)
        # NX_DAEMON=false avoids daemon race condition when commands run in parallel
        [ -n "$files" ] && NX_DAEMON=false mise exec -- yarn nx format:write --files="$files"

    yarn-lock-sync:
      glob: "core-web/{package.json,.nvmrc}"
      stage_fixed: true
      run: |
        cd core-web
        # Dep changes or Node version bumps can make yarn.lock stale.
        # stage_fixed auto-stages any lockfile diff.
        mise exec -- yarn install

    # Why pre-commit and not pre-push for OpenAPI spec freshness:
    #
    # A pre-push hook runs AFTER git has resolved the push refs. Any file it
    # regenerates is not in the current push payload — it requires a separate
    # commit and a second push. This creates two problems:
    #   1. The hook must auto-commit and signal "retry needed" (exit 2), but
    #      nothing guarantees the caller retries. Agents, scripts, and CI
    #      that call `git push` don't understand exit 2 as "push again".
    #   2. The auto-committed spec is stranded on the local branch until
    #      someone notices and re-pushes. Silent state changes are a footgun.
    #
    # In pre-commit, the regenerated spec is auto-staged (stage_fixed: true)
    # into the SAME commit. No separate commit, no retry, no stranded state.
    # The fast-path guards (no Java changes → skip, no REST annotations → skip,
    # classes up to date → swagger-only ~6s) keep most commits under 100ms.
    openapi-freshness:
      glob: "dotCMS/**/*.java"
      stage_fixed: true
      run: |
        openapi="dotCMS/src/main/webapp/WEB-INF/openapi/openapi.yaml"

        # Find the last commit that updated the OpenAPI spec
        last_spec_sha=$(git log -1 --format=%H -- "$openapi" 2>/dev/null)

        if [ -z "$last_spec_sha" ]; then
          echo "OpenAPI spec has never been committed — running compile"
        else
          # Find Java files changed since the last spec update
          changed_java=$(git diff --name-only "$last_spec_sha"..HEAD -- 'dotCMS/src/main/java/' 2>/dev/null | grep '\.java$')

          if [ -z "$changed_java" ]; then
            echo "No Java files changed since last OpenAPI spec update — skipping"
            exit 0
          fi

          # Check if any changed files affect the REST API
          needs_compile=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in *DotRestApplication.java) needs_compile=true; break ;; esac
            if [ -f "$f" ]; then
              grep -qE '@Path|@GET|@POST|@PUT|@DELETE|@Operation' "$f" 2>/dev/null && needs_compile=true && break
            else
              git show "$last_spec_sha:$f" 2>/dev/null | grep -qE '@Path|@GET|@POST|@PUT|@DELETE|@Operation' && needs_compile=true && break
            fi
          done <<< "$changed_java"

          if [ "$needs_compile" = false ]; then
            echo "No REST API changes since last spec update — skipping"
            exit 0
          fi
        fi

        # Need compiled classes to regenerate the spec
        if [ ! -d "dotCMS/target/classes" ]; then
          echo "No compiled classes found — run 'just build' or './mvnw install -DskipTests' first"
          exit 1
        fi

        echo "REST API files modified since last spec update — regenerating OpenAPI spec"

        rest_class="dotCMS/target/classes/com/dotcms/rest/api/v1/browser/BrowserResource.class"
        if [ -f "$rest_class" ]; then
          stale_classes=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -f "$f" ] && [ "$f" -nt "$rest_class" ] && stale_classes=true && break
          done <<< "$changed_java"

          if [ "$stale_classes" = true ]; then
            echo "Source files newer than compiled classes — running compile + swagger (~37s)"
            mise exec -- ./mvnw compile -pl :dotcms-core -Dmaven.build.cache.enabled=false -q
          else
            echo "Classes up to date — running swagger resolve only (~6s)"
            mise exec -- ./mvnw io.swagger.core.v3:swagger-maven-plugin:resolve -pl :dotcms-core -Dmaven.build.cache.enabled=false -q
          fi
        else
          echo "Running compile + swagger (~37s)"
          mise exec -- ./mvnw compile -pl :dotcms-core -Dmaven.build.cache.enabled=false -q
        fi

        # stage_fixed auto-stages the regenerated spec into the current commit.
        # No separate commit needed — the spec ships with the code that changed it.
        if [ -f "$openapi" ] && ! git diff --quiet "$openapi" 2>/dev/null; then
          echo "OpenAPI spec regenerated and will be included in this commit (stage_fixed)"
        else
          echo "OpenAPI spec is up to date"
        fi


# --- Post-merge: catch drift from merges/cherry-picks that skip pre-commit ---
post-merge:
  commands:
    frontend-format-check:
      glob: "core-web/**/*.{ts,js,tsx,jsx,json,html,css,scss}"
      run: |
        cd core-web
        # Find frontend files changed by the merge (comparing HEAD to pre-merge)
        files=$(git diff --name-only HEAD@{1} HEAD -- '*.ts' '*.js' '*.tsx' '*.jsx' '*.json' '*.html' '*.css' '*.scss' 2>/dev/null \
          | grep '^core-web/' | sed 's|^core-web/||' | paste -sd, -)
        [ -z "$files" ] && exit 0
        echo "Checking formatting on merged files..."
        NX_DAEMON=false mise exec -- yarn nx format:write --files="$files"
        # If format:write changed anything, tell the user
        if ! git diff --quiet -- . 2>/dev/null; then
          echo ""
          echo "Formatting fixes applied to merged files."
          echo "Review and commit: git add -u core-web && git commit -m 'style: format merged files'"
        fi

# --- Pre-push: read-only checks (cannot auto-fix — commit is already made) ---
pre-push:
  commands:
    java-compile-check:
      glob: "dotCMS/**/*.java"
      run: |
        # Quick staleness check (~70ms) — only prompt if build is outdated.
        ref_class="dotCMS/target/classes/com/dotcms/rest/api/v1/browser/BrowserResource.class"

        if [ ! -f "$ref_class" ]; then
          echo "WARNING: No compiled classes found — compilation not verified"
          echo "Run 'just build' or './mvnw install -DskipTests' before pushing"
          if (exec < /dev/tty) 2>/dev/null; then
            printf "Continue anyway? [y/N] " >&2
            read -r answer < /dev/tty
            case "$answer" in [yY]*) exit 0 ;; *) exit 1 ;; esac
          else
            echo "(non-interactive — skipping compile check)"
            exit 0
          fi
        fi

        # Check if any Java source files are newer than the last build
        stale_files=$(find dotCMS/src/main/java -name '*.java' -newer "$ref_class" 2>/dev/null | head -10)

        if [ -z "$stale_files" ]; then
          echo "Java classes up to date with source"
          exit 0
        fi

        stale_count=$(echo "$stale_files" | wc -l | tr -d ' ')
        echo ""
        echo "WARNING: $stale_count Java source file(s) modified since last build:"
        echo "$stale_files" | sed 's|^|  |'
        [ "$stale_count" -ge 10 ] && echo "  ... (showing first 10)"
        echo ""

        if ! (exec < /dev/tty) 2>/dev/null; then
          echo "(non-interactive — skipping compile check)"
          exit 0
        fi

        printf "Run compile check before push? [Y/n] " >&2
        read -r answer < /dev/tty

        case "$answer" in
          [nN]*)
            echo "Skipping compile — push continues"
            exit 0
            ;;
          *)
            echo "Compiling dotcms-core (~37s)..."
            if mise exec -- ./mvnw compile -pl :dotcms-core -Dmaven.build.cache.enabled=false -q; then
              echo "Compilation successful"
            else
              echo ""
              echo "ERROR: Compilation failed — fix errors before pushing"
              echo "Run: ./mvnw compile -pl :dotcms-core --am"
              exit 1
            fi
            ;;
        esac

    # frontend-format-verify removed — pre-commit frontend-format (with stage_fixed) already
    # handles this. A pre-push format check can only detect problems and tell the developer to
    # fix them manually — it cannot auto-fix because the commit is already made. The post-merge
    # hook below catches the remaining gap (merges/cherry-picks that skip pre-commit).

    sdk-uve-check:
      glob: "core-web/**/sdk-uve/**"
      run: |
        cd core-web
        if ! mise exec -- yarn nx run sdk-uve:build:js 2>&1; then
          echo "WARNING: sdk-uve build failed — check your environment"
          echo "Continuing push (build failure is non-blocking)"
        fi
        cd ..

        # Clean up generated package.json only if it's untracked (build artifact)
        pkg_json="dotCMS/src/main/webapp/ext/uve/package.json"
        if [ -f "$pkg_json" ] && ! git ls-files --error-unmatch "$pkg_json" >/dev/null 2>&1; then
          rm "$pkg_json"
        fi

        # Check if dot-uve.js changed but wasn't committed
        uve_js="dotCMS/src/main/webapp/ext/uve/dot-uve.js"
        if [ -f "$uve_js" ] && ! git diff --quiet "$uve_js" 2>/dev/null; then
          echo "ERROR: dot-uve.js is out of date. Run 'cd core-web && yarn nx run sdk-uve:build:js' and commit the result."
          exit 1
        fi
