<div class="flex flex-col gap-4 p-4">
    <h2 class="text-xl font-bold">{{ $title() }}</h2>

    <p class="text-gray-600">{{ #description() }}</p>

    <div class="flex flex-col gap-2">
        <label for="demo-input" class="font-medium">Demo Input</label>
        <input
            pInputText
            id="demo-input"
            [formControl]="searchControl"
            placeholder="Type to search..."
            class="w-full" />
        <small class="text-gray-500">Search term: {{ $searchTerm() }}</small>
    </div>

    <div class="flex flex-col gap-2">
        <label for="demo-text" class="font-medium">Demo Text</label>
        <textarea
            id="demo-text"
            pInputTextarea
            [formControl]="searchControl"
            placeholder="Enter demo text..."
            class="w-full"
            rows="3"
            (input)="onDemoTextChange($any($event.target).value)">
        </textarea>
    </div>

    <div class="flex gap-2">
        <button
            pButton
            type="button"
            label="Toggle Dialog"
            (click)="toggleDialog()"
            class="p-button-secondary">
        </button>

        <button
            pButton
            type="button"
            label="Reset Search"
            (click)="resetSearch()"
            class="p-button-outlined">
        </button>
    </div>

    <p-dialog
        [visible]="true"
        [header]="'Demo Dialog'"
        [modal]="true"
        [closable]="true"
        [closeOnEscape]="true"
        [draggable]="false"
        [resizable]="false"
        [style]="{ width: '50vw' }"
        (onHide)="dialogVisible.emit(false)">
        <p>This is a demonstration of a modern Angular component using signals and standalone components.</p>
        <p>Current demo text: {{ $demoText() }}</p>
    </p-dialog>
</div>
