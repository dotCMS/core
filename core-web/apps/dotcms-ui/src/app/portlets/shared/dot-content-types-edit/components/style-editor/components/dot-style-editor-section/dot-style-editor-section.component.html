<p-panel
    [toggleable]="true"
    [collapsed]="$isCollapsed()"
    (collapsedChange)="$isCollapsed.set($event)"
    [pt]="$panelPT()">
    <ng-template pTemplate="header">
        <div class="flex min-w-0 flex-1 items-center gap-2">
            <p-button
                [icon]="$isCollapsed() ? 'pi pi-chevron-right' : 'pi pi-chevron-down'"
                [text]="true"
                size="small"
                (onClick)="$isCollapsed.set(!$isCollapsed())" />
            <input
                pInputText
                [ngModel]="$title()"
                (ngModelChange)="setTitle($event)"
                [placeholder]="'style.editor.form.builder.section.title.placeholder' | dm"
                class="min-w-0 flex-1 border-none! bg-transparent! p-0 text-sm font-semibold text-gray-800 shadow-none! ring-0! outline-none" />
        </div>
    </ng-template>

    <ng-template pTemplate="icons">
        <p-button
            data-testid="delete-section-btn"
            icon="pi pi-trash"
            [text]="true"
            severity="secondary"
            size="small"
            [title]="'style.editor.form.builder.section.delete.title' | dm"
            (onClick)="delete.emit()" />
        <span class="mx-0.5 inline-block h-4 w-px self-center bg-gray-300"></span>
        <p-button
            data-testid="move-section-up-btn"
            icon="pi pi-chevron-up"
            [text]="true"
            size="small"
            [title]="'style.editor.form.builder.section.move.up.title' | dm"
            [disabled]="$isFirst()"
            (onClick)="moveUp.emit()" />
        <p-button
            data-testid="move-section-down-btn"
            icon="pi pi-chevron-down"
            [text]="true"
            size="small"
            [title]="'style.editor.form.builder.section.move.down.title' | dm"
            [disabled]="$isLast()"
            (onClick)="moveDown.emit()" />
    </ng-template>

    <div class="flex flex-col gap-3">
        @if ($section().fields.length === 0) {
            <div class="py-6 text-center text-sm text-gray-400">
                {{ 'style.editor.form.builder.section.empty' | dm }}
            </div>
            @if ($emptyError()) {
                <small class="-mt-3 block text-center text-xs text-red-500">
                    {{ $emptyError() }}
                </small>
            }
        }
        @for (field of $section().fields; track field.uid; let i = $index) {
            <dot-style-editor-field-form
                [field]="field"
                [isFirst]="i === 0"
                [isLast]="i === $section().fields.length - 1"
                [showErrors]="$showErrors()"
                [isDuplicateIdentifier]="$duplicateIdentifiers().has(field.identifier.trim())"
                (fieldChange)="fieldChange.emit($event)"
                (delete)="removeField.emit(field.uid)"
                (moveUp)="moveFieldUp.emit(field.uid)"
                (moveDown)="moveFieldDown.emit(field.uid)" />
        }

        <p-button
            data-testid="add-field-btn"
            [text]="true"
            icon="pi pi-plus"
            [label]="$addFieldLabel()"
            styleClass="w-full border-2 border-dashed border-gray-300 rounded-[12px] justify-center mt-1"
            (onClick)="addField.emit()"
            [pTooltip]="'style.editor.form.builder.section.add.field.tooltip' | dm"
            tooltipPosition="top" />
    </div>
</p-panel>
