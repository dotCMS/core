<!-- TODO: Move this to iframe-portlet-legacy -->
<dot-create-contentlet (custom)="onCustomEvent($event)" />
<dot-message-display />

<div class="relative flex h-full w-full">
    <div
        class="min-w-0 flex-1 transition-[margin] duration-300"
        [style.margin-right]="aiChatVisible() ? 'min(100vw, 30rem)' : '0'">
        <div class="grid grid-cols-[auto_1fr] grid-rows-[auto_1fr] h-full w-full">
            <aside
                class="col-span-1 row-span-2 bg-[var(--color-palette-primary-800)]"
                data-testid="navigation-sidebar"
                role="navigation"
                aria-label="Main navigation">
                <dot-main-nav />
            </aside>
            <header class="layout__branding-bar" data-testid="branding-bar" role="banner">
                <dot-toolbar
                    [aiChatVisible]="aiChatVisible()"
                    (aiChatVisibleChange)="onAiChatVisibleChange($event)" />
            </header>
            <div
                class="overflow-auto"
                data-testid="content-viewport"
                role="region"
                aria-label="Main content area">
                <router-outlet />
            </div>
        </div>
    </div>
    <p-drawer
        id="layout-ai-chat-drawer"
        header="AI Chat"
        position="right"
        styleClass="!w-full md:!w-[30rem]"
        [appendTo]="'self'"
        [visible]="aiChatVisible()"
        [modal]="false"
        [closable]="true"
        [closeOnEscape]="true"
        [dismissible]="false"
        (visibleChange)="onAiChatVisibleChange($event)"
        (onHide)="closeAiChat()">
        <dotcms-hashbrown-chat />
    </p-drawer>
</div>

<!-- After the router-outlet to make sure always shows up on top of any other dialog in the system -->
<dot-large-message-display />
<dot-alert-confirm />
<dot-push-publish-dialog />
<dot-download-bundle-dialog />
<dot-wizard />
<dot-generate-secure-password />
<dot-content-compare-dialog />
