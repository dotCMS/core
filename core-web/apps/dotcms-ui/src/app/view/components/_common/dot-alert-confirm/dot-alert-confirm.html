<!-- Always-mounted: PrimeNG's ConfirmationService emits via a non-replaying
     Subject, so a `<p-confirmDialog>` that mounts only when `confirmModel`
     becomes truthy may miss the very first emission (the request fires
     before the dialog has had a CD pass to subscribe). Keeping the dialog
     in the DOM at all times guarantees the subscription is live whenever
     a caller — including a route guard running mid-CD — invokes confirm.

     Labels and styling come from the `Confirmation` object passed to
     `confirmationService.confirm(...)` in `DotAlertConfirmService`, so we
     don't need a custom footer template — PrimeNG's default footer renders
     `acceptLabel` / `rejectLabel` and applies `rejectButtonStyleClass`. -->
<p-confirmDialog [closable]="false" [style]="{ width: '400px' }" #cd />

@if (dotAlertConfirmService.alertModel) {
<p-dialog
    [closable]="false"
    [draggable]="false"
    [header]="dotAlertConfirmService.alertModel.header"
    [visible]="true"
    [style]="{ width: '400px' }"
    [modal]="true">
    <div [innerHTML]="dotAlertConfirmService.alertModel.message"></div>
    <ng-template pTemplate="footer">
        @if (dotAlertConfirmService.alertModel.footerLabel.reject) {
        <p-button
            (onClick)="dotAlertConfirmService.alertReject($event)"
            [outlined]="true"
            [label]="dotAlertConfirmService.alertModel.footerLabel.reject"
            type="button" />
        }
        <p-button
            (onClick)="dotAlertConfirmService.alertAccept($event)"
            [label]="dotAlertConfirmService.alertModel.footerLabel.accept"
            type="button"
            #acceptBtn />
    </ng-template>
</p-dialog>
}
