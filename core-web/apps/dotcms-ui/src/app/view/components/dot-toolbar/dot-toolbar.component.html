<p-toolbar [pt]="{ root: { style: { background: 'var(--surface-0)' } } }">
    <ng-template pTemplate="start">
        <dot-crumbtrail class="ml-4 w-full" />
    </ng-template>
    <ng-template pTemplate="end">
        <div class="flex items-center gap-1">
            <div class="px-2">
                <dot-site
                    [value]="$currentSite()?.identifier"
                    [placeholder]="'Select a site'"
                    [showSystemHost]="false"
                    class="w-64"
                    (onChange)="siteChange($event)"
                    (onShow)="iframeOverlayService.show()"
                    (onHide)="iframeOverlayService.hide()" />
            </div>
            <ng-container *dotShowHideFeature="featureFlagAnnouncements">
                <dot-toolbar-announcements />
            </ng-container>
            <dot-toolbar-notifications />
            <button
                pButton
                type="button"
                icon="pi pi-sparkles"
                class="p-button-text"
                data-testid="toolbar-ai-chat-button"
                aria-label="Open AI Chat"
                [attr.aria-expanded]="aiChatVisible()"
                [attr.aria-controls]="'layout-ai-chat-drawer'"
                (click)="openAiChat()"></button>
        </div>
        <div class="flex items-center gap-0">
            <p-divider layout="vertical" styleClass="ml-0 text-gray-500" />
            <dot-toolbar-user />
        </div>
    </ng-template>
</p-toolbar>
