<dot-chip-filter
    [title]="$chipTitle()"
    [selections]="$chipSelections()"
    (clicked)="$isRelationship() ? openRelationshipDialog() : popover.toggle($event)"
    (removed)="onRemove()"
    [attr.data-testid]="'field-filter-chip-' + $field().variable" />

<p-popover #popover [pt]="popoverPt">
    @switch ($control()) {
        @case ('text') {
            <div class="flex w-72 flex-col p-3" data-testid="field-filter-panel">
                <input
                    pInputText
                    type="text"
                    class="w-full"
                    [ngModel]="$textValue()"
                    (ngModelChange)="onTextInput($event)"
                    [placeholder]="'content-drive.field-filter.text.placeholder' | dm"
                    [attr.aria-label]="$title()"
                    data-testid="field-filter-text" />
            </div>
        }
        @case ('single-select') {
            <p-listbox
                class="block w-72"
                [ngModel]="$selectValue()"
                (ngModelChange)="onSingleValueChange($event)"
                [ngModelOptions]="{ standalone: true }"
                [options]="$options()"
                [filter]="true"
                [filterPlaceHolder]="'search' | dm"
                [scrollHeight]="LISTBOX_SCROLL_HEIGHT"
                [pt]="listboxPt"
                optionLabel="label"
                optionValue="value"
                data-testid="field-filter-select">
                <ng-template let-item pTemplate="item">
                    <dot-filter-list-item [label]="item.label" data-testid="field-filter-option" />
                </ng-template>
            </p-listbox>
        }
        @case ('multi-select') {
            <p-listbox
                class="block w-72"
                [(ngModel)]="$multiValue"
                [ngModelOptions]="{ standalone: true }"
                [options]="$options()"
                [multiple]="true"
                [checkbox]="true"
                [filter]="true"
                [filterPlaceHolder]="'search' | dm"
                [scrollHeight]="LISTBOX_SCROLL_HEIGHT"
                [pt]="listboxPt"
                optionLabel="label"
                optionValue="value"
                (onChange)="onMultiChange()"
                data-testid="field-filter-multi-select">
                <ng-template let-item pTemplate="item">
                    <dot-filter-list-item [label]="item.label" data-testid="field-filter-option" />
                </ng-template>
            </p-listbox>
        }
        @case ('checkbox') {
            <p-listbox
                class="block w-72"
                [(ngModel)]="$multiValue"
                [ngModelOptions]="{ standalone: true }"
                [options]="$options()"
                [multiple]="true"
                [checkbox]="true"
                [filter]="true"
                [filterPlaceHolder]="'search' | dm"
                [scrollHeight]="LISTBOX_SCROLL_HEIGHT"
                [pt]="listboxPt"
                optionLabel="label"
                optionValue="value"
                (onChange)="onMultiChange()"
                data-testid="field-filter-checkbox">
                <ng-template let-item pTemplate="item">
                    <dot-filter-list-item
                        [label]="item.label || $title()"
                        data-testid="field-filter-option" />
                </ng-template>
            </p-listbox>
        }
        @case ('binary-checkbox') {
            <p-listbox
                class="block w-72"
                [ngModel]="$selectValue()"
                (ngModelChange)="onSingleValueChange($event)"
                [ngModelOptions]="{ standalone: true }"
                [options]="$binaryOptions()"
                [scrollHeight]="LISTBOX_SCROLL_HEIGHT"
                [pt]="listboxPt"
                optionLabel="label"
                optionValue="value"
                data-testid="field-filter-binary">
                <ng-template let-item pTemplate="item">
                    <div class="flex w-full min-w-0 items-center gap-2">
                        <p-radiobutton
                            [ngModel]="$selectValue()"
                            [value]="item.value"
                            [ngModelOptions]="{ standalone: true }"
                            class="pointer-events-none"
                            [attr.data-testid]="'field-filter-binary-' + item.value" />
                        <dot-filter-list-item [label]="item.label" />
                    </div>
                </ng-template>
            </p-listbox>
        }
        @case ('radio') {
            <p-listbox
                class="block w-72"
                [ngModel]="$selectValue()"
                (ngModelChange)="onSingleValueChange($event)"
                [ngModelOptions]="{ standalone: true }"
                [options]="$options()"
                [filter]="true"
                [filterPlaceHolder]="'search' | dm"
                [scrollHeight]="LISTBOX_SCROLL_HEIGHT"
                [pt]="listboxPt"
                optionLabel="label"
                optionValue="value"
                data-testid="field-filter-radio">
                <ng-template let-item pTemplate="item">
                    <div class="flex w-full min-w-0 items-center gap-2">
                        <p-radiobutton
                            [ngModel]="$selectValue()"
                            [value]="item.value"
                            [ngModelOptions]="{ standalone: true }"
                            class="pointer-events-none"
                            [attr.data-testid]="'field-filter-radio-' + item.value" />
                        <dot-filter-list-item [label]="item.label" />
                    </div>
                </ng-template>
            </p-listbox>
        }
        @case ('tag') {
            <div class="flex w-72 flex-col p-3" data-testid="field-filter-panel">
                <p-autoComplete
                    [ngModel]="$multiValue()"
                    (ngModelChange)="onMultiValueChange($event)"
                    [ngModelOptions]="{ standalone: true }"
                    [suggestions]="$tagSuggestions()"
                    (completeMethod)="onTagSearch($event)"
                    [multiple]="true"
                    [minLength]="2"
                    [delay]="300"
                    appendTo="body"
                    class="block w-full"
                    [placeholder]="'content-drive.field-filter.text.placeholder' | dm"
                    [attr.aria-label]="$title()"
                    data-testid="field-filter-tag" />
            </div>
        }
        @case ('category') {
            <div class="flex w-72 flex-col p-3" data-testid="field-filter-panel">
                <p-autoComplete
                    [ngModel]="$categorySelected()"
                    (ngModelChange)="onCategoryChange($event)"
                    [ngModelOptions]="{ standalone: true }"
                    [suggestions]="$categorySuggestions()"
                    (completeMethod)="onCategorySearch($event)"
                    [multiple]="true"
                    [minLength]="1"
                    [delay]="300"
                    optionLabel="label"
                    appendTo="body"
                    class="block w-full"
                    [placeholder]="'content-drive.field-filter.text.placeholder' | dm"
                    [attr.aria-label]="$title()"
                    data-testid="field-filter-category" />
            </div>
        }
        @case ('date') {
            <p-datePicker
                selectionMode="range"
                [ngModel]="$dateValue()"
                (ngModelChange)="onDateChange($event)"
                [ngModelOptions]="{ standalone: true }"
                [showTime]="$showTime()"
                [timeOnly]="$timeOnly()"
                [showButtonBar]="true"
                [readonlyInput]="true"
                dateFormat="yy-mm-dd"
                [inline]="true"
                [pt]="datePickerPt"
                [attr.aria-label]="$title()"
                data-testid="field-filter-date" />
        }
    }
</p-popover>
