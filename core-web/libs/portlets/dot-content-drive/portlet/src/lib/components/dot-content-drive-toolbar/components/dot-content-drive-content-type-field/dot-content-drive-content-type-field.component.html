<p-multiSelect
    display="chip"
    optionLabel="name"
    [ngModelOptions]="{ standalone: true }"
    [pt]="{ emptyMessage: { class: fechingItems() ? 'hidden' : '' } }"
    [filter]="true"
    [options]="$state.contentTypes()"
    [(ngModel)]="$selectedContentTypes"
    [emptyFilterMessage]="'content-drive.content-type-field.empty-state' | dm"
    (onChange)="onChange()"
    (onClear)="onChange()"
    (onFilter)="onFilter($event)"
    (onPanelHide)="onPanelHide()"
    [resetFilterOnHide]="true"
    [lazy]="true"
    (onLazyLoad)="onLazyLoad($event)"
    [virtualScroll]="true"
    [virtualScrollItemSize]="38.5"
    [placeholder]="'content-drive.content-type.placeholder' | dm"
    [showClear]="false"
    data-testid="content-type-field"
    class="w-full">
    <ng-template pTemplate="item" let-item>
        <div class="flex items-center gap-2 w-full">
            {{ item.name }}
        </div>
    </ng-template>
    <ng-template pTemplate="footer">
        @if (fechingItems()) {
            <div class="flex items-center justify-start py-2 px-3 text-(--gray-500) gap-4">
                <i class="pi pi-spin pi-spinner"></i>
                <span>{{ 'content.drive.contenttype.search.state.label' | dm }}</span>
            </div>
        }
    </ng-template>
</p-multiSelect>
