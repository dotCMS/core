<p-button
    [label]="'content-drive.field-filter.more' | dm"
    icon="pi pi-plus"
    [text]="true"
    [rounded]="true"
    size="small"
    [disabled]="!$enabled()"
    (click)="popover.toggle($event)"
    data-testid="field-filter-more-button" />

<p-popover #popover [pt]="popoverPt">
    <div class="flex w-72 flex-col" data-testid="field-filter-menu-panel">
        <div class="px-4 py-3 text-xs font-bold tracking-wide text-slate-500 uppercase">
            {{ 'content-drive.field-filter.more.header' | dm }}
        </div>

        @if ($loading()) {
            <div
                class="flex items-center justify-center py-6 text-slate-500"
                data-testid="field-filter-menu-loading">
                <i class="pi pi-spin pi-spinner text-2xl"></i>
            </div>
        } @else if (!$availableFields().length) {
            <div
                class="flex flex-col items-center justify-center gap-2 px-4 py-6 text-center text-slate-500"
                data-testid="field-filter-menu-empty">
                <i class="pi pi-search-minus text-2xl text-slate-400"></i>
                <span class="text-sm">{{ 'content-drive.field-filter.more.empty' | dm }}</span>
            </div>
        } @else {
            <p-listbox
                [options]="$availableFields()"
                optionLabel="name"
                [scrollHeight]="'18rem'"
                [pt]="listboxPt"
                data-testid="field-filter-menu-listbox">
                <ng-template let-field pTemplate="item">
                    <div
                        class="flex w-full min-w-0 items-center gap-2"
                        (click)="onSelectField(field); popover.hide()"
                        [attr.data-testid]="'field-filter-menu-option-' + field.variable">
                        <i class="pi pi-plus text-xs text-slate-400"></i>
                        <dot-filter-list-item [label]="field.name" />
                    </div>
                </ng-template>
            </p-listbox>
        }
    </div>
</p-popover>
