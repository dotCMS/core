<p-toolbar class="h-full justify-start gap-1 border-none! px-3">
    <div
        class="grid w-full grid-cols-[min-content_1fr] grid-rows-[auto_auto] items-center gap-y-4 py-3 transition-all duration-300 ease-in-out"
        [class.gap-x-1]="!$treeExpanded()"
        [class.gap-x-0]="$treeExpanded()">
        <dot-content-drive-tree-toggler data-testid="tree-toggler" [style]="$togglerStyles()" />

        <div
            class="col-start-2 row-start-1 grid w-full items-center gap-1"
            [class]="'grid-cols-[repeat(2,minmax(4.5rem,14rem))_1fr]'">
            <dot-content-drive-search-input data-testid="search-input" class="col-span-2" />

            @if ($displayButton()) {
                <p-button
                    animate.enter="toolbar-enter"
                    animate.leave="toolbar-leave"
                    [label]="'content-drive.add-new' | dm"
                    icon="pi pi-chevron-down"
                    iconPos="right"
                    class="justify-self-end"
                    data-testid="add-new-button"
                    (click)="menu.toggle($event)"
                    #button />
            }

            @if ($displayActions()) {
                <dot-content-drive-workflow-actions
                    animate.enter="toolbar-enter"
                    animate.leave="toolbar-leave"
                    class="justify-self-end"
                    data-testid="workflow-actions" />
            }
        </div>

        <div class="col-start-2 row-start-2 flex w-full flex-wrap items-center gap-2">
            <dot-content-drive-content-type-filter data-testid="content-type-filter" />
            <dot-content-drive-workflow-filter data-testid="workflow-filter" />
            <dot-content-drive-language-field data-testid="language-field" />

            @if ($hasFilters()) {
                <p-button
                    [label]="'content-drive.filters.clear-all' | dm"
                    [text]="true"
                    [rounded]="true"
                    size="small"
                    (click)="onClearAll()"
                    data-testid="clear-all-filters" />
            }
        </div>
    </div>
</p-toolbar>

<p-menu [model]="$items()" #menu data-testId="actionsMenu" [popup]="true" appendTo="body" />
