<p-toolbar class="gap-1 h-full px-3 justify-start border-none!">
    <div
        class="grid w-full grid-cols-[min-content_1fr] grid-rows-[auto_auto] items-center transition-all duration-300 ease-in-out gap-y-4 py-3"
        [class.gap-x-1]="!$treeExpanded()"
        [class.gap-x-0]="$treeExpanded()">
        <dot-content-drive-tree-toggler data-testid="tree-toggler" [style]="$togglerStyles()" />

        <div
            class="grid items-center w-full gap-1 row-start-1 col-start-2"
            [class]="'grid-cols-[repeat(2,minmax(4.5rem,14rem))_1fr]'">
            <dot-content-drive-search-input data-testid="search-input" class="col-span-2" />

            @if ($displayButton()) {
                <p-button
                    animate.enter="toolbar-enter"
                    animate.leave="toolbar-leave"
                    [label]="'content-drive.add-new' | dm"
                    icon="pi pi-chevron-down"
                    iconPos="right"
                    class="justify-self-end"
                    data-testid="add-new-button"
                    (click)="menu.toggle($event)"
                    #button />
            }

            @if ($displayActions()) {
                <dot-content-drive-workflow-actions
                    animate.enter="toolbar-enter"
                    animate.leave="toolbar-leave"
                    class="justify-self-end"
                    data-testid="workflow-actions" />
            }
        </div>

        <div class="flex flex-wrap items-center w-full gap-2 row-start-2 col-start-2">
            <dot-content-drive-base-type-selector
                class="min-w-56"
                data-testid="base-type-selector" />
            <dot-content-drive-content-type-field
                class="min-w-56"
                data-testid="content-type-field" />
            <dot-content-drive-language-field data-testid="language-field" />

            @if ($hasFilters()) {
                <p-button
                    [label]="'content-drive.filters.clear-all' | dm"
                    [text]="true"
                    size="small"
                    (click)="onClearAll()"
                    data-testid="clear-all-filters" />
            }
