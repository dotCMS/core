<div class="flex h-full flex-col gap-4">
    <p class="m-0">{{ 'plugins.extra-packages.instructions' | dm }}</p>

    <div class="flex items-center gap-2">
        <p-iconfield iconPosition="left" class="flex-1">
            <p-inputicon>
                <span class="material-symbols-rounded text-xl! leading-none!">search</span>
            </p-inputicon>
            <input
                pInputText
                type="text"
                class="w-full"
                [placeholder]="'plugins.extra-packages.search.placeholder' | dm"
                [ngModel]="searchQuery()"
                (ngModelChange)="onSearchChange($event)"
                data-testid="plugins-extra-packages-search" />
        </p-iconfield>

        @if (searchQuery()) {
            <span
                class="text-color-secondary text-sm whitespace-nowrap"
                data-testid="plugins-extra-packages-search-count">
                @if (matchCount() === 0) {
                    {{ 'plugins.extra-packages.search.no-match' | dm }}
                } @else {
                    {{ currentMatchIndex() + 1 }} / {{ matchCount() }}
                }
            </span>
            <p-button
                [rounded]="true"
                [text]="true"
                size="small"
                [disabled]="matchCount() === 0"
                (onClick)="prevMatch()"
                data-testid="plugins-extra-packages-search-prev"
                [attr.aria-label]="'plugins.extra-packages.search.prev' | dm">
                <span class="material-symbols-rounded w-6 text-center">keyboard_arrow_up</span>
            </p-button>
            <p-button
                [rounded]="true"
                [text]="true"
                size="small"
                [disabled]="matchCount() === 0"
                (onClick)="nextMatch()"
                data-testid="plugins-extra-packages-search-next"
                [attr.aria-label]="'plugins.extra-packages.search.next' | dm">
                <span class="material-symbols-rounded w-6 text-center">keyboard_arrow_down</span>
            </p-button>
        }
    </div>

    <textarea
        #packagesTextarea
        pTextarea
        [ngModel]="extraPackages()"
        (ngModelChange)="extraPackages.set($event)"
        class="min-h-0 w-full flex-1 resize-none"
        data-testid="plugins-extra-packages-textarea"
        [attr.aria-label]="'plugins.extra-packages.title' | dm"></textarea>

    <div class="flex items-center justify-end gap-2">
        <p-button
            [label]="'plugins.cancel' | dm"
            [text]="true"
            (onClick)="close()"
            data-testid="plugins-extra-packages-cancel-btn" />
        <p-button
            [label]="'plugins.extra-packages.reset' | dm"
            severity="secondary"
            [outlined]="true"
            [loading]="resetting()"
            (onClick)="confirmReset()"
            data-testid="plugins-extra-packages-reset-btn" />
        <p-button
            [label]="'plugins.save' | dm"
            [loading]="saving()"
            (onClick)="save()"
            data-testid="plugins-extra-packages-save-btn" />
    </div>
</div>

<p-confirmDialog [draggable]="false" [style]="{ width: '500px' }" />
