<div
    class="stacked-bar__track flex w-full min-w-0 overflow-hidden rounded-full"
    [style.height]="$height()"
    aria-hidden="true"
    data-testid="stacked-bar-track">
    @if ($engagedWidthPct() > 0) {
        <div
            class="stacked-bar__segment stacked-bar__segment--engaged flex shrink-0 items-center justify-center px-0.5 text-[11px] font-medium leading-none text-white"
            [style.width.%]="$engagedWidthPct()"
            data-testid="stacked-bar-engaged">
            @if ($showLabels() && $engagedSessions() > 0) {
                <span class="min-w-0 max-w-full truncate" [attr.title]="$engagedSessions()">
                    {{ formatSegment($engagedSessions()) }}
                </span>
            }
        </div>
    }
    @if ($notEngagedWidthPct() > 0) {
        <div
            class="stacked-bar__segment stacked-bar__segment--not-engaged flex shrink-0 items-center justify-center px-0.5 text-[11px] font-medium leading-none"
            [style.width.%]="$notEngagedWidthPct()"
            data-testid="stacked-bar-not-engaged">
            @if ($showLabels() && $notEngagedSessions() > 0) {
                <span class="min-w-0 max-w-full truncate" [attr.title]="$notEngagedSessions()">
                    {{ formatSegment($notEngagedSessions()) }}
                </span>
            }
        </div>
    }
</div>
