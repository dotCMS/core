<div class="flex flex-col portlet-wrapper" data-testid="analytics-dashboard">
    @if ($showMessage()) {
        <p-message
            severity="info"
            [closable]="true"
            (onClose)="onCloseMessage()"
            data-testid="analytics-message">
            <div class="flex items-center gap-2">
                <i class="pi pi-info-circle"></i>
                <span data-testid="message-content">
                    {{ 'analytics.feature.state' | dm }}
                    <b>{{ 'development' | dm }}</b>
                </span>
            </div>
        </p-message>
    }

    <p-tabs [lazy]="true" [value]="store.currentTab()" (valueChange)="onTabChange($event)">
        <div class="analytics-dashboard-toolbar bg-gray-100 border-b border-gray-300 px-4">
            <div class="flex justify-between items-center gap-4 min-h-12">
                <div class="flex items-center gap-4 min-w-0">
                    <p-tablist
                        class="shrink-0 min-w-0 border-0 bg-transparent shadow-none"
                        [pt]="tabListPt">
                        @for (tab of tabs; track tab.id) {
                            <p-tab [value]="tab.id">{{ tab.label | dm }}</p-tab>
                        }
                    </p-tablist>
                    <p-divider layout="vertical" />
                    <dot-analytics-filters
                        [timeRange]="store.timeRange()"
                        (changeFilters)="onTimeRangeChange($event)"
                        data-testid="analytics-filters" />
                </div>
                <p-button
                    [label]="'analytics.dashboard.refresh.button' | dm"
                    severity="primary"
                    size="small"
                    (onClick)="onRefresh()"
                    data-testid="refresh-button" />
            </div>
        </div>
        <div class="px-8">
            <p-tabpanels class="dashboard-panels w-full max-w-[1600px] mx-auto">
                @for (tab of tabs; track tab.id) {
                    <p-tabpanel [value]="tab.id" styleClass="w-full">
                        <ng-template #content>
                            <ng-container *ngComponentOutlet="tabComponents[tab.id]" />
                        </ng-template>
                    </p-tabpanel>
                }
            </p-tabpanels>
        </div>
    </p-tabs>
</div>
