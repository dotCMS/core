@let isError = $isError();
@let isLoading = $isLoading();
@let isEmpty = $isEmpty();

<p-card
    class="bar-chart-card"
    [dt]="{ body: { padding: '1.5rem' } }"
    [header]="$resolvedCardHeader()"
    data-testid="analytics-bar-chart">
    @if (isError) {
        <div class="flex flex-1 items-center justify-center min-h-48">
            <dot-analytics-state-message
                message="analytics.charts.error.loading"
                icon="pi-exclamation-triangle" />
        </div>
    } @else if (isLoading) {
        <div
            class="bar-chart-skeleton flex flex-col gap-3 py-2"
            data-testid="analytics-bar-chart-skeleton">
            @for (i of [1, 2, 3, 4, 5]; track i) {
                <div class="flex items-center gap-3">
                    <p-skeleton height="0.75rem" width="5rem" />
                    <p-skeleton height="1.25rem" [width]="(6 - i) * 18 + '%'" />
                </div>
            }
        </div>
    } @else if (isEmpty) {
        <dot-analytics-empty-state class="min-h-48" />
    } @else {
        <div #barMeasure class="bar-chart__measure">
            <svg
                #barSvg
                xmlns="http://www.w3.org/2000/svg"
                role="img"
                class="bar-chart__svg"
                [attr.height]="$svgHeight()"
                aria-label="Horizontal bar chart"
                data-testid="analytics-d3-bar-svg"></svg>
        </div>
    }
</p-card>
