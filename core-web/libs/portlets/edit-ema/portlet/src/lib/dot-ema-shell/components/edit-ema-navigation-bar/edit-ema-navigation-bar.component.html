<nav class="flex flex-col items-center" aria-label="Page editor navigation">
    @for (item of items(); track item.id) {
        <div
            class="w-full p-2"
            [class.border-l-4]="item.href && $activeHrefs().has(item.href)"
            [class.border-primary]="item.href && $activeHrefs().has(item.href)">
            <p-button
                [text]="true"
                [disabled]="item.isDisabled"
                [attr.aria-label]="item.label | dm"
                [attr.aria-disabled]="item.isDisabled ? 'true' : null"
                [pTooltip]="(item.isDisabled && item.tooltip ? item.tooltip : item.label) | dm"
                (click)="navigate(item)"
                data-testid="nav-bar-item"
                tooltipPosition="left">
                <span class="material-icons" data-testid="nav-bar-item-icon">
                    {{ item.materialIcon }}
                </span>
            </p-button>
        </div>
    }
</nav>
