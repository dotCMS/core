<nav class="flex flex-col items-center" aria-label="Page editor navigation">
    @for (item of items(); track item.id) {
        <div class="w-full p-2 flex justify-center relative">
            <span
                class="absolute left-0 inset-y-0 w-1 bg-primary"
                [style.opacity]="item.href === $activeHref() ? 1 : 0"></span>
            <p-button
                [text]="true"
                [disabled]="item.isDisabled"
                [attr.aria-label]="item.label | dm"
                [attr.aria-disabled]="item.isDisabled ? 'true' : null"
                [pTooltip]="(item.isDisabled && item.tooltip ? item.tooltip : item.label) | dm"
                (click)="navigate(item)"
                data-testid="nav-bar-item"
                tooltipPosition="left">
                <span class="material-symbols-outlined" data-testid="nav-bar-item-icon">
                    {{ item.materialIcon }}
                </span>
            </p-button>
        </div>
    }
</nav>
