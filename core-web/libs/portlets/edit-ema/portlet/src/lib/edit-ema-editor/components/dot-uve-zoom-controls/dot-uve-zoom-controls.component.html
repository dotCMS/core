<p-select
    size="small"
    appendTo="body"
    styleClass="[&_.p-select-label]:!pr-0"
    [options]="zoomOptions"
    [ngModel]="$viewZoomLevel() * 100"
    (onChange)="onZoomChange($event.value)"
    optionLabel="label"
    optionValue="value"
    data-testId="zoom-select"
    [dt]="{
        background: 'transparent',
        borderColor: 'transparent',
        hoverBorderColor: 'transparent',
        focusBorderColor: 'transparent',
        shadow: 'none',
        paddingX: '0.25rem',
        paddingY: '0',
        focusRing: { shadow: 'none', color: 'transparent' }
    }" />
