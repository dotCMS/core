<p-button
    icon="pi pi-undo"
    size="small"
    [text]="true"
    [rounded]="true"
    (onClick)="resetView()"
    aria-label="Reset zoom and position"
    data-testId="zoom-reset" />
<p-select
    appendTo="body"
    [options]="zoomOptions"
    [ngModel]="$viewZoomLevel() * 100"
    (onChange)="onZoomChange($event.value)"
    optionLabel="label"
    optionValue="value"
    data-testId="zoom-select"
    [dt]="{
        background: 'transparent',
        borderColor: 'transparent',
        hoverBorderColor: 'transparent',
        focusBorderColor: 'transparent',
        shadow: 'none',
        paddingX: '0.25rem',
        paddingY: '0',
        focusRing: { shadow: 'none', color: 'transparent' }
    }" />
