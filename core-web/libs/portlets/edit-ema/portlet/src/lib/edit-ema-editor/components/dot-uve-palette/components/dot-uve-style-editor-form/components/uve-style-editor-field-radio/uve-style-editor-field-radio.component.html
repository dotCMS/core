<div class="field">
    <label>{{ $field().label }}</label>

    @if ($hasRadioImage()) {
        <div
            class="mb-4 grid gap-3 group-data-[p-active=false]/uve-section:invisible"
            [style.grid-template-columns]="'repeat(' + $columns() + ', 1fr)'">
            @for (option of $options(); track option.value) {
                <div class="relative">
                    <input
                        type="radio"
                        [id]="$field().id + '-' + option.value"
                        [name]="$field().id"
                        [formControlName]="$field().id"
                        [value]="option.value"
                        class="peer absolute cursor-pointer opacity-0" />
                    <label
                        [for]="$field().id + '-' + option.value"
                        class="flex cursor-pointer flex-col items-start gap-1 peer-checked:[&>div]:border-primary-500 peer-checked:[&>div]:bg-primary-100 peer-checked:[&>div]:shadow-[0_2px_8px_rgba(0,0,0,0.12)]">
                        <div
                            class="block h-23 w-full rounded-sm border border-gray-300 bg-white p-1 transition-all duration-150 hover:border-primary-500 hover:shadow-md">
                            <img
                                [src]="option.imageURL"
                                [alt]="option.label"
                                class="size-full rounded-[calc(0.25rem-2px)] object-contain" />
                        </div>
                        <span class="w-full text-sm text-gray-900">{{ option.label }}</span>
                    </label>
                </div>
            }
        </div>
    } @else {
        <div class="flex flex-col gap-2">
            @for (option of $options(); track option.value) {
                <div class="flex items-center gap-2">
                    <p-radioButton
                        [name]="$field().id"
                        [formControlName]="$field().id"
                        [value]="option.value"
                        [inputId]="$field().id + '-' + option.value"
                        class="uve-radio" />
                    <label [for]="$field().id + '-' + option.value">
                        {{ option.label }}
                    </label>
                </div>
            }
        </div>
    }
</div>
