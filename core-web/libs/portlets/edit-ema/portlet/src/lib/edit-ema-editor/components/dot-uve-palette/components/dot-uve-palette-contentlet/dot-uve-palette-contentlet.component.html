@let contentlet = $contentlet();

<!-- Thumbnail fills full height -->
<div
    class="h-full w-20 shrink-0 overflow-hidden flex items-center justify-center"
    [class.bg-gray-100]="$isIconThumbnail()">
    <dot-contentlet-thumbnail
        class="pointer-events-none h-full w-full [&>*]:h-full [&>*]:w-full [&_img]:h-full [&_img]:w-full [&_img]:object-cover"
        [contentlet]="contentlet"
        [iconSize]="'32px'" />
</div>

<!-- Title -->
<div class="min-w-0 flex-1 truncate text-sm leading-tight text-gray-800 pl-3 pr-2">
    {{ contentlet.title }}
</div>
