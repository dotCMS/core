@if ($lockOptions()) {
    <button
        pButton
        class="lock-button"
        [class.lock-button--locked]="$lockOptions().isLocked"
        [class.lock-button--unlocked]="!$lockOptions().isLocked"
        [class.lock-button--disabled]="!$lockOptions().canLock"
        [disabled]="$workflowLockIsLoading()"
        [pTooltip]="
            $lockOptions().canLock ? undefined : ('uve.editor.toggle.lock.button.disabled' | dm)
        "
        tooltipPosition="bottom"
        [icon]="$lockOptions().isLocked ? 'pi pi-lock' : 'pi pi-lock-open'"
        [label]="$buttonLabel() | dm"
        [loading]="$workflowLockIsLoading()"
        size="small"
        [outlined]="true"
        (click)="toggleLock()"
        data-testId="toggle-lock-button"></button>
}
