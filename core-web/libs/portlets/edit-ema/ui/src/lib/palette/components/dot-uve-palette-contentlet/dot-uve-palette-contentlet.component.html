@let contentlet = $contentlet();

<!-- Thumbnail fills full height -->
<div
    class="flex h-full w-20 shrink-0 items-center justify-center overflow-hidden"
    [class]="
        $isIconThumbnail()
            ? 'bg-gray-100 group-hover:bg-(--color-palette-primary-200) group-hover:[--gray-700:var(--color-palette-primary-600)]'
            : ''
    ">
    <!-- group-hover:[--gray-700:...] overrides the CSS variable used internally by
         dot-contentlet-thumbnail > dot-contentlet-icon (shadow DOM) for icon color -->
    <dot-contentlet-thumbnail
        data-testid="contentlet-thumbnail"
        class="pointer-events-none size-full *:size-full [&_img]:size-full [&_img]:object-cover"
        [contentlet]="contentlet"
        [iconSize]="'32px'" />
</div>

<!-- Title -->
<div
    data-testid="contentlet-title"
    [pTooltip]="contentlet.title"
    tooltipPosition="top"
    class="line-clamp-2 min-w-0 flex-1 pr-2 pl-3 text-sm leading-tight wrap-break-word text-gray-800 group-hover:text-(--color-palette-primary-700)">
    {{ contentlet.title }}
</div>
