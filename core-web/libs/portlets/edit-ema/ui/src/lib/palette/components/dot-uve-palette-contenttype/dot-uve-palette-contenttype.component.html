@let contentType = $contentType();

<!-- Drag handle (hidden in selection mode) -->
@if (!$selectable()) {
    <div
        class="drag-handle flex size-8 cursor-grab items-center justify-center rounded-sm text-gray-400 opacity-0 transition-opacity select-none group-hover:text-(--color-palette-primary-600) hover:bg-black/5 hover:text-gray-500 active:cursor-grabbing"
        [ngClass]="
            contentType.disabled
                ? 'pointer-events-none cursor-not-allowed opacity-0'
                : 'group-hover:opacity-100'
        ">
        <i class="pi pi-ellipsis-v text-[14px]"></i>
        <i class="pi pi-ellipsis-v -ml-2 text-[14px]"></i>
    </div>
}

<!-- Content type icon and name -->
<div
    class="flex min-w-0 flex-1 items-center justify-center"
    [pTooltip]="'uve.palette.item.disabled.tooltip' | dm"
    [tooltipDisabled]="!contentType.disabled"
    [ngClass]="$isListView() ? 'flex-row justify-start gap-3' : 'flex-col gap-3'">
    <div class="flex shrink-0 items-center justify-center">
        <i
            class="material-symbols-outlined material-symbols-outlined-outlined text-[28px]! leading-none text-gray-600 group-hover:text-(--color-palette-primary-600)">
            {{ contentType.icon || 'palette' }}
        </i>
    </div>
    <div
        class="text-sm leading-tight font-semibold text-gray-600 group-hover:text-(--color-palette-primary-700)"
        [ngClass]="
            $isListView() ? 'min-w-0 flex-1 truncate text-left' : 'line-clamp-2 text-center'
        ">
        {{ contentType.name }}
    </div>
</div>

<!-- Chevron (hidden in selection mode) -->
@if (!$selectable()) {
    <button
        type="button"
        class="chevron flex size-8 items-center justify-center rounded-sm text-gray-300 opacity-0 transition-opacity group-hover:text-(--color-palette-primary-600) hover:bg-black/5 hover:text-gray-500"
        [ngClass]="
            contentType.disabled
                ? 'pointer-events-none cursor-not-allowed opacity-0'
                : 'cursor-pointer group-hover:opacity-100'
        "
        (click)="onChevronClick(contentType)"
        [disabled]="contentType.disabled"
        [attr.aria-label]="'Open ' + contentType.name">
        <i
            class="pi pi-chevron-right text-[14px] text-gray-400 group-hover:text-(--color-palette-primary-600)"></i>
    </button>
}
