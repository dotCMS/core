<div class="flex h-full flex-col items-center justify-center gap-6">
    <!-- Browser / page illustration with scan line -->
    <div
        class="relative h-48 w-64 overflow-hidden rounded-xl border-2 border-solid border-gray-200 bg-white">
        <!-- Browser chrome -->
        <div
            class="flex h-8 items-center gap-1.5 border-b border-solid border-gray-200 bg-gray-100 px-3">
            <span class="block size-2.5 rounded-full bg-gray-300"></span>
            <span class="block size-2.5 rounded-full bg-gray-300"></span>
            <span class="block size-2.5 rounded-full bg-gray-300"></span>
            <span class="ml-1 block h-4 flex-1 rounded-sm bg-gray-200"></span>
        </div>

        <!-- Page content lines -->
        <div class="flex flex-col gap-2.5 p-4">
            <span class="block h-3 w-3/4 rounded-sm bg-gray-100"></span>
            <span class="block h-3 w-full rounded-sm bg-gray-100"></span>
            <span class="block h-3 w-5/6 rounded-sm bg-gray-100"></span>
            <span class="mt-1 block h-8 w-full rounded-sm bg-gray-100"></span>
            <span class="block h-3 w-2/3 rounded-sm bg-gray-100"></span>
            <span class="block h-3 w-full rounded-sm bg-gray-100"></span>
        </div>

        <!-- Scan line -->
        <div
            class="scan-line absolute inset-x-0 h-0.5 bg-primary shadow-[0_0_8px_2px_var(--p-primary-color)]"></div>
    </div>

    <!-- Label -->
    <p class="m-0 animate-pulse text-sm text-gray-500">
        {{ 'page.scanner.loading' | dm }}
    </p>
</div>
