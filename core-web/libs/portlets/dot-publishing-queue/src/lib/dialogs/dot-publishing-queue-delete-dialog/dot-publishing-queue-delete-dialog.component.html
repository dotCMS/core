<div class="flex h-full flex-col gap-4" data-testid="pq-delete-dialog">
    <div class="grid grid-cols-4 gap-2">
        <p-button
            [label]="'bundle.delete.selected' | dm"
            [outlined]="true"
            [disabled]="!hasSelection()"
            (onClick)="choose('selected')"
            styleClass="w-full"
            data-testid="pq-delete-selected" />
        <p-button
            [label]="'bundle.delete.all' | dm"
            [outlined]="true"
            (onClick)="choose('all')"
            styleClass="w-full"
            data-testid="pq-delete-all" />
        <p-button
            [label]="'bundle.delete.success' | dm"
            [outlined]="true"
            (onClick)="choose('success')"
            styleClass="w-full"
            data-testid="pq-delete-success" />
        <p-button
            [label]="'bundle.delete.failed' | dm"
            [outlined]="true"
            (onClick)="choose('failed')"
            styleClass="w-full"
            data-testid="pq-delete-failed" />
    </div>

    <p-message
        severity="info"
        [text]="'bundle.delete.process.info' | dm"
        data-testid="pq-delete-hint" />
</div>
