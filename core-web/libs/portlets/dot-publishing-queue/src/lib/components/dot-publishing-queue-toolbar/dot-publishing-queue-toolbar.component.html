<p-toolbar class="justify-start gap-1 border-x-0! border-t-0! px-3">
    <div class="flex w-full items-center gap-2 py-3">
        <p-iconField iconPosition="left">
            <p-inputIcon styleClass="pi pi-search" />
            <input
                pInputText
                type="text"
                [ngModel]="store.search()"
                (ngModelChange)="onSearch($event)"
                [placeholder]="'publishing-queue.search.placeholder' | dm"
                [attr.aria-label]="'publishing-queue.search.placeholder' | dm"
                data-testid="pq-search-input"
                class="w-80" />
        </p-iconField>

        <dot-publishing-queue-status-filter />

        <div class="ml-auto flex items-center gap-2">
            @if (hasBulkActions()) {
                <span class="text-color-secondary text-sm" data-testid="pq-bulk-count">
                    {{ store.bundlesSelectedIds().length }}
                    {{ 'publishing-queue.selected' | dm }}
                </span>
                <p-button
                    [label]="'publishing-queue.retry-send' | dm"
                    icon="pi pi-replay"
                    [outlined]="true"
                    size="small"
                    (onClick)="onBulkRetry()"
                    data-testid="pq-bulk-retry" />
                <p-button
                    [label]="'publishing-queue.delete-bundles' | dm"
                    icon="pi pi-trash"
                    severity="danger"
                    [outlined]="true"
                    size="small"
                    (onClick)="deleteClick.emit()"
                    data-testid="pq-bulk-delete" />
                <span class="mx-1 h-6 w-px bg-surface-200" aria-hidden="true"></span>
            }
            <p-button
                [label]="'publishing-queue.refresh' | dm"
                icon="pi pi-refresh"
                [text]="true"
                (onClick)="store.refresh()"
                data-testid="pq-refresh-btn" />
            <p-button
                [label]="'publishing-queue.upload-bundle' | dm"
                (onClick)="uploadClick.emit()"
                data-testid="pq-upload-btn" />
        </div>
    </div>
</p-toolbar>
