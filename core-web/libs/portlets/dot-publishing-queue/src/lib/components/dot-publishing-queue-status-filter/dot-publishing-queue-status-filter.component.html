<dot-chip-filter
    [title]="'publishing-queue.filter.status' | dm"
    [selections]="$selectedLabels()"
    (clicked)="popover.toggle($event)"
    (removed)="onRemoveAll()"
    data-testid="pq-status-filter-chip" />

<p-popover #popover [pt]="popoverPt" (onHide)="listbox.resetFilter()">
    <p-listbox
        #listbox
        [(ngModel)]="$selected"
        [ngModelOptions]="{ standalone: true }"
        [options]="$options"
        [multiple]="true"
        [checkbox]="true"
        [filter]="true"
        [filterPlaceHolder]="'search' | dm"
        [scrollHeight]="LISTBOX_SCROLL_HEIGHT"
        [pt]="listboxPt"
        optionLabel="label"
        optionValue="value"
        (onChange)="onChange()">
        <ng-template let-item pTemplate="item">
            <dot-filter-list-item [label]="item.label" data-testid="pq-status-filter-item" />
        </ng-template>
    </p-listbox>
</p-popover>
