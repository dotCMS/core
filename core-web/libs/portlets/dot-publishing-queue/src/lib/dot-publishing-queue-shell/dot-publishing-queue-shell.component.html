<dot-publishing-queue-toolbar
    (uploadClick)="openUpload()"
    (deleteClick)="openDeleteBundles()" />

<p-tabs
    [value]="store.activeTab()"
    (valueChange)="onTabChange($event)"
    class="flex min-h-0 flex-1 flex-col"
    styleClass="h-full flex flex-col"
    data-testid="pq-tabs">
    <p-tablist>
        <p-tab value="history" data-testid="pq-tab-history">
            {{ 'publishing-queue.tab.history' | dm }}
        </p-tab>
        <p-tab value="queue" data-testid="pq-tab-queue">
            {{ 'publishing-queue.tab.queue' | dm }}
        </p-tab>
    </p-tablist>

    <p-tabpanels [pt]="tabPanelsPt">
        <p-tabpanel value="history" [pt]="tabPanelPt">
            <dot-publishing-queue-history />
        </p-tabpanel>
        <p-tabpanel value="queue" [pt]="tabPanelPt">
            <dot-publishing-queue-page />
        </p-tabpanel>
    </p-tabpanels>
</p-tabs>

<p-confirmDialog [draggable]="false" [position]="'center'" [style]="{ width: '500px' }" />
