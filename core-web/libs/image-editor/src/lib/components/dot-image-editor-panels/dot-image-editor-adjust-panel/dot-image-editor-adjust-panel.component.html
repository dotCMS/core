<div class="ie-adjust">
    <div class="ie-field">
        <div class="ie-field__header">
            <label>{{ 'edit.content.image-editor.adjust.brightness' | dm }}</label>
            <input
                type="number"
                class="ie-field__value"
                [min]="-100"
                [max]="100"
                [value]="brightness()"
                [attr.aria-label]="'edit.content.image-editor.adjust.brightness' | dm"
                (change)="onBrightnessInput($event)"
                data-testid="image-editor-brightness-value" />
        </div>
        <p-slider
            styleClass="ie-slider--brightness"
            [ngModel]="store.adjust().brightness"
            [min]="-100"
            [max]="100"
            data-testid="image-editor-brightness-slider"
            (onChange)="onBrightnessChange($event)"
            (onSlideEnd)="onBrightnessSlideEnd($event)" />
    </div>

    <div class="ie-field">
        <div class="ie-field__header">
            <label>{{ 'edit.content.image-editor.adjust.hue' | dm }}</label>
            <input
                type="number"
                class="ie-field__value"
                [min]="-100"
                [max]="100"
                [value]="hue()"
                [attr.aria-label]="'edit.content.image-editor.adjust.hue' | dm"
                (change)="onHueInput($event)"
                data-testid="image-editor-hue-value" />
        </div>
        <p-slider
            styleClass="ie-slider--hue"
            [ngModel]="store.adjust().hue"
            [min]="-100"
            [max]="100"
            data-testid="image-editor-hue-slider"
            (onChange)="onHueChange($event)"
            (onSlideEnd)="onHueSlideEnd($event)" />
    </div>

    <div class="ie-field">
        <div class="ie-field__header">
            <label>{{ 'edit.content.image-editor.adjust.saturation' | dm }}</label>
            <input
                type="number"
                class="ie-field__value"
                [min]="-100"
                [max]="100"
                [value]="saturation()"
                [attr.aria-label]="'edit.content.image-editor.adjust.saturation' | dm"
                (change)="onSaturationInput($event)"
                data-testid="image-editor-saturation-value" />
        </div>
        <p-slider
            styleClass="ie-slider--saturation"
            [ngModel]="store.adjust().saturation"
            [min]="-100"
            [max]="100"
            data-testid="image-editor-saturation-slider"
            (onChange)="onSaturationChange($event)"
            (onSlideEnd)="onSaturationSlideEnd($event)" />
    </div>

    <div class="ie-field ie-field--inline">
        <p-checkbox
            inputId="image-editor-grayscale"
            [binary]="true"
            [ngModel]="store.adjust().grayscale"
            data-testid="image-editor-grayscale-checkbox"
            (onChange)="onGrayscaleToggle($event)" />
        <label for="image-editor-grayscale">
            {{ 'edit.content.image-editor.adjust.grayscale' | dm }}
        </label>
    </div>
</div>
