<div class="ie-history">
    @if (store.appliedEdits().length) {
        <ul class="ie-history__list">
            @for (entry of store.appliedEdits(); track entry.id) {
                <li class="ie-history__entry" data-testid="image-editor-history-entry">
                    <span class="ie-history__label">{{ entry.label }}</span>
                    <p-button
                        [text]="true"
                        [rounded]="true"
                        severity="secondary"
                        icon="pi pi-times"
                        [attr.aria-label]="'edit.content.image-editor.history.remove.aria' | dm"
                        (onClick)="onRemove(entry.id)"
                        data-testid="image-editor-history-remove" />
                </li>
            }
        </ul>

        <p-button
            [text]="true"
            icon="pi pi-trash"
            [label]="'edit.content.image-editor.history.reset' | dm"
            (onClick)="onReset()"
            data-testid="image-editor-history-reset" />
    } @else {
        <p class="m-0 text-sm text-gray-500" data-testid="image-editor-history-empty">
            {{ 'edit.content.image-editor.history.empty' | dm }}
        </p>
    }
</div>
