@if (isActive() && imageRect()) {
    <div class="focal-overlay">
        <div
            class="focal-surface"
            (pointerdown)="onSurfacePointerDown($event)"
            data-testid="image-editor-focal-surface"></div>

        <span
            class="focal-marker"
            tabindex="0"
            role="button"
            [@focalPointPop]
            [attr.aria-label]="'edit.content.image-editor.focal.marker.aria' | dm"
            [style.left]="markerStyle().left"
            [style.top]="markerStyle().top"
            (pointerdown)="onSurfacePointerDown($event)"
            (keydown)="onMarkerKeydown($event)"
            data-testid="image-editor-focal-marker"></span>
    </div>
}
