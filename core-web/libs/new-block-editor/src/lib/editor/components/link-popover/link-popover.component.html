<dot-editor-popover popoverId="link">
    <div
        [attr.aria-label]="
            (isEditing()
                ? 'dot.block.editor.dialog.link.aria-label.edit'
                : 'dot.block.editor.dialog.link.aria-label.insert'
            ) | dm
        "
        class="w-80 overflow-hidden rounded-lg border border-gray-200 bg-white shadow-lg">
        <div class="flex flex-col gap-3 p-4" (keydown.enter)="$event.preventDefault(); onInsert()">
            <p class="m-0 text-xs font-semibold tracking-wide text-gray-500 uppercase">
                {{
                    (isEditing()
                        ? 'dot.block.editor.dialog.link.title.edit'
                        : 'dot.block.editor.dialog.link.title.insert'
                    ) | dm
                }}
            </p>

            <div class="flex flex-col gap-1">
                <label for="link-url" class="text-xs font-medium text-gray-700">
                    {{ 'dot.block.editor.dialog.link.field.url.label' | dm }}
                </label>
                <input
                    pInputText
                    #hrefInput
                    id="link-url"
                    type="url"
                    [formControl]="form.controls.href"
                    [placeholder]="'dot.block.editor.dialog.link.field.url.placeholder' | dm"
                    class="w-full rounded-sm border border-gray-300 px-3 py-1.5 text-sm focus:border-indigo-500 focus:outline-none" />
            </div>

            <div class="flex flex-col gap-1">
                <label for="link-text" class="text-xs font-medium text-gray-700">
                    {{ 'dot.block.editor.dialog.link.field.text.label' | dm }}
                    <span class="font-normal text-gray-400">
                        {{ 'dot.block.editor.dialog.link.field.text.optional' | dm }}
                    </span>
                </label>
                <input
                    pInputText
                    id="link-text"
                    type="text"
                    [formControl]="form.controls.displayText"
                    [placeholder]="'dot.block.editor.dialog.link.field.text.placeholder' | dm"
                    class="w-full rounded-sm border border-gray-300 px-3 py-1.5 text-sm focus:border-indigo-500 focus:outline-none" />
            </div>

            <label class="flex cursor-pointer items-center gap-2" for="open-in-new-tab">
                <input
                    id="open-in-new-tab"
                    type="checkbox"
                    [formControl]="form.controls.openInNewTab"
                    class="size-4 shrink-0 rounded-sm border border-gray-300 text-indigo-600 focus:ring-2 focus:ring-indigo-400 focus:outline-none" />
                <span class="text-sm text-gray-700">
                    {{ 'dot.block.editor.dialog.link.field.new-tab' | dm }}
                </span>
            </label>

            <button
                type="button"
                [attr.aria-expanded]="advancedOpen()"
                aria-controls="link-advanced-section"
                data-testid="link-advanced-toggle"
                (mousedown)="$event.preventDefault(); toggleAdvanced()"
                class="flex items-center gap-1 self-start rounded-sm text-xs font-medium text-gray-600 hover:text-indigo-700 focus:ring-2 focus:ring-indigo-300 focus:outline-none">
                <span>{{ 'dot.block.editor.dialog.link.advanced' | dm }}</span>
                <span aria-hidden="true" class="material-symbols-outlined text-base">
                    {{ advancedOpen() ? 'expand_less' : 'expand_more' }}
                </span>
            </button>

            @if (advancedOpen()) {
                <div id="link-advanced-section" class="flex flex-col gap-3">
                    <div class="flex flex-col gap-1">
                        <label for="link-title" class="text-xs font-medium text-gray-700">
                            {{ 'dot.block.editor.dialog.link.field.title.label' | dm }}
                        </label>
                        <input
                            pInputText
                            id="link-title"
                            type="text"
                            [formControl]="form.controls.title"
                            [placeholder]="
                                'dot.block.editor.dialog.link.field.title.placeholder' | dm
                            "
                            class="w-full rounded-sm border border-gray-300 px-3 py-1.5 text-sm focus:border-indigo-500 focus:outline-none" />
                    </div>

                    <div class="flex flex-col gap-1">
                        <label for="link-aria-label" class="text-xs font-medium text-gray-700">
                            {{ 'dot.block.editor.dialog.link.field.aria-label.label' | dm }}
                        </label>
                        <input
                            pInputText
                            id="link-aria-label"
                            type="text"
                            [formControl]="form.controls.ariaLabel"
                            [placeholder]="
                                'dot.block.editor.dialog.link.field.aria-label.placeholder' | dm
                            "
                            class="w-full rounded-sm border border-gray-300 px-3 py-1.5 text-sm focus:border-indigo-500 focus:outline-none" />
                    </div>

                    <div class="flex flex-col gap-1">
                        <label for="link-rel" class="text-xs font-medium text-gray-700">
                            {{ 'dot.block.editor.dialog.link.field.rel.label' | dm }}
                        </label>
                        <p-select
                            inputId="link-rel"
                            appendTo="body"
                            [size]="'small'"
                            [showClear]="true"
                            [options]="relOptions"
                            optionLabel="label"
                            optionValue="value"
                            [placeholder]="
                                'dot.block.editor.dialog.link.field.rel.placeholder' | dm
                            "
                            [formControl]="form.controls.rel"
                            [pt]="selectPt" />
                    </div>
                </div>
            }

            <div class="flex justify-end gap-2 pt-1">
                <button
                    type="button"
                    (mousedown)="$event.preventDefault(); manager.close()"
                    class="rounded-sm px-3 py-1 text-sm text-gray-600 hover:bg-gray-100 focus:ring-2 focus:ring-gray-300 focus:outline-none">
                    {{ 'Cancel' | dm }}
                </button>
                <button
                    type="button"
                    (mousedown)="$event.preventDefault(); onInsert()"
                    [disabled]="form.controls.href.invalid"
                    class="rounded-sm bg-indigo-500 px-4 py-1.5 text-sm text-white hover:bg-indigo-600 focus:ring-2 focus:ring-indigo-400 focus:outline-none disabled:cursor-not-allowed disabled:opacity-50">
                    {{ (isEditing() ? 'Save' : 'Insert') | dm }}
                </button>
            </div>
        </div>
    </div>
</dot-editor-popover>
