<div class="flex flex-col gap-4">
    <!-- Prompt input -->
    <div class="flex flex-col gap-1">
        <label for="ai-prompt" class="text-xs font-medium text-gray-700">
            {{ 'dot.block.editor.dialog.ai-content.field.prompt.label' | dm }}
        </label>
        <textarea
            id="ai-prompt"
            [formControl]="promptControl"
            rows="3"
            [placeholder]="'dot.block.editor.dialog.ai-content.field.prompt.placeholder' | dm"
            class="w-full rounded-sm border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none"
            (keydown.enter)="onEnterKey($event)"></textarea>
    </div>

    <!-- Preview area -->
    <div class="min-h-32 rounded-sm border border-gray-200 bg-gray-50 p-3 text-sm text-gray-800">
        @switch (status()) {
            @case ('idle') {
                <p class="m-0 text-gray-400 italic">
                    {{ 'dot.block.editor.dialog.ai-content.empty-state' | dm }}
                </p>
            }
            @case ('loading') {
                <div class="flex flex-col gap-2">
                    <p-skeleton width="100%" height="0.75rem" />
                    <p-skeleton width="92%" height="0.75rem" />
                    <p-skeleton width="78%" height="0.75rem" />
                    <p-skeleton width="65%" height="0.75rem" />
                </div>
            }
            @case ('success') {
                <div class="prose prose-sm max-w-none text-gray-900" [innerHTML]="result()"></div>
            }
            @case ('error') {
                <p class="m-0 text-red-600">{{ errorMessage() }}</p>
            }
        }
    </div>
</div>

<div class="mt-4 flex w-full items-center justify-end gap-2">
    @if (status() === 'success') {
        <button
            pButton
            type="button"
            severity="secondary"
            [text]="true"
            [label]="'dot.block.editor.dialog.ai-content.discard' | dm"
            (click)="cancel()"></button>
        <button
            pButton
            type="button"
            severity="secondary"
            [label]="'block-editor.common.regenerate' | dm"
            (click)="generate()"></button>
        <button pButton type="button" [label]="'Insert' | dm" (click)="insert()"></button>
    } @else {
        <button
            pButton
            type="button"
            severity="secondary"
            [text]="true"
            [label]="'Cancel' | dm"
            (click)="cancel()"></button>
        <button
            pButton
            type="button"
            [label]="'block-editor.common.generate' | dm"
            [loading]="status() === 'loading'"
            [disabled]="generateDisabled()"
            (click)="generate()"></button>
    }
</div>
