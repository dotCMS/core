<section class="flex flex-col p-6" aria-labelledby="binary-option-selector-title">
    <div class="flex flex-col gap-3">
        <p-button
            data-testId="option1"
            styleClass="flex items-start justify-start! gap-3 rounded-lg p-4 text-left transition-colors w-full bg-white hover:border-primary-500!"
            [dt]="cardDt"
            [outlined]="true"
            severity="secondary"
            [class.border-primary-500!]="value === firstOption.value"
            [class.bg-primary-50]="value === firstOption.value"
            (onClick)="value = firstOption.value">
            <dot-color-icon color="surface" size="sm" aria-hidden="true">
                <span class="material-symbols-outlined">{{ firstOption.icon }}</span>
            </dot-color-icon>
            <div class="flex flex-col gap-0.5">
                <span
                    class="font-semibold text-gray-700"
                    [class.text-primary-700]="value === firstOption.value"
                    data-testId="label-op1">
                    {{ firstOption.label | dm }}
                </span>
                <span class="text-gray-500 text-sm" [innerHTML]="firstOption.message | dm"></span>
            </div>
        </p-button>
        <p-button
            data-testId="option2"
            styleClass="flex items-start justify-start! gap-3 rounded-lg p-4 text-left transition-colors w-full bg-white hover:border-primary-500!"
            [dt]="cardDt"
            [outlined]="true"
            severity="secondary"
            [class.border-primary-500!]="value === secondOption.value"
            [class.bg-primary-50]="value === secondOption.value"
            (onClick)="value = secondOption.value">
            <dot-color-icon color="surface" size="sm" aria-hidden="true">
                <span class="material-symbols-outlined">{{ secondOption.icon }}</span>
            </dot-color-icon>
            <div class="flex flex-col gap-0.5">
                <span
                    class="font-semibold text-gray-700"
                    [class.text-primary-700]="value === secondOption.value"
                    data-testId="label-op2">
                    {{ secondOption.label | dm }}
                </span>
                <span class="text-gray-500 text-sm" [innerHTML]="secondOption.message | dm"></span>
            </div>
        </p-button>
    </div>
    <div class="flex justify-end">
        <button
            (click)="onSelect()"
            [autofocus]="true"
            [label]="btnLabel | dm"
            pButton
            pAutoFocus
            data-testId="button"></button>
    </div>
</section>
