@if (state()) {
    @let status = state() | dotContentletStatus;
    @switch (status) {
        @case ('Published') {
            <p-chip
                class="p-chip-sm border-green-100! bg-green-100! text-xs text-green-700!"
                [label]="status" />
        }
        @case ('Archived') {
            <p-chip
                class="p-chip-sm border-red-100! bg-red-100! text-xs text-red-700!"
                [label]="status" />
        }
        @case ('Revision') {
            <p-chip
                class="p-chip-sm border-blue-100! bg-blue-100! text-xs text-blue-700!"
                [label]="status" />
        }
        @default {
            <p-chip
                class="p-chip-sm border-yellow-100! bg-yellow-100! text-xs text-yellow-700!"
                [label]="status" />
        }
    }
} @else {
    <p-chip
        class="p-chip-sm border-blue-100! bg-blue-100! text-xs text-blue-700!"
        [label]="'New' | dm" />
}
