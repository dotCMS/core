@switch ($severity()) {
    @case ('success') {
        <i class="pi pi-check" aria-hidden="true" data-pc-section="icon"></i>
    }
    @case ('info') {
        <i class="pi pi-info-circle" aria-hidden="true" data-pc-section="icon"></i>
    }
    @case ('error') {
        <i class="pi pi-times-circle" aria-hidden="true" data-pc-section="icon"></i>
    }
    @case ('warn') {
        <i class="pi pi-exclamation-triangle" aria-hidden="true" data-pc-section="icon"></i>
    }
}
