<div class="flex h-6 items-center" [class]="$styleClass()">
    @if ($isCollapsed()) {
        <div class="flex items-center">
            <div>
                <p-menu #menu [model]="$itemsToHide()" [popup]="true" appendTo="body" />
                <p-button
                    (click)="menu.toggle($event)"
                    [text]="true"
                    size="small"
                    [rounded]="true"
                    icon="pi pi-ellipsis-h"
                    type="button"
                    data-testid="btn-collapse" />
            </div>
            <div class="mx-2">
                <span class="material-symbols-outlined text-xl! leading-none align-middle text-gray-700">chevron_right</span>
            </div>
        </div>
    }
    <p-breadcrumb
        [dt]="{ background: 'transparent', padding: '0' }"
        [model]="$itemsToShow()"
        (onItemClick)="onItemClick.emit($event)">
        <ng-template pTemplate="separator">
            <span class="material-symbols-outlined text-xl! overflow-hidden leading-none align-middle text-gray-700">chevron_right</span>
        </ng-template>
    </p-breadcrumb>
</div>
