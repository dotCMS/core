<p-select
    #select
    (onChange)="onSiteChange($event.value)"
    (onHide)="onSelectHide()"
    (onLazyLoad)="onLazyLoad($event)"
    (onShow)="onShow.emit()"
    [appendTo]="'body'"
    [class]="class()"
    [disabled]="$disabled()"
    [filter]="true"
    [inputId]="id()"
    [lazy]="true"
    [loading]="$state.loading()"
    [ngModel]="$state.pinnedOption()"
    [options]="$options()"
    [placeholder]="placeholder()"
    [scrollHeight]="'300px'"
    [virtualScroll]="true"
    [virtualScrollOptions]="{
        itemSize: 34,
        step: 40,
        autoSize: false,
        style: {
            height: '300px',
            minHeight: '300px'
        }
    }"
    dataKey="identifier"
    optionLabel="hostname">
    <ng-template pTemplate="filter">
        <p-iconfield>
            <input
                pInputText
                class="w-full"
                type="text"
                role="searchbox"
                autocomplete="off"
                [value]="$state.filterValue() || ''"
                [placeholder]="'Search sites...'"
                (input)="onFilterChange($any($event.target).value)"
                (click)="$event.stopPropagation()" />
            <p-inputicon class="pi pi-search" />
        </p-iconfield>
    </ng-template>

    <ng-template let-site pTemplate="selectedItem">
        <span
            class="site-selector__item"
            [class.site-selector__item--archived]="site?.archived"
            [title]="site?.archived ? site.hostname + ' (Archived)' : site?.hostname">
            @if (site?.archived) {
                <i
                    class="pi pi-inbox site-selector__archived-icon"
                    aria-label="Archived"
                    title="Archived"></i>
            }
            {{ site?.hostname }}
        </span>
    </ng-template>

    <ng-template let-site #item>
        <span
            [class]="'site-selector__item site-depth-' + getSiteDepth(site)"
            [class.font-bold]="$state.pinnedOption()?.identifier === site.identifier"
            [class.site-selector__item--archived]="site.archived"
            [style.padding-left.rem]="getSiteDepth(site) * 1.25"
            [title]="site.archived ? site.hostname + ' (Archived)' : site.hostname">
            @if (getSiteDepth(site) > 0) {
                <i class="pi pi-angle-right site-selector__nested-icon" aria-hidden="true"></i>
            }
            @if (site.archived) {
                <i
                    class="pi pi-inbox site-selector__archived-icon"
                    aria-label="Archived"
                    title="Archived"></i>
            }
            {{ site.hostname }}
        </span>
    </ng-template>
</p-select>
