@let folders = store.folders();
@let content = store.content();

<div class="flex h-180 flex-col gap-4">
    <div class="flex min-h-0 flex-1 flex-row overflow-hidden rounded-md border border-gray-200">
        <div class="h-full w-1/4 min-w-64 shrink-0 overflow-auto border-r border-gray-200">
            <dot-sidebar
                [folders]="folders.data"
                [loading]="store.foldersIsLoading()"
                (onNodeSelect)="onNodeSelect($event)"
                (onNodeExpand)="onNodeExpand($event)" />
        </div>
        <div class="h-full flex-1 overflow-auto">
            <dot-dataview
                [data]="content.data"
                [loading]="store.contentIsLoading()"
                [error]="content.error"
                [accept]="$acceptAttr()"
                [uploadDisabled]="$uploadDisabled()"
                [selectedContent]="store.selectedContent()"
                (onRowSelect)="store.setSelectedContent($event)"
                (onUploadFile)="onFileUpload($event)" />
        </div>
    </div>
    <div class="flex flex-none flex-wrap justify-end gap-4">
        <p-button
            (click)="closeDialog()"
            [label]="'dot.file.field.dialog.select.existing.file.actions.cancel' | dm"
            [text]="true"
            severity="primary" />
        <p-button
            [disabled]="!store.selectedContent()"
            (click)="addContent()"
            [label]="'dot.file.field.dialog.select.existing.file.actions.add' | dm"
            severity="primary" />
    </div>
</div>
