<p-card>
    <ng-template #header>
        <div class="thumbnail-container">
            <dot-contentlet-thumbnail
                [contentlet]="contentlet"
                [iconSize]="'72px'"
                [showVideoThumbnail]="true"
                data-testId="dot-contentlet-thumbnail" />
        </div>
    </ng-template>
    <ng-template #title>
        <h2 class="title" data-testId="dot-card-title">
            {{ contentlet?.fileName || contentlet?.title }}
        </h2>
    </ng-template>
    <ng-template #footer>
        <div class="state">
            <p-tag severity="info" [value]="contentlet?.language" data-testId="dot-card-language" />
            <dot-contentlet-status-badge [state]="contentlet" />
        </div>
    </ng-template>
</p-card>
