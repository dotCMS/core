@let showSidebar = $store.isSidebarOpen();

<div class="flex h-full min-w-0 flex-col overflow-auto">
    <div
        class="flex min-h-[52px] w-full items-center border-b border-surface-200 px-8"
        data-testId="edit-content-actions">
        <div class="ml-auto flex items-center gap-4">
            <span class="text-sm text-gray-500" data-testId="comparing-label">
                {{ 'edit.content.sidebar.history.comparing' | dm }}
                {{ $store.compareContentlet()?.modDate | dotRelativeDate }}
            </span>

            <!-- Sidebar toggle -->
            <div
                class="-mr-4 flex min-h-[52px] shrink-0 items-center justify-center"
                data-testId="sidebar-toggle">
                <p-button
                    [rounded]="true"
                    [text]="true"
                    (click)="$store.toggleSidebar()"
                    size="small"
                    data-testId="sidebar-toggle-button">
                    <img
                        src="/dotAdmin/assets/edit-uve-toolbar/left_panel_open.svg"
                        [alt]="'edit.content.sidebar.close' | dm"
                        [class.hidden]="!showSidebar"
                        class="-scale-x-100"
                        draggable="false"
                        data-testId="sidebar-open-icon" />
                    <img
                        src="/dotAdmin/assets/edit-uve-toolbar/left_panel_close.svg"
                        [alt]="'edit.content.sidebar.open' | dm"
                        [class.hidden]="showSidebar"
                        class="-scale-x-100"
                        draggable="false"
                        data-testId="sidebar-close-icon" />
                </p-button>
            </div>
        </div>
    </div>

    <div class="h-full flex-1 overflow-y-auto p-6">
        <dot-content-compare
            [showActions]="false"
            [reverseColumns]="true"
            [data]="$store.compareData()" />
    </div>
</div>
