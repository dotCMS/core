@let showSidebar = $store.isSidebarOpen();

<div class="flex h-full min-w-0 flex-col overflow-auto">
    <div
        class="flex min-h-[52px] w-full items-center border-b border-gray-300"
        data-testId="edit-content-actions">
        <!-- Left group for lock controls -->

        <!-- Right group for all other actions -->
        <div class="ml-auto flex items-center gap-4">
            <button
                pButton
                class="p-button-tertiary p-button-text"
                (click)="$store.exitCompareView()"
                data-testId="return-to-current-version-button">
                {{ 'edit.content.sidebar.history.return.to.current' | dm }}
            </button>
            <button
                pButton
                (click)="$store.restoreCurrentHistoricalVersion()"
                data-testId="restore-historical-version-button">
                {{ 'edit.content.sidebar.history.restore' | dm }}
            </button>

            <!-- Sidebar toggle always visible -->
            <div
                class="flex min-h-[52px] min-w-16 items-center justify-center overflow-hidden border-l border-gray-300 transition-all duration-200 ease-in-out"
                [class.opacity-0]="showSidebar"
                [class.translate-x-full]="showSidebar"
                [class.max-w-0]="showSidebar"
                [class.p-0]="showSidebar"
                [class.m-0]="showSidebar"
                [class.border-l-0]="showSidebar"
                [class.min-w-0]="showSidebar"
                data-testId="sidebar-toggle">
                <button
                    class="p-button p-button-sm p-button-text p-button-rounded p-button-icon-only transition-all duration-200 ease-in-out [&_path]:fill-primary-500 [&_rect]:stroke-primary-500"
                    (click)="$store.toggleSidebar()"
                    data-testId="sidebar-toggle-button">
                    <svg
                        width="20"
                        height="20"
                        viewBox="0 0 20 20"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <rect
                            x="2.70588"
                            y="3.17659"
                            width="14.5882"
                            height="13.6471"
                            rx="1.17647"
                            stroke="#426BF0"
                            stroke-width="1.41176" />
                        <line
                            x1="12.3528"
                            y1="16.1223"
                            x2="12.3528"
                            y2="3.87797"
                            stroke="#426BF0"
                            stroke-width="1.88235" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div class="h-full flex-1 overflow-y-auto p-6">
        <dot-content-compare
            [showActions]="false"
            [reverseColumns]="true"
            [data]="$store.compareData()" />
    </div>
</div>
