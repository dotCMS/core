<p-drawer
    [visible]="!!data()"
    [modal]="true"
    [dismissible]="false"
    [closeOnEscape]="false"
    [closable]="false"
    appendTo="body"
    [maskStyle]="{ background: 'transparent !important' }"
    [pt]="{
        root: {
            style: {
                width: $expanded() ? '100%' : '70%',
                transition: 'width 250ms ease',
                boxShadow: '-12px 0 24px rgb(0 0 0 / 20%)'
            }
        },
        content: { style: { padding: '0' } }
    }"
    position="right">
    <ng-template #header>
        <div class="flex w-full items-center justify-between gap-4">
            <span class="truncate text-lg font-semibold" data-testId="side-panel-title">
                {{ data()?.title }}
            </span>
            <div class="flex items-center gap-1">
                <p-button
                    [text]="true"
                    severity="secondary"
                    [attr.aria-label]="$expanded() ? 'Collapse panel' : 'Expand panel'"
                    (onClick)="$expanded.set(!$expanded())"
                    data-testId="side-panel-expand">
                    <ng-template #icon>
                        <i class="material-symbols-outlined text-xl!">
                            {{ $expanded() ? 'close_fullscreen' : 'open_in_full' }}
                        </i>
                    </ng-template>
                </p-button>
                <p-button
                    [text]="true"
                    severity="secondary"
                    aria-label="Close panel"
                    (onClick)="requestClose()"
                    data-testId="side-panel-close">
                    <ng-template #icon>
                        <i class="material-symbols-outlined text-xl!">close</i>
                    </ng-template>
                </p-button>
            </div>
        </div>
    </ng-template>
    @for (item of $items(); track item.contentletInode ?? item.contentTypeId) {
        <dot-edit-content-form-layout />
    }
</p-drawer>
