@let field = $field();

<div
    [class.dot-wysiwyg-tinymce__container--error]="$hasError()"
    [class.dot-wysiwyg-tinymce__container--focused]="$isFocused()"
    class="dot-wysiwyg-tinymce__container">
    <editor
        [formControlName]="field.variable"
        [init]="$editorConfig()"
        (onInit)="handleEditorInit($event)" />
</div>
