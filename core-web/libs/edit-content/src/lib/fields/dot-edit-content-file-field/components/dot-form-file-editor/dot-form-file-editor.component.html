<form (ngSubmit)="onSubmit()" [formGroup]="form" class="dot-form-file-editor__form">
    @if (store.allowFileNameEdit()) {
        <div class="dot-form-file-editor__name-field">
            <label class="p-label-input-required" data-testid="editor-label" for="file-name">
                {{ 'dot.file.field.action.create.new.file.label' | dm }}
            </label>
            <input
                id="file-name"
                autocomplete="off"
                formControlName="name"
                pInputText
                placeholder="Ex. template.html"
                type="text"
                data-testid="editor-file-name" />
            <div class="dot-form-file-editor__error-slot">
                @let error = store.error();
                @if (error) {
                    <small class="p-invalid" data-testid="error-msg">
                        {{ error | dm: [store.allowFiles()] }}
                    </small>
                } @else {
                    <dot-field-validation-message
                        [field]="nameField"
                        [patternErrorMessage]="'dot.file.field.error.type.file.not.extension'"
                        data-testid="error-message" />
                }
            </div>
        </div>
    }
    <div class="dot-form-file-editor__editor-section">
        <ngx-monaco-editor
            class="dot-form-file-editor__editor"
            [class.dot-form-file-editor__editor--disabled]="form.disabled"
            [class.code-editor-disabled]="form.disabled"
            [options]="store.monacoConfig()"
            (init)="onEditorInit($event)"
            data-testid="code-editor"
            formControlName="content" />

        @let file = store.file();
        <div
            class="dot-form-file-editor__mime-type"
            [class.dot-form-file-editor__mime-type--hidden]="!file.mimeType">
            <i class="pi pi-info-circle"></i>
            <small>Mime Type: {{ file.mimeType }}</small>
        </div>
    </div>
    <div class="dot-form-file-editor__actions">
        <p-button
            (click)="cancelUpload()"
            [label]="'dot.common.cancel' | dm"
            aria-label="Cancel button"
            data-testid="cancel-button"
            styleClass="p-button-outlined"
            type="button" />

        <p-button
            [label]="'dot.common.save' | dm"
            aria-label="Import button"
            data-testid="import-button"
            type="submit" />
    </div>
</form>
