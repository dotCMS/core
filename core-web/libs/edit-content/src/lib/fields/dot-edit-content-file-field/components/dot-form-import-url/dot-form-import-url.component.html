<form
    (ngSubmit)="onSubmit()"
    [formGroup]="form"
    class="dot-form-import-url__form"
    data-testid="form">
    <div class="dot-form-import-url__field">
        <label for="url-input">{{ 'dot.file.field.action.import.from.url' | dm }}</label>
        <input
            id="url-input"
            type="text"
            autocomplete="off"
            formControlName="url"
            pInputText
            placeholder="https://www.dotcms.com/image.png"
            aria-label="URL input field"
            data-testid="url-input" />
        <div class="dot-form-import-url__error-slot">
            @let error = store.error();
            @if (error) {
                <small class="p-invalid" data-testid="error-msg">
                    {{ error | dm: [store.allowFiles()] }}
                </small>
            } @else {
                <dot-field-validation-message
                    [message]="'dot.file.field.action.import.from.url.error.message' | dm"
                    [field]="form.controls.url"
                    data-testid="error-message" />
            }
        </div>
    </div>
    <div class="dot-form-import-url__actions">
        <p-button
            (click)="cancelUpload()"
            [label]="'dot.common.cancel' | dm"
            styleClass="p-button-outlined"
            type="button"
            aria-label="Cancel button"
            data-testid="cancel-button" />
        <div class="dot-form-import-url__import-btn-wrap">
            <p-button
                [label]="'dot.common.import' | dm"
                [icon]="'pi pi-download'"
                [loading]="store.isLoading()"
                [disabled]="store.isLoading()"
                type="submit"
                aria-label="Import button"
                data-testid="import-button" />
        </div>
    </div>
</form>
