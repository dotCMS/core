<div [class.dot-contentlet]="data?.contentlet" [class.page]="page" class="icon-wrapper">
    @if (icon) {
        <i class="material-symbols-outlined">{{ url }}</i>
    } @else {
        @if (data?.contentlet) {
            <dot-content-thumbnail [contentlet]="data.contentlet" />
        } @else {
            <img [src]="url" alt="" />
        }
    }
</div>
<div class="data-wrapper">
    <span>{{ label }}</span>
    @if (page) {
        <span class="url">{{ data.contentlet.url }}</span>
    }
    @if (data?.contentlet) {
        <div class="state">
            <dot-contentlet-status-badge [state]="data.contentlet" />
            <p-tag severity="info" [value]="data.contentlet.language | lowercase" />
        </div>
    }
</div>
