# Reproduction environment for issue #35592
# "App configurations silently wiped out (dotSecretsStore.p12 integrity failure -> empty store regenerated)"
#
# Two dotCMS nodes share:
#   - ONE assets volume (cms-shared -> /data/shared)  => the SAME dotSecretsStore.p12 file on disk
#   - ONE PostgreSQL DB                                => the SAME cluster_salt (keystore password source)
#
# DOT_CONTENT_VERSION_HARD_LINK=false simulates shared network storage (NFS/EFS) where hard links
# are unavailable, so FileUtil.copyFile truncates + streams the p12 back in -> a reader on the other
# node can observe a torn/empty store, fail the PKCS12 integrity check, and self-heal into an EMPTY
# store, silently wiping every configured App secret. This is the production condition we replicate.
#
# NOTE: configuring Apps / secrets is an enterprise feature. A 2+ seat license must be present at
#       /data/shared/assets/license.zip (see README.md). The bug itself is filesystem-level and exists
#       regardless of edition, but exercising it through the real Apps flow needs the license.

networks:
  db_net:
  opensearch-net:

volumes:
  cms-shared:        # SINGLE shared volume => both nodes see the same /data/shared/assets/server/secrets/dotSecretsStore.p12
  dbdata:
  opensearch-data:

services:
  opensearch:
    image: opensearchproject/opensearch:1
    environment:
      - cluster.name=elastic-cluster
      - discovery.type=single-node
      - data
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xmx1G "
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - opensearch-net

  db:
    image: pgvector/pgvector:pg18
    command: postgres -c 'max_connections=400' -c 'shared_buffers=128MB'
    environment:
      POSTGRES_USER: 'dotcmsdbuser'
      POSTGRES_PASSWORD: 'password'
      POSTGRES_DB: 'dotcms'
    volumes:
      - dbdata:/var/lib/postgresql
    networks:
      - db_net

  dotcms-node-1:
    image: ${DOTCMS_IMAGE:-dotcms/dotcms:latest}
    environment:
      CMS_JAVA_OPTS: '-Xmx1g '
      LANG: 'C.UTF-8'
      TZ: 'UTC'
      DB_BASE_URL: "jdbc:postgresql://db/dotcms"
      DB_USERNAME: 'dotcmsdbuser'
      DB_PASSWORD: 'password'
      DOT_ES_AUTH_BASIC_PASSWORD: 'admin'
      DOT_ES_ENDPOINTS: 'https://opensearch:9200'
      DOT_INITIAL_ADMIN_PASSWORD: 'admin'
      DOT_DOTCMS_CLUSTER_ID: 'dotcms-production'
      # --- repro knob: force the torn-write path (simulates NFS/EFS w/o hard links) ---
      DOT_CONTENT_VERSION_HARD_LINK: 'false'
    depends_on:
      - opensearch
      - db
    volumes:
      - cms-shared:/data/shared          # SAME volume as node-2  <-- the crux of the repro
    networks:
      - db_net
      - opensearch-net
    ports:
      - "8082:8082"
      - "8443:8443"

  dotcms-node-2:
    image: ${DOTCMS_IMAGE:-dotcms/dotcms:latest}
    environment:
      CMS_JAVA_OPTS: '-Xmx1g '
      LANG: 'C.UTF-8'
      TZ: 'UTC'
      DB_BASE_URL: "jdbc:postgresql://db/dotcms"
      DB_USERNAME: 'dotcmsdbuser'
      DB_PASSWORD: 'password'
      DOT_ES_AUTH_BASIC_PASSWORD: 'admin'
      DOT_ES_ENDPOINTS: 'https://opensearch:9200'
      DOT_INITIAL_ADMIN_PASSWORD: 'admin'
      DOT_DOTCMS_CLUSTER_ID: 'dotcms-production'
      DOT_CONTENT_VERSION_HARD_LINK: 'false'
    depends_on:
      - opensearch
      - db
      - dotcms-node-1
    volumes:
      - cms-shared:/data/shared          # SAME volume as node-1  <-- the crux of the repro
    networks:
      - db_net
      - opensearch-net
    ports:
      - "8081:8082"
      - "8444:8443"
