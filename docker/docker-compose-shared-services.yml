# Shared services for parallel worktree development.
# Start once: just dev-shared-start
# Then each worktree: just dev-run 8080 (auto-detects shared services)
services:
  dotcms-shared-db:
    image: pgvector/pgvector:pg18
    container_name: dotcms-shared-db
    command: postgres -c 'max_connections=1024' -c 'shared_buffers=256MB'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dotcms
    ports:
      - "15432:5432"
    volumes:
      - shared-db-data:/var/lib/postgresql
    networks:
      - dotcms-shared
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dotcms"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  dotcms-shared-es:
    image: opensearchproject/opensearch:1.3.6
    container_name: dotcms-shared-es
    environment:
      cluster.name: elastic-cluster
      discovery.type: single-node
      bootstrap.system_call_filter: "false"
      bootstrap.memory_lock: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g -XX:-UseContainerSupport"
    ports:
      - "19200:9200"
    volumes:
      - shared-es-data:/usr/share/opensearch/data
    networks:
      - dotcms-shared
    ulimits:
      memlock: { soft: -1, hard: -1 }
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  dotcms-shared-os-upgrade:
    image: opensearchproject/opensearch:3.4.0
    container_name: dotcms-shared-os-upgrade
    environment:
      cluster.name: opensearch-cluster
      discovery.type: single-node
      bootstrap.system_call_filter: "false"
      bootstrap.memory_lock: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m -XX:-UseContainerSupport"
    ports:
      - "19201:9200"
    volumes:
      - shared-os-upgrade-data:/usr/share/opensearch/data
    networks:
      - dotcms-shared
    ulimits:
      memlock: { soft: -1, hard: -1 }
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

networks:
  dotcms-shared:
    name: dotcms-shared
    driver: bridge

volumes:
  shared-db-data:
  shared-es-data:
  shared-os-upgrade-data:
