## ====================================================================
## HEALTH CHECK SYSTEM CONFIGURATION
## ====================================================================
## Kubernetes-compatible health check endpoints (/livez, /readyz, /health)
## Provides comprehensive system monitoring with intelligent probe management.
##
## KEY FEATURES:
## - Startup-aware logging and tolerance (different behavior during startup vs operational)
## - Monitor mode safety (DOWN → DEGRADED to prevent unnecessary probe failures)
## - Event-driven monitoring for reduced load during outages  
## - Circuit breaker tolerance windows for transient failures
## - Kubernetes best practices compliance (RFC health check format)
##
## KUBERNETES ENDPOINTS:
## - /livez - Liveness probe (minimal text: "alive" | "unhealthy")
## - /readyz - Readiness probe (minimal text: "ready" | "not ready")  
## - /health - Detailed monitoring (JSON response, requires authentication)
## - /healthz - REMOVED (use /livez and /readyz instead)
##
## PROPERTY HIERARCHY:
## - health.{general-setting} = Global health system settings
## - health.check.{check-name}.{property} = Check-specific configuration
## - health.tolerance.{setting} = Failure tolerance configuration
## - health.event-driven.{setting} = Event-driven monitoring configuration
##
## AVAILABLE HEALTH CHECKS:
## - application: JVM and servlet container health (LIVENESS)
## - system: Disk space and system resources (LIVENESS + READINESS)
## - servlet-container: HTTP connector readiness with self-check (LIVENESS + READINESS)
## - threads: Deadlock detection and thread pool monitoring (LIVENESS + READINESS)
## - garbage-collection: GC pressure monitoring (LIVENESS + READINESS)
## - database: Database connectivity (READINESS ONLY)
## - cache: Cache operations (READINESS ONLY)
## - elasticsearch: Search engine connectivity (READINESS ONLY)
## - cdi-initialization: CDI container startup (READINESS ONLY)
##
## HEALTH CHECK MODES:
## - PRODUCTION: Normal UP/DOWN behavior (can fail K8s probes)
## - MONITOR_MODE: Monitor health but convert DOWN→DEGRADED (safe for deployment/testing)
## - DISABLED: Skip check entirely
##
## SAFE DEFAULTS: Most checks use MONITOR_MODE to prevent unnecessary probe failures
## during deployment. Only critical infrastructure (servlet-container, application) 
## use PRODUCTION mode since they indicate fundamental system availability.

## Global Health System Settings
health.include.system-details=true
health.include.performance-metrics=true
## Health check interval - consider increasing for production (60-120s) to reduce overhead
health.interval-seconds=30
health.thread-pool-size=2

## Startup Phase Configuration
## How long to consider the system "starting up" for logging context
## Reduce this for faster operational transition (default: 5 minutes)
health.startup.grace.period.minutes=5
## Number of successful checks required to consider the system stable
## Reduce this for faster operational transition (default: 3)
health.stable.operation.threshold=3
## Minimum startup time before allowing early exit due to stability (default: 30 seconds)
## Prevents premature operational transition during very fast startups
health.startup.minimum.seconds=30

## Failure Tolerance Configuration
## Enable failure tolerance windows (circuit breaker-like functionality)
## IMPORTANT: Tolerance logic is DISABLED during startup phase to ensure proper K8s behavior
## During startup, failed checks return genuine DOWN status (503) so traffic isn't routed prematurely
health.tolerance.enabled=true

## Global tolerance periods (can be overridden per health check)
## Time a check can fail before affecting readiness probes (reports DEGRADED during window)
health.tolerance.readiness.minutes=2
## Time a check can fail before affecting liveness probes (typically longer than readiness)
health.tolerance.liveness.minutes=5
## Whether to use different tolerance periods for liveness vs readiness
health.tolerance.use.different.liveness=true
## Maximum consecutive failures before immediate DOWN status (safety valve)
health.tolerance.max.consecutive.failures=10

## INTELLIGENT FAILURE DETECTION - Circuit Breaker Pattern
## Quick fail thresholds for obvious failures (shorter than full tolerance)
## Database: Fail fast for obvious outages while tolerating brief issues
health.tolerance.database.quick.fail.seconds=45
## Cache: Fail faster since cache issues are less critical
health.tolerance.cache.quick.fail.seconds=30
## Global default for other checks
health.tolerance.quick.fail.seconds=60

## Database-specific intelligent failure settings
## These work with the built-in logic that detects:
## - 3+ failures in 30 seconds = immediate failure (circuit breaker)
## - Connection refused/timeout errors = immediate failure
## - 45+ second continuous failure = stop tolerating
health.check.database.readiness.tolerance.minutes=2
health.check.database.liveness.tolerance.minutes=5
health.check.database.max.consecutive.failures=5

## Startup vs Operational Behavior:
## - STARTUP PHASE: Health checks return actual status (DOWN = 503, prevents traffic routing)
## - OPERATIONAL PHASE: Failed checks use tolerance windows (DOWN -> DEGRADED for tolerance period)

## Security Settings
## Authentication for detailed endpoints (default: true)
## When true: /health, /health/live, /health/ready require authenticated user
## When false: All endpoints accessible without authentication (ONLY for dev/testing)
health.detailed.authentication.required=true

## Application Health Check (memory monitoring)
## Memory exhaustion causes immediate system failure and prevents request handling
## Uses PRODUCTION mode because critical memory issues require immediate traffic blocking
##
## Threshold Strategy:
## - Warning (85%): Start alerting, monitor closely
## - Critical (90%): Trigger restart before GC pressure becomes severe
## - This leaves 10% headroom for GC and Kubernetes restart time
health.check.application.mode=PRODUCTION
health.check.application.warning-threshold-percent=85
health.check.application.critical-threshold-percent=90

## System Health Check (OS resources)
health.check.system.skip-disk-check=false
health.check.system.disk-check-interval-seconds=300

## Memory Health Check (memory pressure monitoring)
health.check.memory.critical-threshold-percent=90
health.check.memory.warning-threshold-percent=80

## Thread Health Check (deadlock and pool monitoring)
health.check.threads.mode=MONITOR_MODE
health.check.threads.deadlock-detection=true
health.check.threads.pool-threshold-multiplier=500

## Garbage Collection Health Check (GC pressure monitoring)
## STARTUP AWARENESS: Uses relaxed thresholds during startup phase since high GC is expected
## Especially important for memory-constrained environments (e.g., 1GB heap)
health.check.garbage-collection.mode=MONITOR_MODE
## Operational thresholds (applied after startup phase)
health.check.garbage-collection.time-threshold-percent=30
health.check.garbage-collection.frequency-threshold=100
## Startup thresholds (much more lenient, applied during startup phase)
## These values are optimized for memory-constrained environments
health.check.garbage-collection.startup-time-threshold-percent=90
health.check.garbage-collection.startup-frequency-threshold=500

## Database Health Check (connectivity monitoring)
health.check.database.mode=MONITOR_MODE
health.check.database.timeout-ms=2000
health.check.database.retry-count=2
## Database-specific tolerance settings (optional - falls back to global defaults)
health.check.database.readiness.tolerance.minutes=3
health.check.database.liveness.tolerance.minutes=8
health.check.database.max.consecutive.failures=5

## Cache Health Check (cache operations monitoring)
health.check.cache.mode=MONITOR_MODE
health.check.cache.timeout-ms=1000
health.check.cache.test-key=health-check-test
## Cache-specific tolerance settings
health.check.cache.readiness.tolerance.minutes=1
health.check.cache.liveness.tolerance.minutes=3

## Elasticsearch Health Check (search engine monitoring)
health.check.elasticsearch.mode=MONITOR_MODE
health.check.elasticsearch.timeout-ms=2000
health.check.elasticsearch.check-index=true
health.check.elasticsearch.cluster-health-required=false

## Servlet Container Health Check (servlet container and HTTP connector monitoring)
## Verifies that the servlet container is responsive AND that HTTP connectors are 
## started and ready to serve requests. This ensures "FIRST SUCCESS" health messages
## only appear when the system can actually handle HTTP requests AND the complete
## dotCMS startup process is finished (all load-on-startup servlets initialized).
## 
## This check waits for the dotcms.started.up system property to be set to "true" 
## by InitServlet (load-on-startup=8) after all core initialization is complete,
## ensuring accurate timing that reflects actual request-handling readiness.
##
## Additionally, performs a self-check by making an actual HTTP request to /livez
## to provide definitive proof that the system can handle real HTTP requests.
## 
## NOTE: This check uses PRODUCTION mode (not MONITOR_MODE) because HTTP serving
## is fundamental infrastructure - if connectors aren't ready, the system truly
## cannot handle requests and probes should fail until it's ready.
health.check.servlet-container.mode=PRODUCTION
health.check.servlet-container.timeout-ms=2000
health.check.servlet-container.min-servlet-version=3
health.check.servlet-container.require-connectors=true
health.check.servlet-container.self-check-enabled=true
## Performance optimization: disable expensive HTTP self-check after startup
## Set to true only if you need to detect HTTP serving failures during operation
health.check.servlet-container.operational-self-check=false
## Verbose logging for troubleshooting (enable during startup issues)
health.check.servlet-container.verbose-logging=false

## ====================================================================
## EVENT-DRIVEN HEALTH CHECK CONFIGURATION
## ====================================================================
## Hybrid event-driven health monitoring for reduced load during outages
## Event-driven monitoring reduces health check frequency by 90% during failures
## while maintaining fast failure detection and intelligent recovery testing.
##
## Benefits:
## - 90% reduction in dependency calls during outages
## - Faster failure detection (~15 seconds vs 30 seconds)
## - Exponential backoff recovery testing (5s → 10s → 20s → 40s → 80s)
## - No connection pool hammering during database failures
##
## Fallback: Automatically falls back to polling if event monitoring fails

## Global Event-Driven Settings
health.event-driven.enabled=true
health.recovery.thread.pool.size=3

## Exponential Backoff Recovery Testing
health.recovery.initial-delay-seconds=5
health.recovery.max-delay-minutes=5
health.recovery.max-duration-hours=2
health.recovery.max-attempts=50

## Database Event-Driven Monitoring
## Uses HikariCP JMX monitoring to detect connection pool failures
health.check.database.event-driven.enabled=true
health.check.database.pool.monitoring.interval.seconds=5
health.check.database.pool.failure.threshold=3
health.check.database.validation.timeout.seconds=2
health.check.database.recovery.timeout.ms=3000

## Database-specific recovery overrides (faster recovery for DB)
health.recovery.database.initial-delay-seconds=3
health.recovery.database.max-delay-minutes=3
health.recovery.database.max-attempts=30

## Elasticsearch Event-Driven Monitoring  
## Uses lightweight connectivity pings when healthy to reduce ES load
health.check.elasticsearch.event-driven.enabled=true
health.check.elasticsearch.ping.interval.seconds=30
health.check.elasticsearch.ping.failure.threshold=2
health.check.elasticsearch.ping.timeout.ms=3000
health.check.elasticsearch.recovery.timeout.ms=5000

## Elasticsearch-specific recovery overrides (slower recovery for ES)
health.recovery.elasticsearch.initial-delay-seconds=10
health.recovery.elasticsearch.max-delay-minutes=8
health.recovery.elasticsearch.max-attempts=40

## Cache Health Check Event-Driven Monitoring
## Cache checks typically don't benefit from event-driven monitoring
## Enable only if you have specific cache failure patterns to monitor
health.check.cache.event-driven.enabled=false

## Hybrid Mode and Fallback Configuration
health.event-driven.fallback.to.polling=true
health.event-driven.fallback.log.level=WARN
health.fallback.polling.interval.seconds=90
health.fallback.polling.max.duration.minutes=30

## Event-Driven Monitoring and Observability
health.event-driven.logging.enabled=true
health.event-driven.logging.include.recovery.attempts=true
health.event-driven.metrics.enabled=true
health.event-driven.performance.tracking=true
health.event-driven.alert.consecutive.failures=5

## Emergency Circuit Breakers for Event-Driven Monitoring
## Uncomment these during major incidents to disable event-driven monitoring:
# health.check.database.event-driven.enabled=false
# health.check.elasticsearch.event-driven.enabled=false
# health.event-driven.enabled=false

## Performance Optimization Settings
health.event-driven.executor.core.pool.size=2
health.event-driven.executor.max.pool.size=5
health.event-driven.executor.queue.capacity=100

## Connection pool monitoring optimization
health.check.database.pool.jmx.enabled=true
health.check.database.pool.jmx.cache.duration.ms=1000

## CDI Initialization Health Check (CDI container monitoring)
## CDI is fundamental to dotCMS - dependency injection must work for core functionality
## Uses PRODUCTION mode because without CDI, the application cannot function
health.check.cdi-initialization.mode=PRODUCTION
health.check.cdi-initialization.required-for-readiness=true
health.check.cdi-initialization.timeout-seconds=300

## ====================================================================
## DEPLOYMENT NOTES:
## 
## Safe Deployment: The default MONITOR_MODE ensures that health
## checks provide monitoring without ever failing Kubernetes probes.
##
## Startup Phase: GC and other performance checks use relaxed thresholds
## during startup phase (5 minutes or until 3 successful liveness checks).
## This prevents false positives during normal application initialization.
## 
## Progressive Hardening: After successful deployment, gradually change
## stable checks to PRODUCTION mode for full monitoring capability.
## 
## Emergency Revert: Set any problematic check to DISABLED or back to
## MONITOR_MODE to prevent service disruption.
## ====================================================================

## ====================================================================
## DATABASE CONNECTION TIMEOUT CONFIGURATION
## ====================================================================
## These settings control how long the application waits for database connections
## before failing. Reducing these values helps the application fail fast when
## the database is unavailable instead of hanging for 30+ seconds.
##
## IMPORTANT: These apply to ALL datasource strategies (db.properties, env vars, 
## Docker secrets, and Tomcat JNDI) to ensure consistent fast-fail behavior.

## Connection timeout: How long to wait for a connection from the pool (milliseconds)
## Lower values = faster failure detection when database is unavailable
## Default: 1000ms (1 second) - much faster than typical 30s default
DB_CONNECTION_TIMEOUT_MS=1000

## Connection max lifetime: How long a connection can exist before being recreated
## Lower values = faster detection of failed connections
## Default: 30000ms (30 seconds) - forces connection recreation more frequently  
DB_MAX_LIFETIME_MS=30000

## Validation timeout: How long to wait for connection health checks
## Lower values = faster failure detection during health checks
## Default: 500ms - allows quick validation but fails fast if database is down
DB_VALIDATION_TIMEOUT_MS=500

## Idle timeout: How long a connection can be idle before removal (milliseconds)
## This doesn't affect failure detection but helps pool management
## Default: 300000ms (5 minutes)
DB_IDLE_TIMEOUT_MS=300000

## Leak detection threshold: Log potential connection leaks (milliseconds)
## Helps identify code that's not properly closing connections
## Default: 60000ms (1 minute)
DB_LEAK_DETECTION_THRESHOLD_MS=60000

## ====================================================================
## CIRCUIT BREAKER CONFIGURATION  
## ====================================================================
## Configuration for background thread circuit breakers to prevent
## hammering a failed database with continuous connection attempts.

## ReindexThread circuit breaker settings
REINDEX_THREAD_DB_FAILURE_THRESHOLD=5
REINDEX_THREAD_DB_CIRCUIT_TIMEOUT_MS=30000
REINDEX_THREAD_SLEEP_ON_ERROR=500

## PubSub circuit breaker settings  
PGLISTENER_DB_CIRCUIT_THRESHOLD=10
PGLISTENER_DB_CIRCUIT_TIMEOUT_MS=30000
PGLISTENER_SLEEP_BETWEEN_RUNS=500
PGLISTENER_KILL_ON_FAILURES=100

## ====================================================================
## FRAMEWORK-LEVEL HEALTH CHECK TIMEOUTS
## ====================================================================
## These timeouts control how long the HealthStateManager waits for
## health checks to complete before timing them out. Health checks
## can block and be slow (reflecting dependency performance), but the
## framework ensures they don't run forever.

## Global framework timeout for all health checks (default: 30 seconds)
health.framework.timeout-ms=30000

## Per-check framework timeouts (override global timeout for specific checks)
## These should be longer than the check's internal timeout to allow proper completion
health.check.database.framework-timeout-ms=10000
health.check.cache.framework-timeout-ms=5000
health.check.elasticsearch.framework-timeout-ms=8000

## ====================================================================
## HEALTH CHECK TROUBLESHOOTING AND EXAMPLES
## ====================================================================
##
## COMMON CONFIGURATION SCENARIOS:
##
## 1. MEMORY-CONSTRAINED ENVIRONMENTS (e.g., 1GB heap):
##    health.check.garbage-collection.startup-frequency-threshold=500
##    health.check.garbage-collection.startup-time-threshold-percent=90
##
## 2. DISABLE PROBLEMATIC CHECKS DURING DEPLOYMENT:
##    health.check.database.mode=DISABLED
##    health.check.elasticsearch.mode=DISABLED
##
## 3. VERBOSE LOGGING FOR STARTUP ISSUES:
##    health.check.servlet-container.verbose-logging=true
##    health.include.system-details=true
##
## 4. PRODUCTION HARDENING (fail fast, no safety conversions):
##    health.check.database.mode=PRODUCTION
##    health.check.cache.mode=PRODUCTION
##    health.tolerance.enabled=false
##
## 5. SAFE TESTING ENVIRONMENT (never fail probes):
##    health.check.application.mode=MONITOR_MODE
##    health.check.servlet-container.mode=MONITOR_MODE
##    health.tolerance.enabled=true
##
## 6. PERFORMANCE OPTIMIZATION (reduce health check overhead):
##    health.interval-seconds=60
##    health.check.servlet-container.operational-self-check=false
##    health.check.garbage-collection.mode=DISABLED
##    health.include.performance-metrics=false
##
## KUBERNETES PROBE CONFIGURATION EXAMPLES:
##
## livenessProbe:
##   httpGet:
##     path: /livez
##     port: 8080
##   initialDelaySeconds: 60
##   periodSeconds: 30
##   timeoutSeconds: 5
##   failureThreshold: 3
##
## readinessProbe:
##   httpGet:
##     path: /readyz  
##     port: 8080
##   initialDelaySeconds: 20
##   periodSeconds: 10
##   timeoutSeconds: 3
##   failureThreshold: 2
