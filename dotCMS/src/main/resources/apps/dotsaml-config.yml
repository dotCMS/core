name: "SSO - SAML"
iconUrl: "https://static.dotcms.com/assets/icons/apps/saml.png"
allowExtraParameters: true
description: "> **Heads up: SAML is now managed in the dotAuth tool** (System &rarr; dotAuth), alongside OAuth / OIDC and headless login. This classic screen still works and remains supported for existing configurations, so you can keep using it, but new setups are easier in dotAuth.\n\nSAML SSO lets users authenticate against a centralized identity provider such as Azure AD or Google Workspace. For setup help, see the [online documentation](https://dotcms.com/docs/latest/sso-saml)."


params:
  enable:
    value: true
    hidden: false
    type: "BOOL"
    label: "Enable?"
    hint: "Enable | Disable this Configuration"
    required: true
  idpName:
    value: ""
    hidden: false
    type: "STRING"
    label: "IDP Name"
    hint: "Name for the IDP - for reference"
    required: true
  sPIssuerURL:
    value: ""
    hidden: false
    type: "STRING"
    label: "Service Provider Issuer ID"
    hint: "A unique Id that is shared with the IDP - usually the fully qualified url to your dotcms instance, e.g. https://dotcms.com/dotAdmin or https://testing.dotcms.com:8443/dotAdmin"
    required: true
  sPEndpointHostname:
    value: ""
    hidden: false
    type: "STRING"
    label: "Service Provider Endpoint Hostname/Port"
    hint: "The fully qualified domain and optionally, port for your dotCMS installation (HTTPS is assumed). This will be used by your IDP for callbacks.  E.g. dotcms.com or testing.dotcms.com:8443"
    required: true
  signatureValidationType:
    hidden: false
    type: "SELECT"
    label: "Validation Type"
    hint: "Depends on your IDP Configuration."
    required: true
    value:
      -
        label: "None"
        value: "none"
        selected: true
      -
        label: "Only Response"
        value: "response"
      -
        label: "Only Assertion"
        value: "assertion"
      -
        label: "Response & Assertion"
        value: "responseandassertion"
  idPMetadataFile:
    value: ""
    hidden: false
    type: "STRING"
    label: "IDP Metadata File"
    hint: "Cut and paste your IDP Metadata File here - this should be valid XML"
    required: true
  publicCert:
    value: ""
    hidden: false
    type: "STRING"
    label: "Public Certifcate"
    hint: "Cut and paste your Public Certificate here"
    required: true
  privateKey:
    value: ""
    hidden: true
    type: "STRING"
    label: "Private Key"
    hint: "Cut and paste your Private Key here"
    required: true
  buttonParam:
    hidden: false
    type: "BUTTON"
    label: "Metadata"
    hint: "Generate Metadata!"
    required: true
    value: "/api/v1/dotsaml/metadata/$siteId"




