name: "Content Analytics"
iconUrl: "https://static.dotcms.com/assets/icons/apps/analytics.png"
allowExtraParameters: false
description: "The Content Analytics App allows you to track and analyze user interactions with your content (like impressions and clicks) across your dotCMS sites, helping you understand engagement and optimize your content strategy."

params:
  siteAuth:
    value: ""
    hidden: false
    type: "GENERATED_STRING"
    label: "Site Auth"
    hint: "The Site Auth is required in all requests that send Events to the Content Analytics Service. You can either enter your own Site Auth, or have dotCMS generate a secure one for you."
    required: true
    buttonLabel: "Auto Generate Site Auth"
    buttonEndpoint: "/api/v1/analytics/content/siteauth/generate/$siteId"

  # Section Event Manager Credentials
  header_admin:
    type: "HEADING"
    label: "Event Manager Token"
  info_admin:
    type: "INFO"
    hint: |
      **One-time token exchange — the admin password is NOT stored.**

      The tenant ID is read from the environment variable `DOT_ANALYTICS_TENANT` and is
      managed by your infrastructure, not in this form.

      1. Enter the **Admin Password** below.
      2. Click **Save**. dotCMS will exchange the configured tenant + password with the
         event manager for a bearer token.
      3. On success, the password field is **cleared automatically** and only the bearer
         token is retained (encrypted).

      To rotate or replace the token, re-enter the password and save again. The password
      itself is never persisted to the app configuration.
  adminPassword:
    value: ""
    hidden: true
    type: "STRING"
    label: "Admin Password (not stored)"
    hint: "Password for the event manager admin API. Used once to exchange for a bearer token, then cleared — never persisted to the app config."
    required: false
  info_token_managed:
    type: "INFO"
    hint: |
      **The HMAC auth token is managed automatically by the save flow above.**

      It is provisioned on a successful credential exchange and rotated whenever you
      re-enter the admin password. Do not edit the token field manually — overwriting
      or clearing it will break upstream authentication until you re-onboard the site.
  bearerToken:
    value: ""
    hidden: true
    type: "STRING"
    label: "Auth Token (do not edit)"
    hint: "Managed by the save flow above. Leave the masked value alone."
    required: false

  # Section Server-Rendered Pages
  header_server:
    type: "HEADING"
    label: "Server-Rendered Pages Configuration"
  info_server:
    type: "INFO"
    hint: "These settings apply ONLY to pages rendered by dotCMS servers (pages using dotCMS templates and layout)."
  autoPageView:
    value: true
    hidden: false
    type: "BOOL"
    label: "Enable Auto Page Views"
    hint: "Automatically track page views. If not specified, it defaults to true."
    required: false
  contentImpression:
    value: false
    hidden: false
    type: "BOOL"
    label: "Enable Content Impressions"
    hint: "Automatically track when contentlets are visible in the viewport. If not specified, it defaults to false."
    required: false
  contentClick:
    value: false
    hidden: false
    type: "BOOL"
    label: "Enable Content Clicks"
    hint: "Automatically track when users click on contentlets. If not specified, it defaults to false."
    required: false
  advancedConfig:
    value: ""
    hidden: false
    type: "STRING"
    label: "Advanced Configuration (JSON)"
    hint: |
        Allows you to enter a JSON object to fine-tune the SDK behavior. For example:

        ```json
        {
          "queue": {
            "eventBatchSize": 15,
            "flushInterval": 5000
          },
          "impressions": {
            "visibilityThreshold": 0.5,
            "dwellMs": 750
          }
        }
        ```

        Refer to the documentation for all available settings.
    required: false
  debug:
    value: false
    hidden: false
    type: "BOOL"
    label: "Enable Debug Mode"
    hint: "Enables debug mode in the browser console."
    required: false

  # Section Headless / Advanced
  header_headless:
    type: "HEADING"
    label: "Headless & SPA Applications"
  info_headless:
    type: "INFO"
    hint: |
      **The settings above do NOT apply to headless implementations**

      For headless sites (React, Angular, Vue, Next.js, etc.), you must:
      1. Install the dotCMS Analytics SDK in your application
      2. Initialize the SDK with your Site Auth key
      3. Configure tracking in your application code

      [View Headless Integration Guide](https://github.com/dotCMS/core/blob/main/core-web/libs/sdk/analytics/README.md)

      **Quick Start for Popular Frameworks:**

      React/Next.js:

      `npm install @dotcms/analytics`

      Angular:

      `npm install @dotcms/analytics`

      Vue/Nuxt:
      
      `npm install @dotcms/analytics`