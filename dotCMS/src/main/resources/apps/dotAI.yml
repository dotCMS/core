name: "dotAI"
iconUrl: "https://static.dotcms.com/assets/icons/apps/chatgpt_logo.svg"
allowExtraParameters: true
description: |
  Credentials and options for using AI providers with dotCMS. Each provider section
  (chat, embeddings, image) declares its own provider independently. Prompts, embeddings
  behavior, and other settings belong in the "settings" section.
  We recommend a single config for all sites via SYSTEM_HOST, or per-site overrides.
  Full documentation: https://dev.dotcms.com/docs/dotai

params:
  providerConfig:
    value: ""
    hidden: true
    type: "STRING"
    label: "Provider Config (JSON)"
    hint: |
      Single JSON object that configures all AI capabilities.
      Provider sections (chat, embeddings, image) contain only connection parameters.
      All prompts and behavioral settings belong in the "settings" section.

      Example (OpenAI — all fields):
      {
        "chat": {
          "provider": "openai",
          "apiKey": "sk-...",
          "apiUrl": "https://api.openai.com/v1/chat/completions",
          "model": "gpt-4o",
          "maxTokens": 16384,
          "temperature": 1.0,
          "maxRetries": 3,
          "timeout": 30
        },
        "embeddings": {
          "provider": "openai",
          "apiKey": "sk-...",
          "apiUrl": "https://api.openai.com/v1/embeddings",
          "model": "text-embedding-ada-002",
          "maxRetries": 3,
          "timeout": 30
        },
        "image": {
          "provider": "openai",
          "apiKey": "sk-...",
          "apiUrl": "https://api.openai.com/v1/images/generations",
          "model": "dall-e-3",
          "maxRetries": 3,
          "timeout": 30
        },
        "settings": {
          "rolePrompt": "You are dotCMSbot, an AI assistant to help content creators.",
          "textPrompt": "Use Descriptive writing style.",
          "completionRolePrompt": "You are a helpful assistant with a descriptive writing style.",
          "completionTextPrompt": "Answer this question \"${prompt}?\" using only the following text: \"\"\"${supportingContent}\"\"\"",
          "temperature": 1.0,
          "imagePrompt": "Use 16:9 aspect ratio.",
          "imageSize": "1792x1024",
          "listenerIndexer": { "default": "blog,news,webPageContent" },
          "debugLogging": false,
          "embeddingsSplitAtTokens": 512,
          "embeddingsMinimumTextLength": 64,
          "embeddingsMinimumFileSize": 1024,
          "embeddingsFileExtensions": "pdf,doc,docx,txt,html",
          "embeddingsSearchThreshold": 0.25,
          "embeddingsThreads": 3,
          "embeddingsThreadsMax": 6,
          "embeddingsThreadsQueue": 10000,
          "embeddingsCacheTtlSeconds": 600,
          "embeddingsCacheSize": 1000,
          "embeddingsDeleteOldOnUpdate": true
        }
      }
    required: false
