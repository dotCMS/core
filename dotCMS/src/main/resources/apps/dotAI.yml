name: "dotAI"
iconUrl: "https://static.dotcms.com/assets/icons/apps/chatgpt_logo.svg"
allowExtraParameters: true
description: |
  Configuration for dotAI, powered by LangChain4J. Supports multiple AI providers
  configured via a single JSON field (Provider Config). Each provider section (chat, embeddings, image)
  is declared independently, allowing you to mix providers or models per capability.
  We recommend a single configuration on SYSTEM_HOST, or override per site as needed.
  Full documentation: https://dev.dotcms.com/docs/dotai

params:
  providerConfig:
    value: ""
    hidden: false
    type: "STRING"
    label: "Provider Config (JSON)"
    hint: |
      Single JSON object that configures all AI capabilities.
      Each section (chat, embeddings, image) declares its own provider independently.
      Prompts and settings belong inside their respective section.

      Example (OpenAI):
      {
        "chat": {
          "provider": "openai",
          "apiKey": "sk-...",
          "model": "gpt-4o",
          "maxTokens": 16384,
          "temperature": 1.0,
          "maxRetries": 3,
          "rolePrompt": "You are dotCMSbot, an AI assistant to help content creators.",
          "textPrompt": "Use Descriptive writing style."
        },
        "embeddings": {
          "provider": "openai",
          "apiKey": "sk-...",
          "model": "text-embedding-ada-002",
          "listenerIndexer": { "default": "blog,news,webPageContent" }
        },
        "image": {
          "provider": "openai",
          "apiKey": "sk-...",
          "model": "dall-e-3",
          "size": "1792x1024",
          "imagePrompt": "Use 16:9 aspect ratio."
        }
      }
    required: false
