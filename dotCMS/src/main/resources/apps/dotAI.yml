name: "dotAI"
iconUrl: "https://static.dotcms.com/assets/icons/apps/chatgpt_logo.svg"
allowExtraParameters: true
description: |
  Credentials and options for using OpenAI/ChatGPT with dotCMS. Each provider section (chat, embeddings, image)
  is declared independently. We recommend you have a single config for all your sites, by placing all config
  on the SYSTEM_HOST or provide a configuration per site.
  Full documentation: https://dev.dotcms.com/docs/dotai

params:
  apiKey:
    value: ""
    hidden: true
    type: "STRING"
    label: "API Key"
    hint: "API key for OpenAI."
    required: false
  providerConfig:
    value: ""
    hidden: false
    type: "STRING"
    label: "Provider Config (JSON)"
    hint: |
      Single JSON object that configures all AI capabilities.
      Each section (chat, embeddings, image) declares its own provider independently.
      Prompts and settings belong inside their respective section.
      You may optionally include a per-section apiKey to override the shared key above.

      Example (OpenAI):
      {
        "chat": {
          "provider": "openai",
          "model": "gpt-4o",
          "maxTokens": 16384,
          "temperature": 1.0,
          "maxRetries": 3,
          "rolePrompt": "You are dotCMSbot, an AI assistant to help content creators.",
          "textPrompt": "Use Descriptive writing style."
        },
        "embeddings": {
          "provider": "openai",
          "model": "text-embedding-ada-002",
          "listenerIndexer": { "default": "blog,news,webPageContent" }
        },
        "image": {
          "provider": "openai",
          "model": "dall-e-3",
          "size": "1792x1024",
          "imagePrompt": "Use 16:9 aspect ratio."
        }
      }
    required: false
