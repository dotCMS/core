full_build_test: &full_build_test
  - '.sdkmanrc'
  - 'core-web/.nvmrc'
  - '.nvmrc'

backend: &backend
  - '.github/workflows/cicd_comp_*.yml'
  - '.github/workflows/cicd_1-pr.yml'
  - '.github/actions/core-cicd/**/action.yml'
  - 'bom/**'
  - 'build-parent/**'
  - 'core-web/pom.xml'
  - 'dotCMS/src/main/webapp/html/**/!(*.{css,js})'
  - 'dotcms-postman/**'
  - 'test-karate/**'
  - 'e2e/**'
  - 'dotCMS/src/main/webapp/WEB-INF/messages/**/!(Language*.properties)'
  - 'dotCMS/!(src/main/webapp/html/|src/main/webapp/WEB-INF/messages/)**'
  - 'dotcms-integration/**'
  - 'independent-projects/**'
  - 'maven-plugins/**'
  - 'osgi-base/**'
  - 'parent/**'
  - 'plugins-core/**'
  - 'pom.xml'
  - 'reports/**'
  - *full_build_test

frontend: &frontend
  - 'core-web/**'
  - 'dotCMS/src/main/webapp/html/**/*.{css,js}'
  - *full_build_test

cli: &cli
  - 'tools/dotcms-cli/**'

# Server-side REST endpoints the dotCMS CLI consumes at runtime. The CLI's
# integration tests (tools/dotcms-cli, @QuarkusTest + testcontainers) exercise a
# live dotCMS, so a change to one of these endpoints can break the CLI even when
# tools/dotcms-cli/** is untouched.
#
# Keep in sync with the @Path REST-client interfaces in
# tools/dotcms-cli/api-data-model/src/main/java/com/dotcms/api/*API.java
cli_endpoints: &cli_endpoints
  - 'dotCMS/src/main/java/com/dotcms/rest/api/v1/asset/**'           # AssetAPI          -> /v1/assets
  - 'dotCMS/src/main/java/com/dotcms/rest/api/v1/folder/**'          # FolderAPI         -> /v1/folder
  - 'dotCMS/src/main/java/com/dotcms/rest/api/v1/site/**'            # SiteAPI           -> /v1/site
  - 'dotCMS/src/main/java/com/dotcms/rest/api/v1/contenttype/**'     # ContentTypeAPI    -> /v1/contenttype
  - 'dotCMS/src/main/java/com/dotcms/rest/api/v2/languages/**'       # LanguageAPI       -> /v2/languages
  - 'dotCMS/src/main/java/com/dotcms/rest/api/v1/workflow/**'        # WorkflowAPI       -> /v1/workflow
  - 'dotCMS/src/main/java/com/dotcms/rest/api/v1/authentication/**'  # AuthenticationAPI -> /v1/authentication
  - 'dotCMS/src/main/java/com/dotcms/rest/api/v1/user/**'            # UserAPI           -> /v1/users
  - 'dotCMS/src/main/java/com/dotcms/rest/api/v1/analytics/event/**' # AnalyticsAPI      -> /v1/analytics/content/event
  # Asset push/pull is the CLI's heaviest workflow; WebAssetHelper (in the asset
  # package above) delegates into these asset-specific business APIs.
  - 'dotCMS/src/main/java/com/dotmarketing/portlets/fileassets/business/**' # FileAssetAPI
  - 'dotCMS/src/main/java/com/dotcms/browser/**'                            # BrowserAPI

# CLI test trigger: run the CLI integration tests when the CLI sources change OR
# when any server endpoint the CLI consumes changes. Distinct from `cli` (which
# gates the GraalVM native build) so endpoint-only changes don't force a rebuild.
cli_test: &cli_test
  - *cli
  - *cli_endpoints

sdk_libs:
  - 'core-web/libs/sdk/**'

# PR area labeling filters
# These are separate from test-triggering filters to avoid false positives
# (e.g., workflow changes should trigger backend tests but shouldn't label PR as "Area : Backend")
area_backend:
  - 'dotCMS/src/main/webapp/WEB-INF/messages/**/!(Language*.properties)'
  - 'dotCMS/!(src/main/webapp/WEB-INF/messages/)**'
  - 'dotcms-integration/**'
  - 'dotcms-postman/**'
  - 'test-karate/**'
  - 'bom/**'
  - 'build-parent/**'
  - 'parent/**'
  - 'osgi-base/**'
  - 'plugins-core/**'
  - 'maven-plugins/**'
  - 'independent-projects/**'
  - 'reports/**'
  - 'pom.xml'

area_frontend:
  - 'core-web/**'
  - 'dotCMS/src/main/webapp/html/**/*.{css,js}'

area_cli:
  - 'tools/dotcms-cli/**'

area_sdk:
  - 'core-web/libs/sdk/**'

area_documentation:
  - 'docs/**'
  - '*.md'
  - 'CLAUDE.md'
  - '.github/**/*.md'
  - 'core-web/*.md'
  - 'dotCMS/*.md'
  - 'tools/**/*.md'

# IMPORTANT: Negation patterns (like '!pattern') do NOT work correctly with dorny/paths-filter
#
# Due to OR logic in dorny/paths-filter, separate negation patterns match ANY file not
# matching the negation (e.g., '!.github/**/*.md' matches all files in core-web/, dotCMS/).
# This is a known bug: https://github.com/dorny/paths-filter/issues/97
#
# Solution Options:
# 1. Use explicit positive patterns (simple, clear) - PREFERRED for most cases
#    Example: list each file/directory explicitly
# 2. Use picomatch inline negation !(pattern) - ONLY when explicit listing is impractical
#    Example (already used in backend filter): dotCMS/src/main/webapp/html/**/!(*.{css,js})
#    This matches all files in the path EXCEPT .css and .js files
#
# For area_cicd, we use option 1: wildcards for directories with many files (workflows/,
# actions/) and explicit paths for individual config files.
#
# This filter matches CI/CD code and configuration that affects build/test/deploy:
# - GitHub Actions workflows (all files in workflows/)
# - Custom GitHub Actions (all files in actions/)
# - CI/CD configuration files (filters, labels, test matrix)
#
# Does NOT match (intentionally excluded by not listing):
# - ISSUE_TEMPLATE/ and PULL_REQUEST_TEMPLATE/ (non-code metadata)
# - data/ directory (reference data like slack-mappings.json)
# - instructions/ directory (documentation)
# - *.md files (documentation)
# - copilot-instructions.md (AI tool configuration)
area_cicd:
  - '.github/workflows/**'
  - '.github/actions/**'
  - '.github/filters.yaml'
  - '.github/area-labels.yml'
  - '.github/test-matrix.yml'

jvm_unit_test:
  - *backend
  - *cli

build:
  - *backend
  - *cli
  - *frontend
