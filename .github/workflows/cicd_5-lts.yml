#
# GitHub Actions Workflow for LTS Auto-run Tests
# This file is a GitHub Actions workflow configuration for running automated tests on long-term support (LTS) branches.
# It defines a series of jobs that are triggered on pushes to branches matching the pattern release-*. The workflow includes the following jobs:
# Initialize: Sets up the environment and performs initial validation.
# Build: Compiles the project if no artifacts were found during initialization.
# Test: Runs various tests (unit, integration, frontend, etc.) based on the outputs from the initialization step.
# Finalize: Aggregates and finalizes the results from the previous jobs.
# The workflow uses concurrency control to manage multiple runs and cancels in-progress runs for the same branch or pull request to prevent delays.
#

name: 'LTS Auto-run Tests'

on:
  push:
    branches:
      - release-*
  workflow_dispatch:
    inputs:
      version:
        description: 'Build version for Docker image tagging (e.g. 26.04.28-03). Defaults to the revision in .mvn/maven.config when left empty.'
        required: false
        type: string
        default: ''

# Concurrency group to manage multiple runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  # Cancel any in-progress runs for the same branch/PR to prevent delays from changes during build
  cancel-in-progress: true

jobs:
  # Initialize the LTS check process
  initialize:
    name: Initialize
    uses: ./.github/workflows/cicd_comp_initialize-phase.yml
    with:
      change-detection: 'enabled'

  # Resolve the build version: use the workflow_dispatch input when provided, otherwise
  # read -Drevision and -Dchangelist from .mvn/maven.config on the current branch.
  # This ensures the Docker image tag always matches what Maven computes for project.version.
  setup:
    name: Resolve Version
    runs-on: ubuntu-${{ vars.UBUNTU_RUNNER_VERSION || '24.04' }}
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version from input or maven.config
        id: resolve
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            if [[ ! "$INPUT_VERSION" =~ ^[0-9]{2}\.[0-9]{2}\.[0-9]{2}(-[0-9]{1,2}|_lts_v[0-9]{1,2})$ ]]; then
              echo "::error::Invalid version format: '$INPUT_VERSION'. Expected format: yy.mm.dd-## (e.g. 26.04.28-03)"
              exit 1
            fi
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            revision=$(grep -oP '(?<=-Drevision=)\S+' .mvn/maven.config 2>/dev/null || true)
            changelist=$(grep -oP '(?<=-Dchangelist=)\S+' .mvn/maven.config 2>/dev/null || true)
            echo "version=${revision}${changelist}" >> "$GITHUB_OUTPUT"
          fi

  # Build job - only runs if no artifacts were found during initialization
  build:
    name: PR Build
    needs: [ initialize, setup ]
    if: fromJSON(needs.initialize.outputs.filters).build == 'true' && needs.initialize.outputs.found_artifacts == 'false'
    uses: ./.github/workflows/cicd_comp_build-phase.yml
    with:
      core-build: true
      run-pr-checks: false
      version: ${{ needs.setup.outputs.version }}
    permissions:
      contents: read
      packages: write

  # Test job - runs various tests based on initialization outputs
  test:
    name: PR Test
    needs: [ initialize,build ]
    if: always() && !failure() && !cancelled()
    uses: ./.github/workflows/cicd_comp_test-phase.yml
    with:
      jvm_unit_test: ${{ fromJSON(needs.initialize.outputs.filters).jvm_unit_test == 'true' }}
      integration: ${{ fromJSON(needs.initialize.outputs.filters).backend == 'true' }}
      postman: ${{ fromJSON(needs.initialize.outputs.filters).backend == 'true' }}
      karate: ${{ fromJSON(needs.initialize.outputs.filters).backend == 'true' }}
      frontend: ${{ fromJSON(needs.initialize.outputs.filters).frontend == 'true' }}
      cli: ${{ fromJSON(needs.initialize.outputs.filters).cli == 'true' }}
      e2e: false
    secrets:
      DOTCMS_LICENSE: ${{ secrets.DOTCMS_LICENSE }}

  # Finalize job - aggregates results from previous jobs
  finalize:
    name: Finalize
    if: always()
    needs: [ test ]
    uses: ./.github/workflows/cicd_comp_finalize-phase.yml
    with:
      needsData: ${{ toJson(needs) }}
