#
# Release Java Variant Workflow
#
# This workflow builds alternate Java versions for a release. It is MANUAL-ONLY
# (workflow_dispatch); the automatic trigger on release-* branches was removed
# once Java 25 became the default build (see #33865), making the parallel
# java-25 variant redundant with the primary release image.
#
# Architecture:
# Dispatch this workflow against a release branch/tag to build an alternate Java
# variant from the SAME release source. Both the primary release and this variant
# build from identical source code, differing only in Java version and artifact
# suffix.
#
# This variant workflow:
# - Uses alternate Java version for compilation (e.g., Java 25 vs Java 21)
# - Overrides -Dchangelist at runtime to create different Maven version
#   (e.g., 25.02.16-01-java-25 vs 25.02.16-01)
# - Adds artifact suffix to distinguish build artifacts and Docker tags
# - Skips operations already performed by primary (javadocs, plugins, labels)
#
# Concurrency:
# Different Java versions run in parallel, but duplicate builds of the same
# Java version for the same release are prevented via concurrency groups.
#
# Configuration:
# There are NO repository-variable defaults. The default Java version lives in ONE
# place: the release branch's .sdkmanrc (built by the primary release workflow).
# Building a variant requires deliberately dispatching with a java_version that
# differs from that default; the workflow fails fast otherwise.
#

name: '-7 Release Java Variant'
run-name: "Release Java Variant - ${{ inputs.release_branch }}${{ inputs.java_version && format(' [{0}]', inputs.java_version) || '' }}"

on:
  # This workflow is manual-only and can be repurposed for other variants
  # (e.g. a future java-29 build) by dispatching with an explicit java_version.
  workflow_dispatch:
    inputs:
      release_branch:
        description: 'Release branch name (e.g., release-25.02.16-01)'
        required: true
        type: string
      java_version:
        description: 'Java version to build (SDKMAN format, e.g., 21.0.8-ms). Must differ from the release branch .sdkmanrc default — the primary release image already covers the default.'
        required: true
        type: string
      artifact_suffix:
        description: 'Artifact suffix without leading separator (e.g., java-25, java-25-ms). Separators added automatically: dash (-) for Maven artifacts, underscore (_) for Docker tags. If not set, derived from java-version major (e.g., java-25).'
        required: false
        type: string
        default: ''

# Prevent duplicate runs for the same release branch AND Java version
# Different Java versions can run in parallel, but duplicate builds of the same version are prevented
concurrency:
  # Key on the release_branch input, not github.ref_name: with workflow_dispatch the
  # ref is the branch the workflow was dispatched from (usually main), which would
  # collapse all dispatches into one group and cancel in-flight builds for other releases.
  group: release-java-variant-${{ inputs.release_branch }}-${{ inputs.java_version }}
  cancel-in-progress: true

jobs:
  # Extract version from branch name
  extract-version:
    name: Extract Version
    runs-on: ubuntu-${{ vars.UBUNTU_RUNNER_VERSION || '24.04' }}
    outputs:
      version: ${{ steps.parse.outputs.version }}
      tag: ${{ steps.parse.outputs.tag }}
      branch: ${{ steps.parse.outputs.branch }}
    steps:
      - name: Parse Version from Branch
        id: parse
        run: |
          # workflow_dispatch is the only trigger; the release branch always comes from the input
          branch="${{ inputs.release_branch }}"

          # Extract version from release-{version} branch name
          if [[ ! ${branch} =~ ^release- ]]; then
            echo "Error: Branch name must start with 'release-'"
            exit 1
          fi

          version=${branch#release-}
          tag="v${version}"

          {
            echo "version=${version}"
            echo "tag=${tag}"
            echo "branch=${branch}"
          } >> "$GITHUB_OUTPUT"

          echo "Extracted version: ${version}"
          echo "Release tag: ${tag}"
          echo "Release branch: ${branch}"

      # The default Java lives in ONE place: the release branch's .sdkmanrc, which the
      # primary release already builds. A variant build must target something different —
      # fail fast on an empty or same-as-default request rather than producing a
      # redundant duplicate of the primary release image.
      - name: Require Non-Default Java Version
        env:
          GH_TOKEN: ${{ github.token }}
          JAVA_VERSION: ${{ inputs.java_version }}
        run: |
          branch="${{ steps.parse.outputs.branch }}"

          if [[ -z "${JAVA_VERSION}" ]]; then
            echo "Error: java_version is required. The primary release already builds the .sdkmanrc default; variant builds must explicitly target a different Java version."
            exit 1
          fi

          default_java=$(gh api "repos/${{ github.repository }}/contents/.sdkmanrc?ref=${branch}" --jq .content | base64 --decode | awk -F= '/^java=/ {print $2}')
          echo "Default Java on ${branch} (.sdkmanrc): ${default_java}"
          echo "Requested variant Java version:        ${JAVA_VERSION}"

          if [[ "${JAVA_VERSION}" == "${default_java}" ]]; then
            echo "Error: requested java_version (${JAVA_VERSION}) equals the ${branch} default — the primary release image already covers it. Nothing to build."
            exit 1
          fi

  # Initialize - standard initialization phase
  initialize:
    name: Initialize
    needs: [ extract-version ]
    uses: ./.github/workflows/cicd_comp_initialize-phase.yml
    with:
      change-detection: 'disabled'  # Release builds everything - no change detection needed

  # Build - standard build phase with Java version override
  build:
    name: Build
    needs: [ extract-version, initialize ]
    uses: ./.github/workflows/cicd_comp_build-phase.yml
    with:
      core-build: true
      run-pr-checks: false
      ref: ${{ needs.extract-version.outputs.tag }}
      validate: false
      version: ${{ needs.extract-version.outputs.version }}
      generate-docker: true
      java-version: ${{ inputs.java_version }}
      artifact-suffix: ${{ inputs.artifact_suffix }}
    permissions:
      contents: read
      packages: write

  # Deployment - standard deployment phase for Docker images
  deployment:
    name: Deployment
    needs: [ extract-version, initialize, build ]
    if: always() && !failure() && !cancelled()
    uses: ./.github/workflows/cicd_comp_deployment-phase.yml
    with:
      environment: 'release'
      tag-identifier: ${{ needs.extract-version.outputs.version }}
      omit-environment-prefix: true
      artifact-run-id: ${{ github.run_id }}
      deploy-dev-image: true
      java-version: ${{ inputs.java_version }}
      artifact-suffix: ${{ inputs.artifact_suffix }}
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      EE_REPO_USERNAME: ${{ secrets.EE_REPO_USERNAME }}
      EE_REPO_PASSWORD: ${{ secrets.EE_REPO_PASSWORD }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      DEV_REQUEST_TOKEN: ${{ secrets.DEV_REQUEST_TOKEN }}

  # Release - release-specific operations (Artifactory only, skip one-time operations)
  release:
    name: Release
    needs: [ extract-version, initialize, build, deployment ]
    if: always() && !failure() && !cancelled()
    uses: ./.github/workflows/cicd_comp_release-phase.yml
    with:
      release_version: ${{ needs.extract-version.outputs.version }}
      release_tag: ${{ needs.extract-version.outputs.tag }}
      artifact_run_id: ${{ github.run_id }}
      deploy_artifact: true
      upload_javadocs: false      # Skip - already done by primary release
      update_plugins: false        # Skip - already done by primary release
      update_github_labels: false  # Skip - already done by primary release
      java-version: ${{ inputs.java_version }}
      artifact-suffix: ${{ inputs.artifact_suffix }}
    secrets:
      EE_REPO_USERNAME: ${{ secrets.EE_REPO_USERNAME }}
      EE_REPO_PASSWORD: ${{ secrets.EE_REPO_PASSWORD }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      CI_MACHINE_TOKEN: ${{ secrets.CI_MACHINE_TOKEN }}

  # Finalize - standard finalization phase
  finalize:
    name: Finalize
    if: always()
    needs: [ initialize, build, deployment, release ]
    uses: ./.github/workflows/cicd_comp_finalize-phase.yml
    with:
      artifact-run-id: ${{ github.run_id }}
      needsData: ${{ toJson(needs) }}
