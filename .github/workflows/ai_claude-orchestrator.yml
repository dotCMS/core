name: Claude AI Orchestrator

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode for debugging'
        required: false
        type: boolean
        default: false
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

jobs:
  # Security gate: Check if user is dotCMS organization member
  #
  # REQUIREMENTS FOR CLAUDE ACCESS:
  # 1. Must be a member of the dotCMS organization
  # 2. Membership must be set to PUBLIC visibility
  #
  # TROUBLESHOOTING: If blocked, visit https://github.com/orgs/dotCMS/people
  # and ensure your membership is public (click "Make public" if needed)
  security-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read           # Allow repository checkout
      # Note: Organization membership checking uses fine-grained token
      # so no additional GITHUB_TOKEN permissions needed for that API
    outputs:
      authorized: ${{ steps.membership-check.outputs.is_member }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check organization membership
        id: membership-check
        uses: ./.github/actions/security/org-membership-check
        with:
          username: ${{ github.event.comment.user.login || github.actor }}

      - name: Log security decision
        run: |
          if [ "${{ steps.membership-check.outputs.is_member }}" = "true" ]; then
            echo "✅ Access granted: User is a dotCMS organization member"
          else
            echo "❌ Access denied: User failed dotCMS organization membership check"
            echo ""
            echo "📋 TROUBLESHOOTING: If you are a dotCMS team member:"
            echo "   1. Visit https://github.com/orgs/dotCMS/people"
            echo "   2. Ensure your membership is set to 'Public'"
            echo "   3. If you're not listed, contact an organization owner"
            echo ""
            echo "::warning::Unauthorized user attempted to trigger Claude workflow: ${{ github.event.comment.user.login || github.actor }}"
          fi

  # Interactive Claude mentions (simplified using centralized logic)
  # Stays on Anthropic Claude — @claude is intentionally the Claude brand and
  # developers expect Claude-specific tool use (Bash, Agent, etc.) when they invoke it.
  claude-interactive:
    needs: security-check
    # Never cancel in-progress interactive sessions — a user may be mid-conversation
    concurrency:
      group: claude-interactive-${{ github.event.pull_request.number || github.event.issue.number || 'manual' }}
      cancel-in-progress: false
    if: |
      needs.security-check.outputs.authorized == 'true' &&
      (
        github.event_name == 'issue_comment' ||
        github.event_name == 'pull_request_review_comment' ||
        (
          github.event_name == 'pull_request' && (
            contains(github.event.pull_request.title, '@claude') ||
            contains(github.event.pull_request.title, '@Claude') ||
            contains(github.event.pull_request.title, '@CLAUDE') ||
            contains(github.event.pull_request.body, '@claude') ||
            contains(github.event.pull_request.body, '@Claude') ||
            contains(github.event.pull_request.body, '@CLAUDE')
          )
        )
      )
    uses: dotCMS/ai-workflows/.github/workflows/claude-orchestrator.yml@v3.1.1
    with:
      model_id: ${{ vars.BEDROCK_MODEL_ID }}
      bedrock_role_arn: ${{ vars.BEDROCK_ROLE_ARN }}
      trigger_mode: interactive
      claude_args: '--allowedTools "Bash(git status),Bash(git diff)"'
      timeout_minutes: 15
      runner: ubuntu-latest
      enable_mention_detection: true  # Uses built-in @claude mention detection
      # custom_trigger_condition: |    # Optional: Override default mention detection
      #   your custom condition here
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # Automatic PR reviews (no @claude mention)
  # Uses GPT-5.5 via AWS Bedrock Mantle for model diversity — Claude writes code here,
  # GPT reviews it so training/weighting biases from one model family don't carry into
  # the review. Interactive @claude sessions remain on Anthropic Claude (job above).
  gpt-automatic-review:
    needs: security-check
    # Cancel in-progress automatic reviews when a new push arrives — always review latest state
    concurrency:
      group: claude-automatic-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    if: |
      needs.security-check.outputs.authorized == 'true' &&
      github.event_name == 'pull_request' &&
      !contains(github.event.pull_request.title, '@claude') &&
      !contains(github.event.pull_request.title, '@Claude') &&
      !contains(github.event.pull_request.title, '@CLAUDE') &&
      !contains(github.event.pull_request.body, '@claude') &&
      !contains(github.event.pull_request.body, '@Claude') &&
      !contains(github.event.pull_request.body, '@CLAUDE')
    uses: dotCMS/ai-workflows/.github/workflows/claude-orchestrator.yml@v3.1.1
    with:
      model_id: openai.gpt-5.5
      bedrock_role_arn: ${{ vars.BEDROCK_ROLE_ARN }}
      trigger_mode: automatic
      reasoning_effort: medium
      prompt: |
        You are reviewing a pull request for **dotCMS**, a Java/Angular headless CMS platform (Java 25 + Maven backend, Angular 19 + Nx frontend).

        Review only what's in the diff. Be direct and specific — include file and line for every finding. Skip praise, summaries, and style nitpicks. Do not invent issues.

        Check for:
        1. **Bugs** — logic errors, null dereferences, off-by-one, missing edge cases, race conditions
        2. **Security** — SQL injection (`DotConnect + addParam()` required, never string concat), missing permission checks (`hasPermission` / `DotSecurityException`), sensitive data in logs, hardcoded secrets, unvalidated input in file paths or system calls
        3. **dotCMS conventions** — `Config.getStringProperty()` not `System.getProperty/getenv`; `Logger` not `System.out`; `APILocator`/`FactoryLocator` for service access; `@WrapInTransaction` on multi-step DB writes; add dependency versions to `bom/application/pom.xml` only (never `dotCMS/pom.xml`)
        4. **Design** — wrong layer of concern, broken abstraction, unnecessary complexity
        5. **Test gaps** — meaningful new behavior with no test coverage

        Format each finding as:
        > **[🔴 Critical | 🟠 High | 🟡 Medium]** `path/to/file:line` — what's wrong and why it matters

        If the PR is clean, say so in one sentence.
      timeout_minutes: 20
      runner: ubuntu-latest
      enable_mention_detection: false
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # Note: rollback safety analysis has moved to its own workflow:
  #   .github/workflows/ai_claude-rollback-safety.yml
