name: evergreen-tracks-promote
on:
  schedule:
    - cron: '17 6 * * *'   # daily at 06:17 UTC
  workflow_dispatch:
    inputs:
      repo:
        description: 'Docker repo to operate on'
        required: true
        default: 'dotcms/dotcms'
      apply:
        description: 'Actually move tags (false = dry-run)'
        required: true
        default: 'false'
      standard_days:
        description: 'Min age (days) for the standard track'
        required: false
        default: '14'
      trailing_days:
        description: 'Min age (days) for the trailing track'
        required: false
        default: '28'

permissions:
  contents: read

# Serialize promote runs so a scheduled run and a manual promote/admin run can
# never overlap. Both read live registry state and then apply tag moves, so two
# concurrent runs could act on stale state and overwrite a hold/taint or move a
# track based on outdated data. For a tag-promotion engine queueing is safer
# than cancelling, so cancel-in-progress is false: concurrent runs wait their
# turn rather than aborting mid-promote and leaving tags half-moved.
concurrency:
  group: evergreen-tracks-promote-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-${{ vars.UBUNTU_RUNNER_VERSION || '24.04' }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: docker/setup-buildx-action@v3
      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Promote tracks
        working-directory: cicd/evergreen-tracks
        env:
          # Scheduled runs default to dotcms/dotcms; dispatch can override.
          REPO: ${{ github.event.inputs.repo || 'dotcms/dotcms' }}
          STANDARD_DAYS: ${{ github.event.inputs.standard_days || '14' }}
          TRAILING_DAYS: ${{ github.event.inputs.trailing_days || '28' }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_APPLY: ${{ github.event.inputs.apply }}
          # Production safety gate: the daily cron only moves real tags when the
          # repo variable EVERGREEN_TRACKS_APPLY is set to 'true'. Until then the
          # scheduled run is a dry-run, so merging this workflow does not silently
          # start mutating dotcms/dotcms.
          SCHEDULED_APPLY: ${{ vars.EVERGREEN_TRACKS_APPLY }}
        run: |
          APPLY=""
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$DISPATCH_APPLY" = "true" ]; then
            APPLY="--apply"
          fi
          if [ "$EVENT_NAME" = "schedule" ] && [ "$SCHEDULED_APPLY" = "true" ]; then
            APPLY="--apply"
          fi
          echo "event=$EVENT_NAME repo=$REPO apply=${APPLY:-<dry-run>}"
          uv run evergreen-tracks promote \
            --repo "$REPO" \
            --standard-days "$STANDARD_DAYS" \
            --trailing-days "$TRAILING_DAYS" \
            $APPLY
