#
# Changelog Site Publish Phase (Reusable Component)
#
# Generates SITE-format release notes and publishes them to the public changelog on
# dev.dotcms.com by upserting a Dotcmsbuilds contentlet on the corpsites-headless backend
# and firing the System Workflow Publish action (goes live with no approval step).
#
# Called by the release pipeline (cicd_6-release.yml) after release-notes, gated on
# release-prepare's is_latest (current-track GA only). Runs non-blocking (allow_failure) so
# a changelog hiccup never fails the software release (FR-008).
#
# --- D2a decision (one Claude call vs two) -------------------------------------------------
# The GitHub release notes (cicd_comp_ai-release-notes-phase.yml -> /tmp/release-notes.md)
# and the SITE notes (this phase -> /tmp/site-release-notes.md) are produced by TWO separate
# claude-code-action calls against TWO templates, NOT one combined call. Rationale: it leaves
# the existing GitHub-notes phase completely untouched, keeps the site path independently
# retriable (a site failure never re-touches the GitHub release), and each template stays
# single-purpose. Both derive from the same deterministic gather-release-data JSON, so the
# two calls cannot drift on the underlying facts (the spec's drift-prevention strategy).
#

name: Changelog Site Publish Phase

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v26.07.10-01)'
        required: true
        type: string
      release_version:
        description: 'Release version / minor field, no v prefix (e.g., 26.07.10-01)'
        required: true
        type: string
      docker_tags:
        description: 'Space-separated docker image tags produced by the deployment phase'
        required: true
        type: string
      previous_tag:
        description: 'Previous release tag for diff range. If omitted, auto-detected.'
        required: false
        type: string
      allow_failure:
        description: 'If true, job failures are non-blocking (used by release pipeline). Defaults to false.'
        required: false
        type: boolean
        default: false
      slack_channel_id:
        description: 'Slack channel id for failure/skip notices. Defaults to #dot-releases.'
        required: false
        type: string
        default: 'CE1TBQU00'  # #dot-releases (public). Pass an override to post elsewhere.
    secrets:
      ANTHROPIC_API_KEY:
        required: true
        description: 'Anthropic API key for Claude'
      DOTCMS_DEVSITE_TOKEN:
        required: true
        description: 'Service-account bearer token for the corpsites-headless backend'
      SLACK_BOT_TOKEN:
        required: true
        description: 'Slack bot token for #dot-releases failure/skip notifications'
      CI_MACHINE_TOKEN:
        required: false
        description: 'GitHub token for release/PR reads (falls back to github.token)'

jobs:
  publish-site-changelog:
    name: Publish Site Changelog
    runs-on: ubuntu-${{ vars.UBUNTU_RUNNER_VERSION || '24.04' }}
    continue-on-error: ${{ inputs.allow_failure }}
    permissions:
      contents: read       # checkout + gh release reads
      pull-requests: read  # Octokit pulls.get for PR details in gather-release-data
      id-token: write      # Required by claude-code-action for OIDC
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      RELEASE_VERSION: ${{ inputs.release_version }}
      PREVIOUS_TAG: ${{ inputs.previous_tag }}
      REPO: ${{ github.repository }}
    # Defense-in-depth: skip non-standard releases (CLI, LTS). The primary gate is the
    # is_latest guard on the calling job in cicd_6-release.yml.
    if: >-
      !contains(inputs.release_tag, 'dotcms-cli-')
      && !contains(inputs.release_tag, '_lts_')
      && startsWith(inputs.release_tag, 'v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install script dependencies
        working-directory: .github/scripts/gather-release-data
        run: npm ci

      - name: Build TypeScript
        working-directory: .github/scripts/gather-release-data
        run: npx tsc

      - name: Gather release data
        working-directory: .github/scripts/gather-release-data
        env:
          GITHUB_TOKEN: ${{ secrets.CI_MACHINE_TOKEN || github.token }}
        run: |
          if [ -n "$PREVIOUS_TAG" ]; then
            node dist/index.js --repo "$REPO" --to-tag "$RELEASE_TAG" --from-tag "$PREVIOUS_TAG" \
              > /tmp/release-data.json 2>/tmp/gather-stderr.log
          else
            node dist/index.js --repo "$REPO" --to-tag "$RELEASE_TAG" \
              > /tmp/release-data.json 2>/tmp/gather-stderr.log
          fi
          cat /tmp/gather-stderr.log
          if ! jq empty /tmp/release-data.json 2>/dev/null; then
            echo "Error: gather-release-data output is not valid JSON"
            cat /tmp/release-data.json
            exit 1
          fi

      - name: Assemble prompt
        run: |
          cat .github/scripts/gather-release-data/prompt-template-site.md > /tmp/site-prompt.md
          printf '\n---\n\n## Release Data (JSON)\n\n```json\n' >> /tmp/site-prompt.md
          cat /tmp/release-data.json >> /tmp/site-prompt.md
          printf '\n```\n' >> /tmp/site-prompt.md

          # Pass prompt via env file with a random delimiter so PR body content cannot
          # terminate the heredoc early (same guard as the GitHub-notes phase).
          DELIM="PROMPT_$(openssl rand -hex 16)"
          {
            echo "PROMPT_CONTENT<<${DELIM}"
            cat /tmp/site-prompt.md
            echo "${DELIM}"
          } >> "$GITHUB_ENV"

      - name: Generate site notes with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ env.PROMPT_CONTENT }}
          claude_args: "--allowedTools Write --max-turns 3"

      - name: Verify generated notes
        run: |
          # -s (non-empty), not -f: an empty file would publish an empty releaseNotes.
          if [ ! -s /tmp/site-release-notes.md ]; then
            echo "Error: Claude did not generate a non-empty /tmp/site-release-notes.md"
            ls -la /tmp/*.md 2>/dev/null || echo "No .md files in /tmp/"
            exit 1
          fi
          echo "Generated site notes ($(wc -l < /tmp/site-release-notes.md) lines)."

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Publish to site
        id: publish
        working-directory: .github/actions/core-cicd/changelog-publisher
        env:
          # Read once by the tool; never echoed to logs / GITHUB_OUTPUT / step summary.
          DOTCMS_DEVSITE_TOKEN: ${{ secrets.DOTCMS_DEVSITE_TOKEN }}
          # Service-account modUser id for human-edit protection (FR-011). --force is never
          # passed here — override is a manual operator re-run only.
          DOTCMS_DEVSITE_SERVICE_ACCOUNT: ${{ vars.DOTCMS_DEVSITE_SERVICE_ACCOUNT }}
          DOCKER_TAGS: ${{ inputs.docker_tags }}
        run: |
          # Pick the sha-tagged dotcms/dotcms image (version_sha form, e.g.
          # dotcms/dotcms:26.07.10-01_84b0486). The `_` in the glob excludes the floating
          # `:latest` tag (which deploy-docker emits without a sha). Assumes deploy-docker
          # emits the sha-tagged ref; if only the sha-less tag exists we fall back to it.
          DOCKER_IMAGE=""
          for tag in $DOCKER_TAGS; do
            case "$tag" in
              dotcms/dotcms:*_*) DOCKER_IMAGE="$tag"; break;;
            esac
          done
          [ -n "$DOCKER_IMAGE" ] || DOCKER_IMAGE="dotcms/dotcms:${RELEASE_VERSION}"

          # Capture the tool's exit code + stdout so the Slack steps can branch on the
          # T005 contract (0 = success/skip via ::changelog-skip:: marker; non-zero = failure).
          # This step itself always exits 0 so the branch steps run and the release is never
          # blocked (FR-008); the job is also allow_failure as belt-and-suspenders.
          set +e
          OUTPUT=$(uv run changelog-publisher publish \
            --version "$RELEASE_VERSION" \
            --notes-file /tmp/site-release-notes.md \
            --docker-image "$DOCKER_IMAGE" \
            --released-date "$(date -u +%F)" \
            --apply 2>&1)
          RC=$?
          set -e
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q '::changelog-skip::'; then
            REASON=$(echo "$OUTPUT" | grep -o '::changelog-skip::.*' | head -1 | sed 's/.*reason=//')
            echo "result=skip" >> "$GITHUB_OUTPUT"
            echo "reason=${REASON}" >> "$GITHUB_OUTPUT"
          elif [ "$RC" -ne 0 ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "reason=publisher exited ${RC}" >> "$GITHUB_OUTPUT"
          else
            echo "result=success" >> "$GITHUB_OUTPUT"
          fi

      # Slack branch (FR-008, US3): failure and protective-skip post DIFFERENT wording to
      # #dot-releases; success posts nothing. The release is unaffected either way.
      - name: Notify Slack on failure
        if: steps.publish.outputs.result == 'failure'
        uses: ./.github/actions/core-cicd/notification/notify-slack
        with:
          channel-id: ${{ inputs.slack_channel_id }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: >-
            :rotating_light: *Changelog site publish FAILED* for `${{ inputs.release_version }}`
            (${{ steps.publish.outputs.reason }}). The GitHub release is published and
            unaffected. Re-run to retry:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notify Slack on skip
        if: steps.publish.outputs.result == 'skip'
        uses: ./.github/actions/core-cicd/notification/notify-slack
        with:
          channel-id: ${{ inputs.slack_channel_id }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: >-
            :warning: *Changelog site publish SKIPPED* for `${{ inputs.release_version }}` —
            ${{ steps.publish.outputs.reason }}. The existing entry was left untouched;
            overwriting requires a manual `--force` re-run.

      # Catch-all (SC-005): the two steps above only fire when the publisher step ran and set
      # an output. A failure in any EARLIER step (npm ci, tsc, gather-release-data, Claude
      # generation, verify-notes) would skip them, and allow_failure would keep the run green
      # — no entry AND no notification. This posts a generic failure notice for those cases so
      # a pre-publisher failure is never silent. `failure()` here excludes the handled
      # success/skip results (the publisher step exits 0, so the job isn't in a failure state
      # for those).
      - name: Notify Slack on pre-publisher failure
        if: failure()
        uses: ./.github/actions/core-cicd/notification/notify-slack
        with:
          channel-id: ${{ inputs.slack_channel_id }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: >-
            :rotating_light: *changelog-site-publish failed before the publisher step* for
            `${{ inputs.release_version }}` (generation or setup error). No changelog entry was
            published. The GitHub release is unaffected. See run:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
