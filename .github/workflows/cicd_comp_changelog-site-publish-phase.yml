#
# Changelog Site Publish Phase (Reusable Component)
#
# Publishes the release's changelog to the public changelog on dev.dotcms.com by upserting
# a Dotcmsbuilds contentlet on the corpsites-headless backend and firing the System
# Workflow Publish action (goes live with no approval step).
#
# There is NO generation in this phase: the GitHub release body (already written by the
# ai-release-notes phase from the shared editorial template) IS the changelog content —
# one artifact, both destinations, drift structurally impossible. The publisher injects
# the site's per-version heading anchors mechanically at publish time. A hand-edit to the
# GitHub release followed by a re-run re-syncs the site.
#
# Called by the release pipeline (cicd_6-release.yml) after release-notes, gated on
# release-prepare's is_latest (current-track GA only). Runs non-blocking (allow_failure) so
# a changelog hiccup never fails the software release (FR-008).
#

name: Changelog Site Publish Phase

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v26.07.10-01)'
        required: true
        type: string
      release_version:
        description: 'Release version / minor field, no v prefix (e.g., 26.07.10-01)'
        required: true
        type: string
      docker_tags:
        description: 'Space-separated docker image tags produced by the deployment phase'
        required: true
        type: string
      allow_failure:
        description: 'If true, job failures are non-blocking (used by release pipeline). Defaults to false.'
        required: false
        type: boolean
        default: false
      slack_channel_id:
        description: 'Slack channel id for failure/skip notices. Defaults to #dot-releases.'
        required: false
        type: string
        default: 'CE1TBQU00'  # #dot-releases (public). Pass an override to post elsewhere.
    secrets:
      DOTCMS_DEVSITE_TOKEN:
        required: true
        description: 'Service-account bearer token for the corpsites-headless backend'
      SLACK_BOT_TOKEN:
        required: true
        description: 'Slack bot token for #dot-releases failure/skip notifications'
      CI_MACHINE_TOKEN:
        required: false
        description: 'GitHub token for release/PR reads (falls back to github.token)'

jobs:
  publish-site-changelog:
    name: Publish Site Changelog
    runs-on: ubuntu-${{ vars.UBUNTU_RUNNER_VERSION || '24.04' }}
    continue-on-error: ${{ inputs.allow_failure }}
    # Serialize runs per version: a retry racing a re-run must never double-create the
    # entry (spec edge case; the publisher's post-create read-back closes the sequential
    # window, this closes the concurrent one). Queued, not cancelled — each run is cheap.
    concurrency:
      group: changelog-site-publish-${{ inputs.release_version }}
      cancel-in-progress: false
    permissions:
      contents: read       # checkout + gh release reads
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      RELEASE_VERSION: ${{ inputs.release_version }}
      REPO: ${{ github.repository }}
    # Defense-in-depth: skip non-standard releases (CLI, LTS). The primary gate is the
    # is_latest guard on the calling job in cicd_6-release.yml.
    if: >-
      !contains(inputs.release_tag, 'dotcms-cli-')
      && !contains(inputs.release_tag, '_lts_')
      && startsWith(inputs.release_tag, 'v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch release notes from the GitHub release
        env:
          GH_TOKEN: ${{ secrets.CI_MACHINE_TOKEN || github.token }}
        run: |
          # The published GitHub release body is the single shared changelog artifact.
          gh release view "$RELEASE_TAG" --repo "$REPO" --json body --jq .body \
            > /tmp/site-release-notes.md
          # -s (non-empty): an empty release body must not publish an empty releaseNotes.
          if [ ! -s /tmp/site-release-notes.md ]; then
            echo "Error: GitHub release $RELEASE_TAG has an empty body"
            exit 1
          fi
          echo "Fetched release notes ($(wc -l < /tmp/site-release-notes.md) lines)."

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Publish to site
        id: publish
        working-directory: .github/actions/core-cicd/changelog-publisher
        env:
          # Backend URL is a repo variable (not hardcoded in this public repo — PR review):
          # a backend migration is a variable change, not a code change.
          DOTCMS_DEVSITE_URL: ${{ vars.DOTCMS_DEVSITE_URL }}
          # Read once by the tool; never echoed to logs / GITHUB_OUTPUT / step summary.
          DOTCMS_DEVSITE_TOKEN: ${{ secrets.DOTCMS_DEVSITE_TOKEN }}
          # Service-account modUser id for human-edit protection (FR-011). --force is never
          # passed here — override is a manual operator re-run only.
          DOTCMS_DEVSITE_SERVICE_ACCOUNT: ${{ vars.DOTCMS_DEVSITE_SERVICE_ACCOUNT }}
          DOCKER_TAGS: ${{ inputs.docker_tags }}
        run: |
          # Pick the sha-tagged dotcms/dotcms image (version_sha form, e.g.
          # dotcms/dotcms:26.07.10-01_84b0486). The `_` in the glob excludes the floating
          # `:latest` tag (which deploy-docker emits without a sha). Assumes deploy-docker
          # emits the sha-tagged ref; if only the sha-less tag exists we fall back to it.
          DOCKER_IMAGE=""
          for tag in $DOCKER_TAGS; do
            case "$tag" in
              dotcms/dotcms:*_*) DOCKER_IMAGE="$tag"; break;;
            esac
          done
          [ -n "$DOCKER_IMAGE" ] || DOCKER_IMAGE="dotcms/dotcms:${RELEASE_VERSION}"

          # Capture the tool's exit code + stdout so the Slack step can branch on the
          # T005 contract (0 = success/skip via ::changelog-skip:: marker; non-zero = failure).
          # This step itself always exits 0 so the branch steps run and the release is never
          # blocked (FR-008); the job is also allow_failure as belt-and-suspenders.
          set +e
          OUTPUT=$(uv run changelog-publisher publish \
            --version "$RELEASE_VERSION" \
            --notes-file /tmp/site-release-notes.md \
            --docker-image "$DOCKER_IMAGE" \
            --released-date "$(date -u +%F)" \
            --apply 2>&1)
          RC=$?
          set -e
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q '::changelog-skip::'; then
            REASON=$(echo "$OUTPUT" | grep -o '::changelog-skip::.*' | head -1 | sed 's/.*reason=//')
            echo "result=skip" >> "$GITHUB_OUTPUT"
            echo "reason=${REASON}" >> "$GITHUB_OUTPUT"
          elif [ "$RC" -ne 0 ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "reason=publisher exited ${RC}" >> "$GITHUB_OUTPUT"
          else
            echo "result=success" >> "$GITHUB_OUTPUT"
          fi

      # Slack notice (FR-008, US3, SC-005): ONE step, one channel (#dot-releases). Fires on
      # publisher failure, protective skip, or any earlier step failing (`failure()` covers
      # the pre-publisher case, where result/reason are unset and the reason falls back).
      # Success posts nothing. The release is unaffected either way.
      - name: Notify Slack
        if: failure() || steps.publish.outputs.result == 'failure' || steps.publish.outputs.result == 'skip'
        uses: ./.github/actions/core-cicd/notification/notify-slack
        with:
          channel-id: ${{ inputs.slack_channel_id }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: >-
            ${{ steps.publish.outputs.result == 'skip'
                && ':warning: *Changelog site publish SKIPPED*'
                || ':rotating_light: *Changelog site publish FAILED*' }}
            for `${{ inputs.release_version }}` —
            ${{ steps.publish.outputs.reason || 'failed before the publisher step (release-body fetch or setup error)' }}.
            The GitHub release is published and unaffected. Run:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
