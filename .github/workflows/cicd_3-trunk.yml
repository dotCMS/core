# Trunk Checks Workflow
#
# This workflow is triggered on pushes to the main branch or manually via workflow_dispatch.
# It orchestrates a comprehensive set of checks, builds, tests, and deployments for the trunk (main) branch.
#
# Key features:
# - Triggered on push to main or manual dispatch
# - Configurable options for reusing previous builds and running all tests
# - Comprehensive checks including build, tests, and CLI artifact building
# - Deployment to the trunk environment
# - Final reporting of the workflow status

name: '-3 Trunk Workflow'
run-name: "Trunk${{ inputs.java-version && format(' [{0}]', inputs.java-version) || '' }}"

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      reuse-previous-build:
        description: 'Indicates if the workflow should reuse the previous build'
        type: boolean
        default: true
      build-on-missing-artifacts:
        type: boolean
        description: 'Indicates if the workflow should build on missing artifacts'
        default: false
      run-all-tests:
        description: 'Run all tests'
        type: boolean
        default: false
      java-version:
        description: 'Override Java version (SDKMAN format, e.g., 25.0.1-open)'
        type: string
        required: false
        default: ''
      maven-compiler-release:
        description: 'Override Maven compiler release version (e.g., 21). Preferred over source/target.'
        type: string
        required: false
        default: ''
      artifact-suffix:
        description: 'Override artifact suffix (e.g., -java25, -java25.0.1, -java25-ms). If not set, derived from java-version major.'
        type: string
        required: false
        default: ''

jobs:
  # Initialize the trunk check process
  initialize:
    name: Initialize
    uses: ./.github/workflows/cicd_comp_initialize-phase.yml
    with:
      reuse-previous-build: ${{ inputs.reuse-previous-build || github.event_name != 'workflow_dispatch' }}
      build-on-missing-artifacts: ${{ inputs.build-on-missing-artifacts || github.event_name != 'workflow_dispatch' }}
      # Enable change detection to determine if SDK libs changed (for publishing decision)
      # Note: Trunk doesn't use filter outputs for test selection - it uses run-all-tests input
      change-detection: 'enabled'      

  # Build job - only runs if no artifacts were found during initialization
  build:
    name: Trunk Build
    needs: [ initialize ]
    if: needs.initialize.outputs.found_artifacts == 'false'
    uses: ./.github/workflows/cicd_comp_build-phase.yml
    with:
      java-version: ${{ github.event.inputs.java-version || '' }}
      maven-compiler-release: ${{ github.event.inputs.maven-compiler-release || '' }}
      artifact-suffix: ${{ github.event.inputs.artifact-suffix || '' }}
    permissions:
      contents: read
      packages: write

  # Test job - runs various tests
  test:
    name: Trunk Test
    needs: [ initialize,build ]
    if: always() && !failure() && !cancelled()
    uses: ./.github/workflows/cicd_comp_test-phase.yml
    with:
      run-all-tests: ${{ inputs.run-all-tests || false }}
      artifact-run-id: ${{ needs.initialize.outputs.artifact-run-id }}
      e2e: false
      java-version: ${{ github.event.inputs.java-version || '' }}
      maven-compiler-release: ${{ github.event.inputs.maven-compiler-release || '' }}
      artifact-suffix: ${{ github.event.inputs.artifact-suffix || '' }}
    secrets:
      DOTCMS_LICENSE: ${{ secrets.DOTCMS_LICENSE }}
    permissions:
      contents: read
      packages: write

  # CLI Build job - builds CLI artifacts
  # Skipped when java-version is overridden due to GraalVM/Quarkus compatibility requirements
  build-cli:
    name: CLI Build
    needs: [ initialize,test ]
    if: always() && !failure() && !cancelled() && !inputs.java-version
    uses: ./.github/workflows/cicd_comp_cli-native-build-phase.yml
    with:
      buildNativeImage: true
      artifact-run-id: ${{ needs.initialize.outputs.artifact-run-id }}
      branch: ${{ github.ref }}

  # Deployment job - deploys to the trunk environment
  deployment:
    needs: [ initialize,build-cli,test ]
    if: always() && !failure() && !cancelled()
    uses: ./.github/workflows/cicd_comp_deployment-phase.yml
    with:
      artifact-run-id: ${{ needs.initialize.outputs.artifact-run-id }}
      deploy-cli: true
      environment: trunk
      # tag-identifier intentionally omitted: trunk uses only the environment name as its tag
      java-version: ${{ github.event.inputs.java-version || '' }}
      artifact-suffix: ${{ github.event.inputs.artifact-suffix || '' }}
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      EE_REPO_USERNAME: ${{ secrets.EE_REPO_USERNAME }}
      EE_REPO_PASSWORD: ${{ secrets.EE_REPO_PASSWORD }}
      NPM_ORG_TOKEN: ${{ secrets.NPM_ORG_TOKEN }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  # Publish SDK packages to the `next` npm dist-tag — internal dev/QA use only, never
  # date-lockstep-shaped, never recommended to customers (see issue #36701). Kept as its
  # own job (not folded into cicd_comp_deployment-phase.yml) so this trunk-only concern
  # can't affect nightly/manual/release, which don't opt into it.
  #
  # Version = the currently-published `latest` npm version, plus a `-next.<run_number>`
  # suffix — computed live on every run, no local VERSION file. Gated on the existing
  # sdk_libs change-detection filter (only publish when SDK files actually changed) and
  # skipped for manual workflow_dispatch runs.
  publish-sdk-next:
    name: Publish SDK (next)
    needs: [ initialize, test ]
    # Explicit success check on `test` (not the always()/!failure() idiom used by
    # sibling jobs) — this job publishes to a real, public npm registry, so it should
    # require `test` to have actually run and passed, not merely "didn't fail/wasn't
    # cancelled" (which also admits a skipped test job).
    if: >-
      needs.test.result == 'success' &&
      fromJSON(needs.initialize.outputs.filters).sdk_libs == 'true' &&
      github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-${{ vars.UBUNTU_RUNNER_VERSION || '24.04' }}
    steps:
      # Required before referencing any local (./) action below — the runner's
      # workspace is otherwise empty, so GitHub can't locate deploy-javascript-sdk's or
      # notify-slack's action.yml (same gap already hit and fixed once in
      # cicd_release-sdk.yml's publish job).
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: 'Compute next version'
        id: next-version
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_ORG_TOKEN }}
        run: |
          set -euo pipefail
          echo "//registry.npmjs.org/:_authToken=${NPM_AUTH_TOKEN}" > ~/.npmrc

          LATEST_VERSION=$(npm view @dotcms/client version)
          NEXT_VERSION="${LATEST_VERSION}-next.${{ github.run_number }}"

          echo "::notice:: Currently published latest version: $LATEST_VERSION"
          echo "::notice:: Publishing next version: $NEXT_VERSION"

          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: 'Publish SDK packages to NPM (next)'
        id: deploy-javascript-sdk
        uses: ./.github/actions/core-cicd/deployment/deploy-javascript-sdk
        with:
          ref: ${{ github.sha }}
          version: ${{ steps.next-version.outputs.version }}
          npm-tag: next
          npm-token: ${{ secrets.NPM_ORG_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Slack Notification (SDK next announcement)'
        if: success() && steps.deploy-javascript-sdk.outputs.published == 'true'
        continue-on-error: true
        uses: ./.github/actions/core-cicd/notification/notify-slack
        with:
          channel-id: "log-sdk-libs"
          payload: |
            > :large_orange_circle: *Attention dotters:* SDK libs published to `next`!
            >
            > This automated script is happy to announce that a new *_SDK libs_* version *tagged as:* [ `${{ steps.next-version.outputs.version }}` ] is now available on the `NPM` registry under the `next` tag :package:. This is an internal dev/QA build, not an official release — do not recommend it to customers.
            > `npm install @dotcms/client@next`
            > <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|View commit> · <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: 'Slack Notification (SDK next failure)'
        if: failure()
        continue-on-error: true
        uses: ./.github/actions/core-cicd/notification/notify-slack
        with:
          channel-id: "log-sdk-libs"
          payload: |
            > :red_circle: *SDK `next` publish FAILED!*
            >
            > The automated SDK `next` publish failed while trying to publish version `${{ steps.next-version.outputs.version }}`.
            > <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|View commit> · <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run — check logs for details>
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}

  # Finalize job - aggregates results from previous jobs
  finalize:
    name: Finalize
    if: always()
    needs: [ initialize, build, build-cli, test, deployment, publish-sdk-next ]
    uses: ./.github/workflows/cicd_comp_finalize-phase.yml
    with:
      artifact-run-id: ${{ needs.initialize.outputs.artifact-run-id }}
      needsData: ${{ toJson(needs) }}

  # Report job - generates and sends the final workflow report
  report:
    name: Report
    if: always()
    needs: [ finalize ]
    uses: ./.github/workflows/cicd_post-workflow-reporting.yml
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}