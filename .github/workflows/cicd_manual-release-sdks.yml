# DEPRECATED — retired by ADR-0019 (date-lockstep SDK versioning):
#   platform-adrs/decisions/0019-sdk-cms-date-lockstep-versioning.md
#
# SDK publishing no longer has an independent version or a manual trigger. Every dotCMS
# release now automatically publishes the matching @dotcms/* SDK packages at the release's
# exact version — see cicd_release-sdk.yml (triggered by `release: created`, same pattern
# already used by cicd_release-cli.yml for @dotcms/dotcli).
#
# This workflow is kept disabled (rather than deleted outright) for a clean revert path,
# per the ADR's "confirm before deleting" guidance. It intentionally fails immediately so
# it can never accidentally publish an off-version/independent-SemVer SDK release.

name: 'Manual SDK Release (DEPRECATED)'

on:
  workflow_dispatch:
    inputs:
      version-type:
        description: 'DEPRECATED — this workflow no longer publishes. See cicd_release-sdk.yml.'
        required: false
        type: choice
        options:
          - 'patch'
          - 'minor'
          - 'major'
          - 'custom'
        default: 'patch'
      custom-version:
        description: 'DEPRECATED — unused.'
        required: false
        type: string
        default: ''

jobs:
  deprecated:
    name: 'Deprecated — see cicd_release-sdk.yml'
    runs-on: ubuntu-${{ vars.UBUNTU_RUNNER_VERSION || '24.04' }}
    steps:
      - name: 'Fail with pointer to the new SDK release mechanism'
        run: |
          echo "::error::This workflow is deprecated (ADR-0019). SDK packages are no longer released independently."
          echo "::error::Cutting a dotCMS release (cicd_6-release.yml) now automatically publishes the matching SDK packages via cicd_release-sdk.yml."
          exit 1
