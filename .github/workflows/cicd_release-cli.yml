# Release - CLI Workflow
#
# This workflow is responsible for releasing the CLI (Command Line Interface) tool.
# It can be triggered automatically when a new release is created or manually via workflow dispatch.
#
# Note: this process will change when we migrate the core release process
# It is a basis for that change but we will probably extract the commit of the version into
# the .mvn/maven.config file into a separate manual "promotion" stes and then rely on the commit
# to a github environment specific branch to trigger the build, test, deploy and release phases.
#
# Key features:
# - Supports automatic releases and manual triggers
# - Performs pre-checks and version management
# - Builds and packages the CLI tool
# - Publishes the CLI as an NPM package
# - Cleans up temporary branches after release

name: Release - CLI
run-name: dotCLI Release ${{ inputs.version }} - dry-run=${{ inputs.dry-run }}

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        default: '1.0.0-SNAPSHOT'
        required: false
      dry-run:
        description: 'Dry run - skip ALL publishing (npm, GitHub release, Artifactory) and JReleaser uploads'
        default: 'false'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  ARTIFACT_RUN_ID: ${{ github.run_id }}
  MVN_PACKAGE_TYPE: 'uber-jar'
  NPM_PACKAGE_SCOPE: '@dotcms'
  NPM_PACKAGE_NAME: 'dotcli'
  MVN_PACKAGE_NAME: 'dotcms-cli'
  NODE_VERSION: 19

jobs:
  # Initialize the release process
  initialize:
    name: Initialize
    uses: ./.github/workflows/cicd_comp_initialize-phase.yml
    with:
      change-detection: 'disabled'

  # Perform pre-release checks and setup
  precheck:
    if: ${{ ( github.event_name == 'release' && !contains(github.event.release.tag_name, 'LTS')) || github.event_name == 'workflow_dispatch' }}
    name: 'Pre-check'
    runs-on: ubuntu-${{ vars.UBUNTU_RUNNER_VERSION || '24.04' }}
    outputs:
      RELEASE_VERSION: ${{ steps.version.outputs.RELEASE_VERSION }}
      HEAD: ${{ steps.version.outputs.HEAD }}
      AUXILIARY_BRANCH: ${{ steps.version.outputs.AUXILIARY_BRANCH }}
      # 'true'  -> CLI sources changed since the previous release: do a full native build.
      # 'false' -> unchanged: skip the native build/JReleaser and republish the previously
      #            published binaries under the new version (npm: publish-npm-package;
      #            GitHub release + Artifactory: reuse-release).
      CLI_CHANGED: ${{ steps.cli-changes.outputs.CLI_CHANGED }}
      # Maven/JReleaser version of the previous release (tag without the leading 'v'), used by the
      # reuse path to locate the prior release's artifacts. Empty when there is no previous tag.
      PREV_RELEASE_VERSION: ${{ steps.cli-changes.outputs.PREV_RELEASE_VERSION }}
    steps:
      # Log GitHub context for debugging
      - name: 'Log GitHub context'
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: |
          echo "::group::Github Context"
          echo "$GITHUB_CONTEXT"
          if [[ "$GITHUB_EVENT_NAME" == 'release' ]]; then
            TAG_NAME=${{ github.event.release.tag_name }}
            RELEASE_VERSION=${TAG_NAME:1}
          else
            RELEASE_VERSION=${{ github.event.inputs.version }}
          fi

          echo "::notice:: Event name: $GITHUB_EVENT_NAME"
          echo "::notice:: Release version: $RELEASE_VERSION"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
          echo "::endgroup::"

      # Checkout the repository
      # fetch-depth: 0 brings full history + all tags so we can diff this release
      # against the previous release tag to decide whether the CLI actually changed.
      - name: 'Checkout'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup git configuration
      - name: 'Setup git config'
        run: |
          git config user.name "${{ secrets.CI_MACHINE_USER }}"
          git config user.email "dotCMS-Machine-User@dotcms.com"

      # Determine whether the CLI sources changed since the previous release.
      # The CLI is self-contained under tools/dotcms-cli/** (its only com.dotcms
      # dependency, dotcms-api-data-model, lives in that same subtree), so a path
      # diff against the previous release tag is a correct change-key.
      #
      # Fail safe: any time we cannot confidently prove "unchanged" (manual dispatch,
      # no previous tag, shallow history) we set CLI_CHANGED=true and do a full build.
      # A false "unchanged" would silently ship stale binaries under a new version.
      - name: 'Detect CLI source changes'
        id: cli-changes
        run: |
          set -euo pipefail
          CURRENT_TAG="${{ github.event.release.tag_name }}"

          if [[ -z "${CURRENT_TAG}" ]]; then
            echo "::notice::No release tag in context (manual dispatch) - building CLI unconditionally"
            echo "CLI_CHANGED=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --tags --quiet || true

          # Previous non-LTS v* tag by creation order, excluding the current one.
          PREV_TAG=$(git tag --sort=-version:refname --list 'v*' \
            | grep -viE 'lts' \
            | grep -vxF "${CURRENT_TAG}" \
            | head -n1 || true)

          if [[ -z "${PREV_TAG}" ]]; then
            echo "::notice::No previous release tag found - building CLI"
            echo "CLI_CHANGED=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Expose the previous release version (without leading 'v') for the reuse path.
          echo "PREV_RELEASE_VERSION=${PREV_TAG#v}" >> "$GITHUB_OUTPUT"

          echo "::notice::Comparing tools/dotcms-cli between ${PREV_TAG} and ${CURRENT_TAG}"
          if git diff --quiet "${PREV_TAG}" "${CURRENT_TAG}" -- tools/dotcms-cli/; then
            echo "::notice::No CLI source changes since ${PREV_TAG} - will reuse previously published binaries"
            echo "CLI_CHANGED=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::CLI source changed since ${PREV_TAG} - full native build"
            echo "CLI_CHANGED=true" >> "$GITHUB_OUTPUT"
          fi

      # Set release version and create auxiliary branch
      - name: 'Set release version'
        id: version
        run: |
          RELEASE_VERSION=$RELEASE_VERSION
          HEAD=${{ github.ref_name }}
          
          # Create a release branch for versioning updates
          AUXILIARY_BRANCH=version-update-${RELEASE_VERSION}-${{ github.run_id }}
          git checkout -b $AUXILIARY_BRANCH
          
          # set version in .mvn/maven.config
          echo "-Dprod=true" > .mvn/maven.config
          echo "-Drevision=${RELEASE_VERSION}" >> .mvn/maven.config
          echo "-Dchangelist=" >> .mvn/maven.config
          
          # Commit version changes
          git add .mvn/maven.config
          git status
          git commit --allow-empty -a -m "🏁 Publishing dotCLI release version [${RELEASE_VERSION}]"
          git push origin $AUXILIARY_BRANCH

          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "HEAD=$HEAD" >> "$GITHUB_OUTPUT"
          echo "AUXILIARY_BRANCH=$AUXILIARY_BRANCH" >> "$GITHUB_OUTPUT"

  # Build the release
  # Skipped when the CLI is unchanged: the only downstream consumer in that case is the
  # publish-npm-package reuse path, which pulls the previously published binaries and needs
  # neither the core .m2 nor freshly built artifacts.
  build:
    name: Release Build
    needs: [ initialize, precheck ]
    if: needs.initialize.outputs.found_artifacts == 'false' && needs.precheck.outputs.CLI_CHANGED == 'true'
    uses: ./.github/workflows/cicd_comp_build-phase.yml
    with:
      core-build: true
      ref: ${{ needs.precheck.outputs.AUXILIARY_BRANCH }}
      validate: false
      version: ${{ needs.precheck.outputs.RELEASE_VERSION }}
      generate-docker: false
    permissions:
      contents: read
      packages: write

  # Build CLI artifacts (the expensive 3-OS GraalVM native matrix, incl. two macOS runners).
  # Skipped when the CLI is unchanged since the previous release - we reuse the prior binaries.
  build-cli:
    name: Release CLI Build
    needs: [ initialize, precheck, build ]
    if: always() && !failure() && !cancelled() && needs.precheck.outputs.CLI_CHANGED == 'true'
    uses: ./.github/workflows/cicd_comp_cli-native-build-phase.yml
    with:
      buildNativeImage: true
      artifact-run-id: ${{ needs.initialize.outputs.artifact-run-id }}
      version: ${{ needs.precheck.outputs.RELEASE_VERSION }}
      branch: ${{ needs.precheck.outputs.AUXILIARY_BRANCH }}

  # Perform the release (JReleaser: native binaries -> GitHub release assets + Artifactory).
  # Skipped when the CLI is unchanged; the previously published artifacts already cover this.
  release:
    needs: [ precheck, build-cli ]
    if: always() && !failure() && !cancelled() && needs.precheck.outputs.CLI_CHANGED == 'true'
    runs-on: ubuntu-${{ vars.UBUNTU_RUNNER_VERSION || '24.04' }}
    steps:
      - name: 'Check out repository'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.precheck.outputs.AUXILIARY_BRANCH }}
      - name: 'Create artifacts directory'
        run: |
          mkdir -p ${{ github.workspace }}/artifacts
          echo "artifactsDir=${{ github.workspace }}/artifacts" >> "$GITHUB_ENV"

      - name: 'Download all build artifacts'
        uses: actions/download-artifact@v4
        with:
          path: ${{ github.workspace }}/artifacts
          pattern: cli-artifacts-*
      - uses: ./.github/actions/core-cicd/maven-job
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_PROJECT_VERSION: ${{ needs.precheck.outputs.RELEASE_VERSION }}
          JRELEASER_ARTIFACTORY_USERNAME: ${{ secrets.EE_REPO_USERNAME }}
          JRELEASER_ARTIFACTORY_PASSWORD: ${{ secrets.EE_REPO_PASSWORD }}
          JRELEASER_DRY_RUN: ${{ github.event.inputs.dry-run || 'false' }}
        with:
          cleanup-runner: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          stage-name: "JReleaser"
          maven-args: "-Prelease validate -DartifactsDir=artifacts -Dm2Dir=$HOME/.m2/repository -Djreleaser.git.root.search=true -pl :dotcms-cli-parent -Dmaven.plugin.validation=VERBOSE"
          artifacts-from: ${{ env.ARTIFACT_RUN_ID }}
          version: ${{ needs.precheck.outputs.RELEASE_VERSION }}

  # Reuse path (GitHub release + Artifactory parity).
  # When the CLI is unchanged we skip the JReleaser `release` job above and instead republish the
  # previous release's native artifacts under the new version, mirroring the two channels that
  # JReleaser feeds (see tools/dotcms-cli/jreleaser.yml - keep this job in sync with it):
  #   1. GitHub release  -> tag `dotcms-cli-<version>` with the native zips + runner jar attached
  #   2. Artifactory     -> libs-release-local/com/dotcms/dotcms-cli/<version>/<artifact>
  # The binaries are byte-identical to the prior release; only the version in the filename and
  # coordinates advances. npm is handled separately in publish-npm-package.
  # Note: JReleaser-generated checksums/signatures are NOT reproduced here - only the binary
  # artifacts (.zip / .jar) are re-published.
  reuse-release:
    name: Reuse CLI Release
    needs: [ precheck ]
    if: needs.precheck.outputs.CLI_CHANGED == 'false'
    runs-on: ubuntu-${{ vars.UBUNTU_RUNNER_VERSION || '24.04' }}
    permissions:
      contents: write
    env:
      NEW_VERSION: ${{ needs.precheck.outputs.RELEASE_VERSION }}
      PREV_VERSION: ${{ needs.precheck.outputs.PREV_RELEASE_VERSION }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DRY_RUN: ${{ github.event.inputs.dry-run || 'false' }}
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: 'Download previous CLI release assets'
        run: |
          set -euo pipefail
          mkdir -p prev new
          echo "::notice::Reusing dotcms-cli-${PREV_VERSION} artifacts for new version ${NEW_VERSION}"
          gh release download "dotcms-cli-${PREV_VERSION}" \
            --repo "${{ github.repository }}" \
            --dir prev
          ls -l prev

      - name: 'Re-stamp artifacts to new version'
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=( prev/dotcms-cli-${PREV_VERSION}*.zip prev/dotcms-cli-${PREV_VERSION}*.jar )
          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "::error::No reusable .zip/.jar artifacts found in release dotcms-cli-${PREV_VERSION}"
            exit 1
          fi
          for f in "${artifacts[@]}"; do
            base=$(basename "$f")
            newname="${base/dotcms-cli-${PREV_VERSION}/dotcms-cli-${NEW_VERSION}}"
            cp "$f" "new/${newname}"
          done
          echo "Re-stamped artifacts:"
          ls -l new

      - name: 'Create GitHub release for new version'
        run: |
          set -euo pipefail
          if [ "${DRY_RUN}" = "true" ]; then
            echo "::notice::[dry-run] would create release dotcms-cli-${NEW_VERSION} with assets: $(cd new && echo *)"
            exit 0
          fi
          gh release create "dotcms-cli-${NEW_VERSION}" new/* \
            --repo "${{ github.repository }}" \
            --title "dotcms-cli - ${NEW_VERSION}" \
            --notes "Reused binaries from dotcms-cli-${PREV_VERSION} (CLI sources unchanged since the previous release)."

      - name: 'Upload artifacts to Artifactory'
        env:
          ARTIFACTORY_USER: ${{ secrets.EE_REPO_USERNAME }}
          ARTIFACTORY_PASS: ${{ secrets.EE_REPO_PASSWORD }}
        run: |
          set -euo pipefail
          BASE_URL="https://repo.dotcms.com/artifactory/libs-release-local/com/dotcms/dotcms-cli/${NEW_VERSION}"
          for f in new/*; do
            base=$(basename "$f")
            if [ "${DRY_RUN}" = "true" ]; then
              echo "::notice::[dry-run] would upload ${base} -> ${BASE_URL}/${base}"
              continue
            fi
            echo "::notice::Uploading ${base} -> ${BASE_URL}/${base}"
            curl -fsSL --user "${ARTIFACTORY_USER}:${ARTIFACTORY_PASS}" -T "$f" "${BASE_URL}/${base}"
          done

  # Publish NPM package
  # Runs in both paths: the changed path consumes freshly built cli-artifacts-*, the unchanged
  # path repackages the previously published binaries. Uses !failure() (not success()) so the
  # intentionally-skipped build/build-cli/release jobs of the unchanged path don't block it,
  # while still bailing if any job that DID run failed.
  publish-npm-package:
    name: "Publish NPM Package"
    if: >-
      ${{
        !cancelled() &&
        needs.precheck.result == 'success' &&
        (needs.reuse-release.result == 'success' || needs.reuse-release.result == 'skipped') &&
        (needs.release.result == 'success' || needs.release.result == 'skipped')
      }}
    # On the changed path (CLI_CHANGED=true): release runs and reuse-release is skipped.
    # On the unchanged path (CLI_CHANGED=false): reuse-release runs and release is skipped.
    # Requiring each to be 'success' or 'skipped' makes the mutual-exclusion explicit and
    # ensures a failed release or reuse-release blocks the npm publish.
    needs: [ precheck, build, build-cli, release, reuse-release ]
    runs-on: ubuntu-${{ vars.UBUNTU_RUNNER_VERSION || '24.04' }}
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.precheck.outputs.HEAD }}

      - uses: ./.github/actions/core-cicd/cleanup-runner

      - name: 'Set up Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 'Install Jinja2'
        run: pip install jinja2-cli

      - name: 'Download all build artifacts'
        if: needs.precheck.outputs.CLI_CHANGED == 'true'
        uses: actions/download-artifact@v4
        with:
          path: ${{ github.workspace }}/artifacts
          pattern: cli-artifacts-*
          merge-multiple: true

      # Determines the NPM package version and tag (runs in both paths - depends only on
      # RELEASE_VERSION, not on build artifacts).
      # Distinguishes between snapshots and releases
      - name: 'Dynamic configuration of NPM package Version and Tag'
        env:
          RELEASE_VERSION: ${{ needs.precheck.outputs.RELEASE_VERSION }}
        run: |
          MVN_PACKAGE_VERSION=$(echo ${{ env.RELEASE_VERSION }} | tr '[:lower:]' '[:upper:]')
          PACKAGE_FULL_NAME=${{ env.NPM_PACKAGE_SCOPE }}/${{ env.NPM_PACKAGE_NAME }}

          # Check if the npm package exists
          if ! npm view $PACKAGE_FULL_NAME &> /dev/null; then
            echo "::error::The package $PACKAGE_FULL_NAME does not exist on npm."
            exit 1
          fi

          # Check if the package is a snapshot
          REGEX="([0-9]+\.[0-9]+\.[0-9]+)-SNAPSHOT"

          if [[ $MVN_PACKAGE_VERSION =~ $REGEX ]]; then
            echo "::debug::Snapshot version found."

            NPM_PACKAGE_VERSION_TAG="rc"
            MVN_BASE_VERSION="${BASH_REMATCH[1]}"

            # Use regular expression to extract version components
            if [[ $MVN_BASE_VERSION =~ ([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
              MAJOR=$(echo "${BASH_REMATCH[1]}" | sed "s/\b0\+\([1-9]\)/\1/g")
              MINOR=$(echo "${BASH_REMATCH[2]}" | sed "s/\b0\+\([1-9]\)/\1/g")
              PATCH=$(echo "${BASH_REMATCH[3]}" | sed "s/\b0\+\([1-9]\)/\1/g")
              VERSION_NPM_FORMAT="${MAJOR}.${MINOR}.${PATCH}"

              echo "::debug::VERSION_NPM_FORMAT: ${VERSION_NPM_FORMAT}"
            else
              echo "::error::Invalid Maven version format: $MVN_BASE_VERSION"
              exit 1
            fi

            echo "VERSION_NPM_FORMAT: ${VERSION_NPM_FORMAT}"
            # Get last RC versions
            LATEST_RC_VERSIONS=$(npm view $PACKAGE_FULL_NAME versions --json)
            echo "LATEST_RC_VERSIONS: ${LATEST_RC_VERSIONS}"

            # Extract max RC version
            MAX_RC_VERSION=$(echo $LATEST_RC_VERSIONS | jq -r --arg filter $VERSION_NPM_FORMAT-rc 'map(.| select(. | contains($filter)) | sub($filter; "") | tonumber ) | max')
            echo "MAX_RC_VERSION: ${MAX_RC_VERSION}"
          
            if [[ $MAX_RC_VERSION != null ]]; then
              RC_SUFFIX="-rc$(( $MAX_RC_VERSION + 1 ))"
            else
              RC_SUFFIX="-rc1"
            fi;

            NPM_PACKAGE_VERSION=${MVN_BASE_VERSION}${RC_SUFFIX}
          else
            echo "::debug::Release version found."
            # Normalize release version by removing leading zeros from each component
            # Split the version into main version and pre-release parts (if any)
            MAIN_VERSION=$(echo "$MVN_PACKAGE_VERSION" | cut -d '-' -f 1)
            PRE_RELEASE=$(echo "$MVN_PACKAGE_VERSION" | cut -s -d '-' -f 2)
          
            IFS='.' read -r MAJOR MINOR PATCH <<< "$MAIN_VERSION"
            MAJOR=$(echo "$MAJOR" | sed 's/^0*//')
            MINOR=$(echo "$MINOR" | sed 's/^0*//')
            PATCH=$(echo "$PATCH" | sed 's/^0*//')
            NORMALIZED_MAIN="${MAJOR}.${MINOR}.${PATCH}"

            if [[ -n "$PRE_RELEASE" ]]; then
              # Remove leading zeros from the pre-release part as well
              PRE_RELEASE=$(echo "$PRE_RELEASE" | sed 's/^0*//')
              NORMALIZED_VERSION="${NORMALIZED_MAIN}-${PRE_RELEASE}"
            else
              NORMALIZED_VERSION="${NORMALIZED_MAIN}"
            fi

            NPM_PACKAGE_VERSION_TAG="latest"
            NPM_PACKAGE_VERSION="${NORMALIZED_VERSION}"
            echo "::debug::Normalized NPM_PACKAGE_VERSION: ${NPM_PACKAGE_VERSION}"
          fi;
          echo "::debug::NPM_PACKAGE_VERSION: $NPM_PACKAGE_VERSION"
          echo "::debug::NPM_PACKAGE_VERSION_TAG: $NPM_PACKAGE_VERSION_TAG"

          echo "NPM_PACKAGE_VERSION=$NPM_PACKAGE_VERSION" >> $GITHUB_ENV
          echo "NPM_PACKAGE_VERSION_TAG=$NPM_PACKAGE_VERSION_TAG" >> $GITHUB_ENV

      # Sets up the NPM package
      # Creates the bin folder with the binaries
      # Adds the postinstall.js script
      # Generates the package.json file with Jinja2
      - name: 'NPM Package setup'
        if: needs.precheck.outputs.CLI_CHANGED == 'true'
        working-directory: ${{ github.workspace }}/tools/dotcms-cli/npm/
        env:
          MVN_PACKAGE_VERSION: ${{ needs.precheck.outputs.RELEASE_VERSION }}
        run: |
          echo "::group::NPM Package setup"
          echo "Adding bin folder with all the binaries"
          mkdir -p bin
          find ${{ github.workspace }}/artifacts/ -name "*.zip" -exec unzip -d bin {} \;

          echo "Adding wrapper script"
          mv src/postinstall.js.seed src/postinstall.js

          echo "Adding README.md file"
          cp ${{ github.workspace }}/tools/dotcms-cli/README.md .

          echo "Adding package.json file"
          jinja2 package.j2 -D packageName=${MVN_PACKAGE_NAME} -D npmPackageName=${NPM_PACKAGE_NAME} -D npmPackageVersion=${NPM_PACKAGE_VERSION} -D packageVersion=${MVN_PACKAGE_VERSION} --format json -o package.json
          rm -f package.j2

          cat package.json
          cat src/postinstall.js
          echo "::endgroup::"

      - name: 'NPM Package tree'
        if: needs.precheck.outputs.CLI_CHANGED == 'true'
        run: ls -R ${{ github.workspace }}/tools/dotcms-cli/npm/

      - name: 'Publish to NPM registry'
        if: needs.precheck.outputs.CLI_CHANGED == 'true'
        working-directory: ${{ github.workspace }}/tools/dotcms-cli/npm/
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_ORG_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry-run || 'false' }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_AUTH_TOKEN}" > ~/.npmrc
          [ "${DRY_RUN}" = "true" ] && DRY_RUN_FLAG="--dry-run" || DRY_RUN_FLAG=""
          npm publish --access public --tag ${NPM_PACKAGE_VERSION_TAG} ${DRY_RUN_FLAG}

      # Reuse path: CLI sources are unchanged since the previous release. Instead of the native
      # rebuild, pull the currently published 'latest' tarball (which bundles the native binaries
      # plus the postinstall wrapper), bump only its version field, and republish. The binaries
      # stay byte-identical; only the version number advances to track the dotCMS release.
      # We read the source version from npm ('latest') rather than reconstructing it from the git
      # tag, sidestepping the leading-zero normalization applied to release versions above.
      - name: 'Reuse previous CLI release and publish'
        if: needs.precheck.outputs.CLI_CHANGED == 'false'
        working-directory: ${{ runner.temp }}
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_ORG_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry-run || 'false' }}
        run: |
          set -euo pipefail
          PACKAGE_FULL_NAME="${NPM_PACKAGE_SCOPE}/${NPM_PACKAGE_NAME}"
          echo "//registry.npmjs.org/:_authToken=${NPM_AUTH_TOKEN}" > ~/.npmrc

          PREV_NPM_VERSION=$(npm view "${PACKAGE_FULL_NAME}" version)
          echo "::notice::CLI unchanged - repackaging ${PACKAGE_FULL_NAME}@${PREV_NPM_VERSION} as ${NPM_PACKAGE_VERSION} (tag: ${NPM_PACKAGE_VERSION_TAG})"

          npm pack "${PACKAGE_FULL_NAME}@${PREV_NPM_VERSION}"
          tar -xzf ./*.tgz   # extracts to ./package
          cd package
          # Bump only the version; binaries and scripts remain byte-identical to the prior release.
          npm version "${NPM_PACKAGE_VERSION}" --no-git-tag-version --allow-same-version
          [ "${DRY_RUN}" = "true" ] && DRY_RUN_FLAG="--dry-run" || DRY_RUN_FLAG=""
          npm publish --access public --tag "${NPM_PACKAGE_VERSION_TAG}" ${DRY_RUN_FLAG}

  # Clean up temporary branches
  clean-up:
    name: "Clean Up"
    # always(): the temporary version-update branch must be deleted even when an
    # upstream job fails (otherwise it leaks). AUXILIARY_BRANCH is only set when
    # precheck succeeded, so this still no-ops when there is nothing to clean up.
    if: ${{ always() && needs.precheck.outputs.AUXILIARY_BRANCH != '' }}
    needs: [ precheck, build, build-cli, release, reuse-release, publish-npm-package ]
    runs-on: ubuntu-${{ vars.UBUNTU_RUNNER_VERSION || '24.04' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.precheck.outputs.HEAD }}

      - name: 'Delete release auxiliary branch - ${{ needs.precheck.outputs.AUXILIARY_BRANCH }}'
        run: |
          git push origin --delete ${{ needs.precheck.outputs.AUXILIARY_BRANCH }}