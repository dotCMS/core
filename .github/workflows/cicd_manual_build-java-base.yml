name: Build SDKMan Base Java Image
run-name: Base Image for ${{ inputs.sdkman_java_version }} by @${{ github.actor }}
# Manual entry point for building/publishing the dotcms/java-base:${version} JDK base image.
# The build logic lives in the ensure-java-base composite action, which is also invoked
# automatically during normal builds (see .github/actions/core-cicd/maven-job) so a missing base
# self-heals. This workflow forces a (re)build regardless of whether the tag already exists.
on:
  workflow_dispatch:
    inputs:
      sdkman_java_version:
        description: 'SDKMAN version string run "sdk list java" for options'
        required: true
      image_suffix:
        description: 'append suffix to image tag (can be empty)'
        required: false
      multi_arch:
        description: 'Multi-arch flag, true: linux/amd64,linux/arm64 or false: linux/amd64'
        type: boolean
        required: false
        default: true
      push:
        description: 'Push flag'
        type: boolean
        required: false
        default: true
jobs:
  build_image:
    name: Build Docker Base Image
    runs-on: ubuntu-${{ vars.UBUNTU_RUNNER_VERSION || '24.04' }}
    steps:
      - name: Checkout core
        uses: actions/checkout@v4
      - name: Ensure Java Base Image
        uses: ./.github/actions/core-cicd/ensure-java-base
        with:
          sdkman-java-version: ${{ inputs.sdkman_java_version }}
          image-suffix: ${{ inputs.image_suffix }}
          multi-arch: ${{ inputs.multi_arch }}
          # Manual runs always (re)build; push is an explicit true/false here (not auto).
          force: 'true'
          push: ${{ inputs.push }}
          docker-io-username: ${{ secrets.DOCKER_USERNAME }}
          docker-io-token: ${{ secrets.DOCKER_TOKEN }}
