# Note: This action publishes SDK libraries to NPM.
#
# VERSIONING (ADR-0019 — date-lockstep versioning):
# - The SDK version is always the dotCMS release version it ships with. There is no
#   independent SDK versioning and no `@next` prerelease channel.
# - Single source of truth: the `version` input, supplied by the caller (the dotCMS
#   release pipeline — see cicd_release-sdk.yml, which derives it from the GitHub
#   Release tag, mirroring how cicd_release-cli.yml versions @dotcms/dotcli).
# - Every invocation publishes every SDK package at that exact version to the `latest`
#   npm dist-tag — including releases where the SDK has no code changes, to preserve
#   the one-dotCMS-version <-> one-SDK-version invariant.
#
name: 'SDK Publish NPM Packages - Stable'
description: 'Publish the dotCMS SDK libs on NPM registry at the given version.'
inputs:
  ref:
    description: 'Branch/tag to build from'
    required: false
    default: 'main'
  version:
    description: 'Exact version to publish every @dotcms/* SDK package at (e.g. 26.7.14-1)'
    required: true
  npm-token:
    description: 'NPM token'
    required: true
  github-token:
    description: 'GitHub Token'
    required: true
outputs:
  npm-package-version:
    description: 'SDK libs - NPM package version that was published'
    value: ${{ inputs.version }}
  published:
    description: 'SDK libs - Published (true if all packages published successfully)'
    value: ${{ steps.deployment_status.outputs.published }}
runs:
  using: "composite"
  steps:
    - name: 'Checkout'
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref }}
        token: ${{ inputs.github-token }}

    - name: 'Setup Node'
      uses: actions/setup-node@v4
      with:
        node-version-file: 'core-web/.nvmrc'

    - name: 'Update package.json versions'
      working-directory: ${{ github.workspace }}/core-web/libs/sdk/
      env:
        RELEASE_VERSION: ${{ inputs.version }}
        EXAMPLES_PATH: ${{ github.workspace }}/examples
      run: |
        set -euo pipefail
        echo "::group::Update package.json versions"

        sdk_packages=($(find . -maxdepth 1 -mindepth 1 -type d -exec basename {} \;))
        echo "Found SDK packages: ${sdk_packages[*]}"

        for sdk in "${sdk_packages[@]}"; do
          pkg="$sdk/package.json"
          if [ -f "$pkg" ]; then
            jq --arg v "$RELEASE_VERSION" '.version = $v' "$pkg" > tmp.$$.json && mv tmp.$$.json "$pkg"
            echo "  ✅ $sdk -> $RELEASE_VERSION"

            # Update dependencies/peerDependencies that reference other SDK packages.
            # Pinned exact (no caret): sibling SDK packages always publish in lockstep at
            # the same version, so a range only reintroduces the ambiguity ADR-0019 removes.
            for dep in "${sdk_packages[@]}"; do
              for field in dependencies peerDependencies; do
                if jq -e ".${field}[\"@dotcms/$dep\"]" "$pkg" >/dev/null 2>&1; then
                  jq --arg field "$field" --arg dep "@dotcms/$dep" --arg v "$RELEASE_VERSION" \
                    '.[$field][$dep] = $v' "$pkg" > tmp.$$.json && mv tmp.$$.json "$pkg"
                  echo "    ↳ $field @dotcms/$dep -> $RELEASE_VERSION"
                fi
              done
            done
          fi
        done

        # Update example projects
        if [ -d "$EXAMPLES_PATH" ]; then
          while IFS= read -r pkg_json; do
            for dep in "${sdk_packages[@]}"; do
              if jq -e ".dependencies[\"@dotcms/$dep\"]" "$pkg_json" >/dev/null 2>&1; then
                jq --arg dep "@dotcms/$dep" --arg v "^$RELEASE_VERSION" \
                  '.dependencies[$dep] = $v' "$pkg_json" > tmp.$$.json && mv tmp.$$.json "$pkg_json"
              fi
            done
          done < <(find "$EXAMPLES_PATH" -name "package.json" -not -path "*/node_modules/*")
        fi

        echo "::endgroup::"
      shell: bash

    - name: Set up pnpm
      uses: pnpm/action-setup@v4
      with:
        package_json_file: core-web/package.json
        run_install: false

    - name: Get pnpm store directory path
      id: pnpm-info
      shell: bash
      run: |
        echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        echo "version=$(pnpm -v)" >> $GITHUB_OUTPUT

    - id: restore-cache-pnpm
      name: Restore pnpm Store Cache
      uses: actions/cache/restore@v4
      with:
        path: ${{ steps.pnpm-info.outputs.dir }}
        key: ${{ runner.os }}-pnpm-${{ steps.pnpm-info.outputs.version }}-${{ hashFiles('core-web/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-${{ steps.pnpm-info.outputs.version }}
          ${{ runner.os }}-pnpm-

    - name: 'Install project'
      working-directory: ${{ github.workspace }}/core-web/
      run: |
        set -euo pipefail
        pnpm install --frozen-lockfile
        pnpm --version
        node --version
      shell: bash

    - id: save-cache-pnpm
      name: Save pnpm Store Cache
      if: ${{ steps.restore-cache-pnpm.outputs.cache-hit != 'true' }}
      uses: actions/cache/save@v4
      with:
        path: ${{ steps.pnpm-info.outputs.dir }}
        key: ${{ steps.restore-cache-pnpm.outputs.cache-primary-key }}

    - name: 'Build SDK packages'
      working-directory: ${{ github.workspace }}/core-web/
      run: |
        set -euo pipefail
        echo "::group::Build SDK packages"
        pnpm exec nx run-many --target=build --projects='sdk-*' --configuration=production --skip-nx-cache
        echo "::endgroup::"
      shell: bash

    - name: 'Publish SDK packages to NPM'
      id: publish_packages
      working-directory: ${{ github.workspace }}/core-web/dist/libs/sdk/
      env:
        RELEASE_VERSION: ${{ inputs.version }}
        NPM_AUTH_TOKEN: ${{ inputs.npm-token }}
      run: |
        set -euo pipefail
        echo "::group::Publishing SDK packages"
        echo "Version: $RELEASE_VERSION"
        echo ""

        echo "//registry.npmjs.org/:_authToken=${NPM_AUTH_TOKEN}" > ~/.npmrc

        PUBLISH_SUCCESS=true

        for sdk in $(find . -maxdepth 1 -mindepth 1 -type d -exec basename {} \;); do
          echo "📦 Processing @dotcms/${sdk}..."
          cd "$sdk"

          # Idempotency: the version is fixed to the dotCMS release tag and can never be
          # bumped, so if a prior (failed/cancelled) run already published this exact
          # version, npm would reject a re-publish with a hard 403 — permanently stalling
          # the release. Treat "already published" as success so a re-run can finish the
          # remaining packages instead of getting stuck.
          if npm view "@dotcms/${sdk}@${RELEASE_VERSION}" version >/dev/null 2>&1; then
            echo "  ⏭️  @dotcms/${sdk}@${RELEASE_VERSION} already published — skipping (idempotent re-run)"
          else
            echo "  🚀 Publishing: @dotcms/${sdk}@${RELEASE_VERSION}"
            if npm publish --access public --tag latest; then
              echo "  ✅ Published"
            else
              echo "  ❌ Failed to publish"
              PUBLISH_SUCCESS=false
            fi
          fi

          cd ..
          echo ""
        done

        echo "actual_published=$PUBLISH_SUCCESS" >> $GITHUB_OUTPUT

        if [ "$PUBLISH_SUCCESS" = "true" ]; then
          echo "🎉 All SDK packages published successfully!"
        else
          echo "❌ Some publications failed"
          echo "::endgroup::"
          exit 1
        fi

        echo "::endgroup::"
      shell: bash

    - name: 'Set output'
      id: deployment_status
      if: success()
      env:
        ACTUAL_PUBLISHED: ${{ steps.publish_packages.outputs.actual_published }}
      run: |
        echo "published=$ACTUAL_PUBLISHED" >> $GITHUB_OUTPUT
      shell: bash
