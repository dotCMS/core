# Note: This action publishes SDK libraries to NPM.
#
# VERSIONING:
# - Single source of truth: core-web/libs/sdk/VERSION file
# - LATEST TAG: published only when version-type != 'auto' (manual releases)
# - NEXT TAG: always published on trunk runs, suffix = GITHUB_RUN_NUMBER (unique, no collision)
#
name: 'SDK Publish NPM Packages - Stable'
description: 'Publish stable versions of the dotCMS SDK libs on NPM registry.'
inputs:
  ref:
    description: 'Branch to build from'
    required: false
    default: 'main'
  npm-token:
    description: 'NPM token'
    required: true
  npm-package-tag:
    description: 'Package tag for stable releases'
    required: false
    default: 'latest'
  version-type:
    description: 'Version type: auto (default), patch, minor, major, or custom. Auto means no increment — publishes next tag only.'
    required: false
    default: 'auto'
  custom-version:
    description: 'Custom version to set (e.g., 1.3.4, 2.1.0). Only used when version-type is "custom". Must be valid semver format.'
    required: false
    default: ''
  github-token:
    description: 'GitHub Token'
    required: true
outputs:
  npm-package-version:
    description: 'SDK libs - NPM package version (formatted for notifications)'
    value: ${{ steps.deployment_status.outputs.npm_package_version }}
  npm-package-version-next:
    description: 'SDK libs - NPM package version for next tag'
    value: ${{ steps.set_versions.outputs.next_version_next }}
  published-latest:
    description: 'SDK libs - Published to latest tag'
    value: ${{ steps.deployment_status.outputs.published_latest }}
  published-next:
    description: 'SDK libs - Published to next tag'
    value: ${{ steps.deployment_status.outputs.published_next }}
  published:
    description: 'SDK libs - Published (backward compatibility - true if any tag published)'
    value: ${{ steps.deployment_status.outputs.published }}
  version-type-used:
    description: 'Type of version increment that was applied'
    value: ${{ steps.set_versions.outputs.version_type_used }}
runs:
  using: "composite"
  steps:
    - name: 'Checkout'
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref }}
        token: ${{ inputs.github-token }}

    - name: 'Run Maven Job'
      uses: ./.github/actions/core-cicd/maven-job
      with:
        stage-name: 'Build'
        maven-args: 'process-resources -pl :dotcms-core-web -am'
        requires-node: true
        cleanup-runner: true
        generate-docker: false
        generate-artifacts: false
        version: '1.0.0-SNAPSHOT'
        github-token: ${{ inputs.github-token }}

    - name: 'Adding node and yarn to the PATH env'
      run: |
        echo "::group::Adding node and yarn to the PATH env"
        BASE_PATH=${{ github.workspace }}/installs
        ls -Rla ${BASE_PATH}/node
        echo "PATH=${BASE_PATH}/node:${BASE_PATH}/node/yarn/dist/bin:$PATH" >> $GITHUB_ENV
        echo "::endgroup::"
      shell: bash

    - name: 'Set versions from VERSION file'
      id: set_versions
      working-directory: ${{ github.workspace }}/core-web/libs/sdk/
      env:
        VERSION_TYPE: ${{ inputs.version-type }}
        CUSTOM_VERSION: ${{ inputs.custom-version }}
        RUN_NUMBER: ${{ github.run_number }}
      run: |
        echo "::group::Set versions"

        BASE_VERSION=$(cat VERSION | tr -d '[:space:]')
        echo "Base version from VERSION file: $BASE_VERSION"

        if [[ ! "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::Invalid version in VERSION file: '$BASE_VERSION'. Must be semver (e.g. 1.2.6)"
          exit 1
        fi

        # Calculate latest version
        if [ "$VERSION_TYPE" = "custom" ]; then
          if [ -z "$CUSTOM_VERSION" ]; then
            echo "::error::custom-version must be set when version-type is 'custom'"
            exit 1
          fi
          if [[ ! "$CUSTOM_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid custom version: '$CUSTOM_VERSION'"
            exit 1
          fi
          LATEST_VERSION="$CUSTOM_VERSION"
          VERSION_TYPE_USED="custom"
        elif [ "$VERSION_TYPE" = "auto" ]; then
          LATEST_VERSION="$BASE_VERSION"
          VERSION_TYPE_USED="auto-no-increment"
        else
          IFS='.' read -ra PARTS <<< "$BASE_VERSION"
          MAJOR=${PARTS[0]}; MINOR=${PARTS[1]}; PATCH=${PARTS[2]}
          case "$VERSION_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0; VERSION_TYPE_USED="major" ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0; VERSION_TYPE_USED="minor" ;;
            patch) PATCH=$((PATCH + 1)); VERSION_TYPE_USED="patch" ;;
            *)     VERSION_TYPE_USED="auto-no-increment" ;;
          esac
          LATEST_VERSION="${MAJOR}.${MINOR}.${PATCH}"
        fi

        # next tag always uses run number — guaranteed unique
        NEXT_VERSION="${LATEST_VERSION}-next.${RUN_NUMBER}"

        # Only publish latest when version actually changes
        if [ "$VERSION_TYPE_USED" = "auto-no-increment" ]; then
          SHOULD_PUBLISH_LATEST="false"
        else
          SHOULD_PUBLISH_LATEST="true"
        fi

        echo ""
        echo "=== VERSION SUMMARY ==="
        echo "Base (VERSION file): $BASE_VERSION"
        echo "Latest:              $LATEST_VERSION (publish: $SHOULD_PUBLISH_LATEST)"
        echo "Next:                $NEXT_VERSION"
        echo "Version type used:   $VERSION_TYPE_USED"
        echo "========================"

        echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
        echo "next_version_next=$NEXT_VERSION" >> $GITHUB_OUTPUT
        echo "should_publish_latest=$SHOULD_PUBLISH_LATEST" >> $GITHUB_OUTPUT
        echo "version_type_used=$VERSION_TYPE_USED" >> $GITHUB_OUTPUT
        echo "::endgroup::"
      shell: bash

    - name: 'Update package.json versions'
      working-directory: ${{ github.workspace }}/core-web/libs/sdk/
      env:
        LATEST_VERSION: ${{ steps.set_versions.outputs.latest_version }}
        EXAMPLES_PATH: ${{ github.workspace }}/examples
      run: |
        echo "::group::Update package.json versions"

        sdk_packages=($(find . -maxdepth 1 -mindepth 1 -type d -exec basename {} \;))
        echo "Found SDK packages: ${sdk_packages[*]}"

        for sdk in "${sdk_packages[@]}"; do
          pkg="$sdk/package.json"
          if [ -f "$pkg" ]; then
            jq --arg v "$LATEST_VERSION" '.version = $v' "$pkg" > tmp.$$.json && mv tmp.$$.json "$pkg"
            echo "  ✅ $sdk -> $LATEST_VERSION"

            # Update peerDependencies that reference other SDK packages
            for dep in "${sdk_packages[@]}"; do
              if jq -e ".peerDependencies[\"@dotcms/$dep\"]" "$pkg" >/dev/null 2>&1; then
                jq --arg dep "@dotcms/$dep" --arg v "^$LATEST_VERSION" \
                  '.peerDependencies[$dep] = $v' "$pkg" > tmp.$$.json && mv tmp.$$.json "$pkg"
                echo "    ↳ peerDependency @dotcms/$dep -> ^$LATEST_VERSION"
              fi
            done
          fi
        done

        # Update example projects
        if [ -d "$EXAMPLES_PATH" ]; then
          while IFS= read -r pkg_json; do
            for dep in "${sdk_packages[@]}"; do
              if jq -e ".dependencies[\"@dotcms/$dep\"]" "$pkg_json" >/dev/null 2>&1; then
                jq --arg dep "@dotcms/$dep" --arg v "^$LATEST_VERSION" \
                  '.dependencies[$dep] = $v' "$pkg_json" > tmp.$$.json && mv tmp.$$.json "$pkg_json"
              fi
            done
          done < <(find "$EXAMPLES_PATH" -name "package.json" -not -path "*/node_modules/*")
        fi

        echo "::endgroup::"
      shell: bash

    - name: 'Install project'
      working-directory: ${{ github.workspace }}/core-web/
      run: |
        yarn install
        npm --version
        node --version
      shell: bash

    - name: 'Build SDK packages'
      working-directory: ${{ github.workspace }}/core-web/
      run: |
        npx nx run-many --target=build --projects='sdk-*' --configuration=production --skip-nx-cache
      shell: bash

    - name: 'Publish SDK packages to NPM'
      id: publish_packages
      working-directory: ${{ github.workspace }}/core-web/dist/libs/sdk/
      env:
        LATEST_VERSION: ${{ steps.set_versions.outputs.latest_version }}
        NEXT_VERSION: ${{ steps.set_versions.outputs.next_version_next }}
        NPM_AUTH_TOKEN: ${{ inputs.npm-token }}
        NPM_TAG_LATEST: ${{ inputs.npm-package-tag }}
        SHOULD_PUBLISH_LATEST: ${{ steps.set_versions.outputs.should_publish_latest }}
      run: |
        echo "::group::Publishing SDK packages"
        echo "Latest: $LATEST_VERSION (publish: $SHOULD_PUBLISH_LATEST)"
        echo "Next:   $NEXT_VERSION"
        echo ""

        echo "//registry.npmjs.org/:_authToken=${NPM_AUTH_TOKEN}" > ~/.npmrc

        PUBLISH_LATEST_SUCCESS=true
        PUBLISH_NEXT_SUCCESS=true

        for sdk in $(ls); do
          echo "📦 Processing @dotcms/${sdk}..."
          cd "$sdk"

          ORIGINAL_VERSION=$(jq -r '.version' package.json)

          if [ "$SHOULD_PUBLISH_LATEST" = "true" ]; then
            echo "  🚀 Publishing latest: @dotcms/${sdk}@${LATEST_VERSION}"
            if npm publish --access public --tag "$NPM_TAG_LATEST"; then
              echo "  ✅ Published to latest"
            else
              echo "  ❌ Failed to publish to latest"
              PUBLISH_LATEST_SUCCESS=false
            fi
          else
            echo "  ⏭️  Skipping latest (auto mode, no version change)"
          fi

          echo "  🚀 Publishing next: @dotcms/${sdk}@${NEXT_VERSION}"
          jq --arg v "$NEXT_VERSION" '.version = $v' package.json > tmp.$$.json && mv tmp.$$.json package.json
          if npm publish --access public --tag next; then
            echo "  ✅ Published to next"
          else
            echo "  ❌ Failed to publish to next"
            PUBLISH_NEXT_SUCCESS=false
          fi
          jq --arg v "$ORIGINAL_VERSION" '.version = $v' package.json > tmp.$$.json && mv tmp.$$.json package.json

          cd ..
          echo ""
        done

        if [ "$PUBLISH_LATEST_SUCCESS" = "true" ] && [ "$PUBLISH_NEXT_SUCCESS" = "true" ]; then
          echo "🎉 All SDK packages published successfully!"
        else
          echo "❌ Some publications failed"
          exit 1
        fi

        echo "actual_published_latest=$PUBLISH_LATEST_SUCCESS" >> $GITHUB_OUTPUT
        echo "actual_published_next=$PUBLISH_NEXT_SUCCESS" >> $GITHUB_OUTPUT
        echo "::endgroup::"
      shell: bash

    - name: 'Set output'
      id: deployment_status
      if: success()
      env:
        ACTUAL_PUBLISHED_LATEST: ${{ steps.publish_packages.outputs.actual_published_latest }}
        ACTUAL_PUBLISHED_NEXT: ${{ steps.publish_packages.outputs.actual_published_next }}
        LATEST_VERSION: ${{ steps.set_versions.outputs.latest_version }}
        NEXT_VERSION: ${{ steps.set_versions.outputs.next_version_next }}
      run: |
        echo "published_latest=$ACTUAL_PUBLISHED_LATEST" >> $GITHUB_OUTPUT
        echo "published_next=$ACTUAL_PUBLISHED_NEXT" >> $GITHUB_OUTPUT

        if [ "$ACTUAL_PUBLISHED_LATEST" = "true" ] || [ "$ACTUAL_PUBLISHED_NEXT" = "true" ]; then
          PUBLISHED="true"
        else
          PUBLISHED="false"
        fi
        echo "published=$PUBLISHED" >> $GITHUB_OUTPUT

        if [ "$ACTUAL_PUBLISHED_LATEST" = "true" ] && [ "$ACTUAL_PUBLISHED_NEXT" = "true" ]; then
          NPM_PACKAGE_VERSION="${LATEST_VERSION} (latest) and ${NEXT_VERSION} (next)"
        elif [ "$ACTUAL_PUBLISHED_LATEST" = "true" ]; then
          NPM_PACKAGE_VERSION="${LATEST_VERSION} (latest)"
        elif [ "$ACTUAL_PUBLISHED_NEXT" = "true" ]; then
          NPM_PACKAGE_VERSION="${NEXT_VERSION} (next)"
        else
          NPM_PACKAGE_VERSION="No versions published"
        fi
        echo "npm_package_version=$NPM_PACKAGE_VERSION" >> $GITHUB_OUTPUT
      shell: bash
